                    ${this.infoRow('守军阶段ATK', preview.guardPhaseAtk)}
                    ${this.infoRow('挑战HP', preview.hp)}
                    ${this.infoRow('开场ATK', preview.atk)}
                `;
            },

            getHoverInfoTarget(facilitySlot, monster, player) {
                if (player) return { type: 'player', ref: player };
                if (facilitySlot && facilitySlot.owner) return { type: 'facility', ref: facilitySlot };
                if (monster) return { type: 'monster', ref: monster };
                return null;
            },

            isSameInfoTarget(a, b) {
                return a?.type === b?.type && a?.ref === b?.ref;
            },

            renderHoverInfo(target) {
                if (!target) return '';
                if (target.type === 'player') return this.buildPlayerInfo(target.ref);
                if (target.type === 'facility') return this.buildFacilityInfo(target.ref);
                if (target.type === 'monster') return this.buildMonsterInfo(target.ref);
                return '';
            },

            setHoveredInfoTarget(target, e) {
                const tooltip = document.getElementById('hover-info');
                if (!target) {
                    this.hoveredInfoTarget = null;
                    tooltip.style.display = 'none';
                    return;
                }
                if (!this.isSameInfoTarget(this.hoveredInfoTarget, target)) {
                    tooltip.innerHTML = this.renderHoverInfo(target);
                    this.hoveredInfoTarget = target;
                }
                this.positionHoverInfo(e);
                tooltip.style.display = 'block';
            },

            positionHoverInfo(e) {
                const tooltip = document.getElementById('hover-info');
                const margin = 14;
                const width = tooltip.offsetWidth || 190;
                const height = tooltip.offsetHeight || 120;
                let x = e.clientX + margin;
                let y = e.clientY + margin;
                if (x + width > window.innerWidth - 8) x = e.clientX - width - margin;
                if (y + height > window.innerHeight - 8) y = e.clientY - height - margin;
                tooltip.style.left = `${Math.max(8, x)}px`;
                tooltip.style.top = `${Math.max(8, y)}px`;
            },

            clearHoverState() {
                this.setHoveredBranchArrow(null);
                this.setHoveredSlot(null);
                this.setHoveredNode(null);
                this.setHoveredInfoTarget(null);
                document.getElementById('game-canvas').style.cursor = 'default';
            },

            updatePointerHover(e) {
                if (this.isDragging) return;
                this.setRayFromPointer(e);

                const branchArrow = this.state === TurnState.BRANCH_CHOICE ? this.pickBranchArrow() : null;
                const infoTarget = this.pickHoverInfoTarget();
                this.setHoveredBranchArrow(branchArrow);
                const slot = this.pickSlot();
                const node = this.pickNode();
                this.setHoveredSlot(slot);
                this.setHoveredNode(node);
                this.setHoveredInfoTarget(infoTarget, e);

                const canvas = document.getElementById('game-canvas');
                canvas.style.cursor = branchArrow || infoTarget || slot || node ? 'pointer' : 'default';
            },

            initEvents() {
                const canvas = document.getElementById('game-canvas');
                document.getElementById('btn-roll').addEventListener('click', () => this.rollDice());
                document.getElementById('btn-end').addEventListener('click', () => this.endTurn());

                // 触控/鼠标事件用于拖拽相机和点击选择
                canvas.addEventListener('pointerdown', (e) => {
                    this.isDragging = false;
                    if (this.cameraReturnTween) {
                        this.cameraReturnTween.stop();
                        this.cameraReturnTween = null;
                    }
                    this.dragStartPos = { x: e.clientX, y: e.clientY };
                });
                
                canvas.addEventListener('pointermove', (e) => {
                    if (e.buttons === 1) { // 左键或单指按下
                        const dx = e.clientX - this.dragStartPos.x;
                        const dy = e.clientY - this.dragStartPos.y;
                        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
                            this.isDragging = true;
                            this.setCameraMode(CameraMode.DRAGGING);
                            this.clearHoverState();
                        }
                        
                        // 等距视角下拖拽映射（简易版）
                        this.cameraOffset.x -= (dx + dy) * 0.02;
                        this.cameraOffset.z -= (dy - dx) * 0.02;
                        
                        this.dragStartPos = { x: e.clientX, y: e.clientY };
                    } else {
                        this.updatePointerHover(e);
                    }
                });

                canvas.addEventListener('pointerup', (e) => {
                    if (!this.isDragging && this.state === TurnState.BRANCH_CHOICE) {
                        this.setRayFromPointer(e);
                        const arrow = this.pickBranchArrow();
                        if (arrow) {
                            this.selectBranchArrow(arrow);
                        }
                    } else if (!this.isDragging && this.state === TurnState.ACTION_SELECT) {
                        // 处理点击射线检测
                        this.setRayFromPointer(e);

                        const intersects = this.raycaster.intersectObjects(this.slots.map(s => s.mesh));
                        if (intersects.length > 0) {
                            const clickedMesh = intersects[0].object;
                            const slot = this.slots.find(s => s.mesh === clickedMesh);
                            this.handleSlotClick(slot);
                        }
                    }
                    if (this.isDragging) {
                        this.returnCameraToFollow();
                    }
                    this.isDragging = false;
                });
                canvas.addEventListener('pointerleave', () => this.clearHoverState());
            },

            log(msg) {
                const logDiv = document.getElementById('msg-log');
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.innerHTML = `> ${msg}`;
                logDiv.appendChild(entry);
                if (logDiv.children.length > 6) logDiv.removeChild(logDiv.firstChild);
            },

            updateUI() {
                const p = this.players[this.currentPlayerIndex];
                document.getElementById('char-name').innerText = p.name + (p.isPlayer ? " (你)" : "");
                document.getElementById('char-name').style.color = '#' + p.color.toString(16).padStart(6, '0');
                document.getElementById('char-lv').innerText = p.level;
                document.getElementById('char-atk').innerText = p.atk;
                document.getElementById('char-gold').innerText = p.gold;
                document.getElementById('char-hp-txt').innerText = `${p.hp}/${p.maxHp}`;
                document.getElementById('char-hp-bar').style.width = `${(p.hp/p.maxHp)*100}%`;
                document.getElementById('char-exp-bar').style.width = `${(p.exp/100)*100}%`;

                document.getElementById('btn-roll').style.display = (p.isPlayer && this.state === TurnState.IDLE) ? 'block' : 'none';
            },

            // 掷骰子动画
            rollDice() {
                if (this.state !== TurnState.IDLE) return;
                this.transitionTo(TurnState.DICE);
                this.setDicePhase(DicePhase.LAUNCH);
                document.getElementById('btn-roll').style.display = 'none';

                const p = this.players[this.currentPlayerIndex];
                const activeDiceNode = this.nodes[p.nodeIndex];
                this.fadeDiceOccluders(activeDiceNode, 0.36);
                this.cameraOffset.set(0,0,0); // 视角归位

                // 3D 实体骰子特效
                const materials = [];
                for(let i=1; i<=6; i++) {
                    materials.push(new THREE.MeshBasicMaterial({
                        map: createDiceTexture(i),
                        depthTest: false,
                        depthWrite: false
                    }));
                }
                const diceGeom = new THREE.BoxGeometry(1.5, 1.5, 1.5);
                const dice = new THREE.Mesh(diceGeom, materials);
                
                dice.position.copy(p.meshGroup.position);
                dice.position.y += 0.9;
                dice.scale.set(0.45, 0.45, 0.45);
                dice.renderOrder = 1000;
                dice.traverse(child => {
                    child.renderOrder = 1000;
                    if (!child.material) return;
                    const childMaterials = Array.isArray(child.material) ? child.material : [child.material];
                    childMaterials.forEach(material => {
                        material.depthTest = false;
                        material.depthWrite = false;
                    });
                });
                this.scene.add(dice);

                const result = Math.floor(Math.random() * 6) + 1;
                this.log(`${p.name} 掷出了 ${result} 点！`);

                // 随机翻滚动画
                new TWEEN.Tween(dice.position)
                    .to({ y: 5.8 }, 430)
                    .easing(TWEEN.Easing.Quadratic.Out)
                    .onComplete(() => {
                        this.setDicePhase(DicePhase.ROLL);
                        new TWEEN.Tween(dice.position)
                            .to({ y: 1.35 }, 520)
                            .easing(TWEEN.Easing.Bounce.Out)
                            .onComplete(() => this.setDicePhase(DicePhase.SETTLE))
                            .start();
                    })
                    .start();

                new TWEEN.Tween(dice.scale)
                    .to({ x: 1.35, y: 1.35, z: 1.35 }, 430)
                    .easing(TWEEN.Easing.Back.Out)
                    .onComplete(() => {
                        new TWEEN.Tween(dice.scale)
                            .to({ x: 1.0, y: 1.0, z: 1.0 }, 520)
                            .easing(TWEEN.Easing.Bounce.Out)
                            .start();
                    })
                    .start();
                
                new TWEEN.Tween(dice.rotation)
                    .to({ x: Math.PI*5, y: Math.PI*6, z: Math.PI*4 }, 950)
                    .easing(TWEEN.Easing.Cubic.Out)
                    .onComplete(() => {
                        // BoxGeometry material index 2 is the top face; repaint it to the final roll.
                        dice.material[2].map = createDiceTexture(result);
                        dice.material[2].map.needsUpdate = true;
                        dice.material[2].needsUpdate = true;
                        dice.rotation.set(0, 0, 0);
                        
                        setTimeout(() => {
                            this.scene.remove(dice);
                            this.restoreDiceOccluders();
                            this.setDicePhase(DicePhase.DONE);
                            this.transitionTo(TurnState.MOVING);
                            this.moveCharacter(p, result);
                        }, 500);
                    })
                    .start();
            },

            // 角色单步跳跃递归
            async moveCharacter(player, stepsLeft, hasMovedThisRoll = false) {
                if (stepsLeft <= 0) {
                    this.reflowNodeOccupants(player.nodeIndex, true);
                    await this.handleLanding(player);
                    return;
                }

                const currNode = this.nodes[player.nodeIndex];
                const oldNodeIndex = player.nodeIndex;
                const nextNodeIndex = await this.chooseNextNodeIndex(currNode, player, hasMovedThisRoll);
                const nextNode = this.nodes[nextNodeIndex];
                player.nodeIndex = nextNodeIndex;
                const nextOccupants = this.getPlayersOnNode(nextNodeIndex);
                const targetStand = this.getNodeStandPosition(nextNodeIndex, player, nextOccupants);
                this.reflowNodeOccupants(oldNodeIndex, true, player);
                this.reflowNodeOccupants(nextNodeIndex, true, player);

                // 物理挤压/拉伸跳跃 (Squash & Stretch)
                const body = player.bodyMesh;
                
                // 起跳前微微下压
                new TWEEN.Tween(body.scale).to({ x: 1.2, y: 0.8, z: 1.2 }, 100)
                .onComplete(() => {
                    // 空中拉伸
                    new TWEEN.Tween(body.scale).to({ x: 0.9, y: 1.2, z: 0.9 }, 150).yoyo(true).repeat(1).start();
                    
                    // 位置抛物线
                    const jumpTween = new TWEEN.Tween(player.meshGroup.position)
                        .to({ x: targetStand.x, z: targetStand.z }, 300)
                        .easing(TWEEN.Easing.Quadratic.Out)
                        .start();
                    
                    const heightTween = new TWEEN.Tween(player.meshGroup.position)
                        .to({ y: 2.5 }, 150)
                        .yoyo(true).repeat(1).easing(TWEEN.Easing.Quadratic.Out)
                        .onComplete(() => {
                            player.meshGroup.position.x = targetStand.x;
                            player.meshGroup.position.z = targetStand.z;
                            this.bounceNode(nextNode);
                            // 落地挤压恢复
                            new TWEEN.Tween(body.scale).to({ x: 1.2, y: 0.8, z: 1.2 }, 100)
                            .onComplete(() => {
                                new TWEEN.Tween(body.scale).to({ x: 1, y: 1, z: 1 }, 100).start();
                                // 继续下一步
                                setTimeout(() => this.moveCharacter(player, stepsLeft - 1, true), 50);
                            }).start();
                        })
                        .start();
                }).start();
            },

            // 异步事件队列入口
            async handleLanding(player) {
                this.transitionTo(TurnState.OWNED_EVENTS);
                this.activeNode = this.nodes[player.nodeIndex];
                const slots = this.activeNode.slots;

                if (this.activeNode.npc === 'WIZARD') {
                    await this.triggerWizardNode(player);
                }

                // 索敌转向: 面朝副地块
                if (slots.length > 0) {
                    const targetAngle = Math.atan2(slots[0].x - this.activeNode.x, slots[0].z - this.activeNode.z);
                    new TWEEN.Tween(player.meshGroup.rotation).to({ y: targetAngle }, 300).start();
                }

                // 严格按照：敌方被动陷阱 -> 敌方守卫强制战斗 -> 己方增益 -> 城建互动 的顺序
                for (let slot of this.getOrderedLandingEventSlots(slots, player)) {
                    if (slot.owner === player) this.transitionTo(TurnState.OWNED_EVENTS);
                    if (slot.owner && slot.owner !== player) this.transitionTo(TurnState.ENEMY_EVENTS);
                    if (slot.owner && slot.owner !== player) {
                        await this.triggerEnemyFacility(slot, player);
                        if (player.hp <= 0) break;
                    } else if (slot.owner === player) {
                        await this.triggerOwnedFacility(slot, player);
                    }
                }

                this.updateUI();

                if (player.hp <= 0) {
                    this.log(`${player.name} 阵亡！修养一回合。`);
                    player.hp = player.maxHp; // 简单复活
                    this.endTurn();
                    return;
                }

                // 进入二段式建筑操作阶段
                this.enterBuildPhase(player);
            },

            async triggerOwnedFacility(slot, player) {
                if (slot.type === 'TRAP') {
                    const resetDefense = 3 + slot.level * 2;
                    slot.defense += resetDefense;
                    const scoutDrill = slot.guards.filter(guard => guard.key === 'SCOUT');
                    scoutDrill.forEach(guard => {
                        guard.atk += 1;
                        guard.hp = Math.min(guard.maxHp, guard.hp + 4 + slot.level);
                    });
                    this.updateFacilityVisual(slot);
                    this.log(`路过自己的陷阱阵地，机关重置，防御 +${resetDefense}${scoutDrill.length > 0 ? `，并让 ${scoutDrill.length} 名斥候守军完成伏击演练` : ''}。`);
                    this.createFloatingText(`伏击就绪 +${resetDefense}`, slot.mesh.position, "#a55eea");
                } else if (slot.type === 'COMMAND') {
                    const owned = this.getNodeOwnedFacilities(player);
                    const guards = owned.flatMap(other => other.guards || []);
                    const guardHeal = 4 + slot.level * 2;
                    guards.forEach(guard => {
                        guard.hp = Math.min(guard.maxHp, guard.hp + guardHeal);
                        guard.atk += 1;
                    });
                    owned.filter(other => other !== slot).forEach(other => {
                        other.defense += 1 + Math.floor(slot.level / 2);
                        this.updateFacilityVisual(other);
                    });
                    if (guards.length === 0) {
                        slot.defense += 4 + slot.level;
                        this.updateFacilityVisual(slot);
                        this.log(`路过自己的指挥所，虽然没有驻军可整队，但仍重新布置了防线，防御 +${4 + slot.level}。`);
                        this.createFloatingText(`重排防线 +${4 + slot.level}`, slot.mesh.position, "#4b7bec");
                    } else {
                        player.atk += 1;
                        this.updateGuardMarkers(slot);
                        this.log(`指挥所吹响集结号，让同路块守军完成整队：${guards.length} 名守军恢复 ${guardHeal} HP 并获得 +1 ATK，你也获得了 +1 ATK。`);
                        this.createFloatingText(`集结号 x${guards.length}`, slot.mesh.position, "#4b7bec");
                    }
                } else if (slot.type === 'FORTRESS') {
                    const fortify = 6 + slot.level * 4;
                    const playerHeal = 4 + slot.level * 3;
                    slot.defense += fortify;
                    player.hp = Math.min(player.maxHp, player.hp + playerHeal);
                    this.updateFacilityVisual(slot);
                    this.log(`路过自己的堡垒，厚墙再度加固，防御 +${fortify}，同时为部队提供了 ${playerHeal} 点整补。`);
                    this.createFloatingText(`堡墙 +${fortify}`, slot.mesh.position, "#8c564b");
                } else if (slot.type === 'GUARD') {
                    if (slot.guards.length > 0) {
                        const guard = slot.guards[(slot.level + slot.guards.length - 1) % slot.guards.length];
                        const hpGain = 3 + slot.level * 2;
                        const atkGain = slot.level >= 2 ? 1 : 0;
                        guard.maxHp += slot.level === slot.maxLevel ? 1 : 0;
                        guard.hp = Math.min(guard.maxHp, guard.hp + hpGain);
                        guard.atk += atkGain;
                        this.log(`路过自己的守卫哨站，${guard.name} 完成整备，HP +${hpGain}${atkGain > 0 ? ` / ATK +${atkGain}` : ''}`);
                        this.createFloatingText(`整备 ${guard.name}`, slot.mesh.position, "#70a1ff");
                        this.updateGuardMarkers(slot);
                    } else {
                        const defenseGain = 2 + slot.level;
                        slot.defense += defenseGain;
                        this.log(`守卫哨站无人驻守，城墙临时加固，防御 +${defenseGain}`);
                        this.createFloatingText(`防御 +${defenseGain}`, slot.mesh.position, "#70a1ff");
                    }
                } else if (slot.type === 'INCOME') {
                    const income = 40 + slot.level * 25 + slot.guards.length * 10;
                    this.log(`路过自己的金矿，收益 +${income}G`);
                    player.gold += income;
                    this.createFloatingText(`+${income}G`, slot.mesh.position, "#eccc68");
                } else if (slot.type === 'HEAL') {
                    const heal = 14 + slot.level * 12 + slot.guards.length * 4;
                    const before = player.hp;
                    player.hp = Math.min(player.maxHp, player.hp + heal);
                    const actual = player.hp - before;
                    slot.guards.forEach(guard => {
                        guard.hp = Math.min(guard.maxHp, guard.hp + 5 + slot.level * 2);
                    });
                    this.log(`治疗营地恢复 ${actual} HP。`);
                    this.createFloatingText(`+${actual}HP`, player.meshGroup.position, "#2ed573");
                } else if (slot.type === 'TRAINING') {
                    const atkGain = 1 + Math.floor(slot.level / 2);
                    player.atk += atkGain;
                    slot.guards.forEach(guard => {
                        guard.atk += 1;
                    });
                    this.log(`训练营鼓舞士气，ATK +${atkGain}。`);
                    this.createFloatingText(`ATK +${atkGain}`, player.meshGroup.position, "#ffb142");
                } else if (slot.type === 'BARRACKS') {
                    const guardHeal = 7 + slot.level * 3;
                    let trained = 0;
                    slot.guards.forEach(guard => {
                        guard.hp = Math.min(guard.maxHp, guard.hp + guardHeal);
                        guard.atk += 1;
                        trained += 1;
                    });
                    if (slot.guards.length < this.getGuardCapacity(slot) && slot.level >= 2) {
                        const recruit = this.createGuard(slot);
                        recruit.name = `预备${recruit.name}`;
                        recruit.hp = Math.max(14, recruit.hp - 6);
                        recruit.maxHp = recruit.hp;
                        slot.guards.push(recruit);
                        trained += 1;
                        this.updateGuardMarkers(slot);
                        this.log(`兵营补入一名预备守军，并完成全员操练。`);
                        this.createFloatingText("+预备守军", slot.mesh.position, "#ff7f50");
                    } else if (trained === 0) {
                        slot.defense += 2 + slot.level;
                        this.updateFacilityVisual(slot);
                        this.log(`兵营暂时空置，营地守备改为加固栅栏，防御 +${2 + slot.level}。`);
                        this.createFloatingText(`营门加固 +${2 + slot.level}`, slot.mesh.position, "#ff7f50");
                    } else {
                        this.log(`兵营完成整训，${slot.guards.length} 名守军恢复 ${guardHeal} HP 并获得 +1 ATK。`);
                        this.createFloatingText(`整训 x${Math.max(1, trained)}`, slot.mesh.position, "#ff7f50");
                    }
                } else if (slot.type === 'WORKSHOP') {
                    const selfFortify = 4 + slot.level * 2;
                    slot.defense += selfFortify;
                    const others = this.getNodeOtherOwnedFacilities(slot);
                    others.forEach(other => {
                        other.defense += 2 + slot.level;
                        this.updateFacilityVisual(other);
                    });
                    this.updateFacilityVisual(slot);
                    this.log(`城防工坊加固了城墙，本体防御 +${selfFortify}${others.length > 0 ? `，并强化同路口 ${others.length} 座友方建筑` : ''}。`);
                    this.createFloatingText(`墙体加固 +${selfFortify}`, slot.mesh.position, "#747d8c");
                }
                await this.wait(260);
            },

            async triggerWizardNode(player) {
                this.transitionTo(TurnState.WIZARD_EVENT);
                this.log(`${player.name} 来到岔路尽头的巫师摊位。`);
                if (!player.isPlayer) {
                    if (player.gold >= 60) {
                        player.gold -= 60;
                        this.grantRandomCard(player);
                    } else if (player.hp > 20) {
                        player.hp = Math.max(1, player.hp - 12);
                        this.grantRandomCard(player);
                    }
                    this.updateUI();
                    await this.wait(320);
                    this.transitionTo(TurnState.OWNED_EVENTS);
                    return;
                }

                document.getElementById('wizard-menu').style.display = 'block';
                this.resetWizardMenu();
                await new Promise(resolve => {
                    this.wizardTradeResolver = resolve;
                });
                document.getElementById('wizard-menu').style.display = 'none';
                this.wizardTradeResolver = null;
                this.resetWizardMenu();
                this.updateUI();
                await this.wait(220);
                this.transitionTo(TurnState.OWNED_EVENTS);
            },

            resetWizardMenu() {
                this.wizardCardChoices = [];
                document.getElementById('wizard-desc').innerText = "献上一点代价，换一张战斗卡。";
                document.getElementById('wizard-options').innerHTML = `
                    <button class="build-btn training" onclick="Game.resolveWizardTrade('gold')">献上 60G</button>
                    <button class="build-btn heal" onclick="Game.resolveWizardTrade('hp')">献上 12HP</button>
                    <button class="build-btn cancel" onclick="Game.resolveWizardTrade('skip')">离开</button>
                `;
            },

            resolveWizardTrade(choice) {
                const player = this.players[this.currentPlayerIndex];
                if (!this.wizardTradeResolver || !player) return;

                if (choice === 'gold') {
                    if (player.gold < 60) {
                        this.log("金币不足，巫师摇了摇头。");
                        return;
                    }
                    player.gold -= 60;
                    this.showWizardCardChoices(player);
                    return;
                } else if (choice === 'hp') {
                    if (player.hp <= 12) {
                        this.log("生命太低，巫师拒绝收取代价。");
                        return;
                    }
                    player.hp = Math.max(1, player.hp - 12);
                    this.showWizardCardChoices(player);
                    return;
                } else {
                    this.log("你离开了巫师摊位。");
                }

                const resolve = this.wizardTradeResolver;
                resolve();
            },

            showWizardCardChoices(player) {
                this.updateUI();
                const optionBox = document.getElementById('wizard-options');
                document.getElementById('wizard-desc').innerText = "选择一张卡加入你的牌库。";
                optionBox.innerHTML = '';
                const pool = this.shuffleCards(['FIREBALL', 'RALLY', 'MEND', 'GUARD_UP', 'STRIKE']);
                this.wizardCardChoices = pool.slice(0, 3);
                this.wizardCardChoices.forEach(cardId => {
                    const card = this.cardLibrary[cardId];
                    const btn = document.createElement('button');
                    btn.className = 'battle-card';
                    btn.onclick = () => this.chooseWizardCard(cardId);
                    btn.innerHTML = `<strong>${card.name}</strong><em>${this.getCardKindLabel(card.kind)}</em><span>${card.text}</span>`;
                    optionBox.appendChild(btn);
                });
            },

            chooseWizardCard(cardId) {
                if (!this.wizardTradeResolver) return;
                const player = this.players[this.currentPlayerIndex];
                this.grantCard(player, cardId);
                this.wizardCardChoices = [];
                const resolve = this.wizardTradeResolver;
                resolve();
            },

            grantRandomCard(player) {
                const pool = ['FIREBALL', 'RALLY', 'MEND', 'GUARD_UP'];
                const cardId = pool[Math.floor(Math.random() * pool.length)];
                this.grantCard(player, cardId);
            },

            grantCard(player, cardId) {
                player.deck.push(cardId);
                const card = this.cardLibrary[cardId];
                this.log(`${player.name} 获得卡牌《${card.name}》。`);
                this.createFloatingText(`+${card.name}`, player.meshGroup.position, "#a55eea");
            },

            async triggerEnemyFacility(slot, player) {
                if (slot.type === 'TRAP') {
                    await this.triggerTrap(slot, player);
                    if (slot.guards.length > 0) {
                        await this.triggerGuardPressure(slot, player);
                    }
                    return;
                }

                if (slot.type === 'GUARD') {
                    await this.triggerGuardPressure(slot, player);
                    return;
                }

                if (slot.type === 'INCOME') {
                    const toll = Math.min(player.gold, 16 + slot.level * 12);
                    player.gold -= toll;
                    slot.owner.gold += toll;
                    this.log(`敌方金矿收取过路费 ${toll}G。`);
                    this.createFloatingText(`-${toll}G`, player.meshGroup.position, "#eccc68");
                } else if (slot.type === 'HEAL') {
                    const heal = 10 + slot.level * 10;
                    const before = slot.owner.hp;
                    slot.owner.hp = Math.min(slot.owner.maxHp, slot.owner.hp + heal);
                    const actual = slot.owner.hp - before;
                    this.log(`敌方治疗营地为 ${slot.owner.name} 恢复 ${actual} HP。`);
                    this.createFloatingText(`+${actual}HP`, slot.mesh.position, "#2ed573");
                } else if (slot.type === 'TRAINING') {
                    const atkGain = 1 + Math.floor(slot.level / 2);
                    slot.owner.atk += atkGain;
                    this.log(`敌方训练营强化了 ${slot.owner.name}，ATK +${atkGain}。`);
                    this.createFloatingText(`敌方ATK +${atkGain}`, slot.mesh.position, "#ffb142");
                } else if (slot.type === 'BARRACKS') {
                    const guardHeal = 6 + slot.level * 2;
                    slot.guards.forEach(guard => {
                        guard.hp = Math.min(guard.maxHp, guard.hp + guardHeal);
                        guard.atk += 1;
                    });
                    if (slot.guards.length < this.getGuardCapacity(slot) && slot.level >= 2) {
                        const recruit = this.createGuard(slot);
                        recruit.name = `敌方${recruit.name}`;
                        recruit.hp = Math.max(14, recruit.hp - 4);
                        recruit.maxHp = recruit.hp;
                        slot.guards.push(recruit);
                        this.updateGuardMarkers(slot);
                        this.log(`敌方兵营吹响集结号，又补上了一名守军。`);
                        this.createFloatingText("敌方增援", slot.mesh.position, "#ff7f50");
                    } else if (slot.guards.length === 0) {
                        slot.defense += 2 + slot.level;
                        this.updateFacilityVisual(slot);
                        this.log(`敌方兵营虽然空着，但临时加高了拒马和栅栏。`);
                        this.createFloatingText("敌方扎营", slot.mesh.position, "#ff7f50");
                    } else {
                        this.log(`敌方兵营整训了驻军，后续守军更难对付。`);
                        this.createFloatingText("敌方整训", slot.mesh.position, "#ff7f50");
                    }
                } else if (slot.type === 'COMMAND') {
                    const allied = this.getNodeOwnedFacilities(slot.owner);
                    const guards = allied.flatMap(other => other.guards || []);
                    const guardHeal = 5 + slot.level * 2;
                    guards.forEach(guard => {
                        guard.hp = Math.min(guard.maxHp, guard.hp + guardHeal);
                        guard.atk += 1;
                    });
                    allied.filter(other => other !== slot).forEach(other => {
                        other.defense += 2;
                        this.updateFacilityVisual(other);
                    });
                    slot.owner.atk += 1;
                    this.log(`敌方指挥所吹响了集结号，整编了同路块守军与防线。`);
                    this.createFloatingText("敌方集结", slot.mesh.position, "#4b7bec");
                } else if (slot.type === 'FORTRESS') {
                    const fortify = 7 + slot.level * 4;
                    slot.defense += fortify;
                    slot.owner.hp = Math.min(slot.owner.maxHp, slot.owner.hp + 5 + slot.level * 2);
                    this.updateFacilityVisual(slot);
                    this.log(`敌方堡垒重新封死了垛口与射击孔，墙体显得更难啃。`);
                    this.createFloatingText("敌方堡墙", slot.mesh.position, "#8c564b");
                } else if (slot.type === 'WORKSHOP') {
                    const selfFortify = 5 + slot.level * 2;
                    slot.defense += selfFortify;
                    const others = this.getNodeOtherOwnedFacilities(slot);
                    others.forEach(other => {
                        other.defense += 3 + slot.level;
                        this.updateFacilityVisual(other);
                    });
                    this.updateFacilityVisual(slot);
                    this.log(`敌方城防工坊抢先加固了防线，墙体明显更厚了。`);
                    this.createFloatingText("敌方加固", slot.mesh.position, "#747d8c");
                }

                if (slot.guards.length > 0) {
                    await this.triggerGuardPressure(slot, player);
                }

                await this.wait(260);
            },

            async triggerTrap(slot, player) {
                return new Promise(resolve => {
                    const rate = 0.16 + slot.level * 0.06;
                    this.log(`踩中敌方 Lv.${slot.level} 陷阱！扣除 ${Math.round(rate * 100)}% HP`);
                    const dmg = Math.floor(player.maxHp * rate);
                    player.hp = Math.max(1, player.hp - dmg);
                    this.screenFlash();
                    this.createFloatingText(`-${dmg}`, player.meshGroup.position, "#ff0000");
                    setTimeout(resolve, 800);
                });
            },

            async triggerGuardPressure(slot, player) {
                const { goldLoss, damage, defenseBoost, roleCounts } = this.getGuardPressurePayload(slot);
                const toll = Math.min(player.gold, goldLoss);
                const lines = [];

                if (defenseBoost > 0) {
                    slot.defense += defenseBoost;
                    this.updateFacilityVisual(slot);
                    lines.push(`盾卫趁机固守，城墙再加厚 ${defenseBoost}`);
                    this.createFloatingText(`固守 +${defenseBoost}`, slot.mesh.position, "#70a1ff");
                }

                if (toll > 0) {
                    player.gold -= toll;
                    slot.owner.gold += toll;
                    lines.push(`守军抽走 ${toll}G 作为封锁代价`);
                    this.createFloatingText(`-${toll}G`, player.meshGroup.position, "#eccc68");
                }

                if (damage > 0) {
                    player.hp = Math.max(1, player.hp - damage);
                    lines.push(`斥候与岗哨造成 ${damage} 点压制伤害`);
                    this.screenFlash();
                    this.createFloatingText(`-${damage}`, player.meshGroup.position, "#ff6b81");
                }

                if (roleCounts.SPEAR > 0) {
                    lines.push(`枪兵封锁了通路`);
                }
                if (roleCounts.SCOUT > 0) {
                    lines.push(`斥候暴露了你的动线`);
                }

                this.log(`敌方 ${this.getFacilityName(slot)} 的守军出动施压：${lines.join('，')}。真正攻城要在行动阶段主动发起挑战。`);
                await this.wait(280);
            },

            gainExp(player, amount) {
                player.exp += amount;
                if (player.exp >= 100) {
                    player.exp -= 100;
                    player.level++;
                    player.maxHp += 10;
                    player.hp = player.maxHp;
                    player.atk += 3;
                    this.log(`升级了！Lv.${player.level} HP全满，攻击力提升！`);
                    this.createFloatingText("LEVEL UP!", player.meshGroup.position, "#2ed573");
                }
            },

            // 屏幕泛红震动
            screenFlash() {
                const flash = document.getElementById('damage-flash');
                flash.style.opacity = '0.5';
                setTimeout(() => flash.style.opacity = '0', 100);
            },

            createFloatingText(text, pos, color) {
                // 用HTML DOM模拟飘字更简单且永远置顶
                const div = document.createElement('div');
                div.innerText = text;
                div.style.position = 'absolute';
                div.style.color = color;
                div.style.fontWeight = 'bold';
                div.style.fontSize = '24px';
                div.style.textShadow = '2px 2px 0 #000';
                div.style.pointerEvents = 'none';
                document.body.appendChild(div);

                // 将3D坐标转为2D屏幕坐标
                const tempV = new THREE.Vector3(pos.x, pos.y + 1, pos.z);
                tempV.project(this.camera);
                const x = (tempV.x * .5 + .5) * window.innerWidth;
                const y = (tempV.y * -.5 + .5) * window.innerHeight;
                
                div.style.left = x + 'px';
                div.style.top = y + 'px';

                let opacity = 1;
                let offsetY = 0;
                const animateTxt = setInterval(() => {
                    offsetY -= 2;
                    opacity -= 0.02;
                    div.style.transform = `translate(-50%, ${offsetY}px)`;
                    div.style.opacity = opacity;
                    if (opacity <= 0) {
                        clearInterval(animateTxt);
                        document.body.removeChild(div);
                    }
                }, 16);
            },

            enterBuildPhase(player) {
                this.transitionTo(TurnState.ACTION_SELECT);
                this.setActionConsumed(false);
                this.resetGuardTransferMenu();
                const slots = this.activeNode.slots;

                // 阶段一：地块高亮跳动
                slots.forEach(s => {
                    this.stopTileFloat(s.mesh);
                    const highlightTween = new TWEEN.Tween(s.mesh.position).to({y: 0.2}, 400).yoyo(true).repeat(Infinity).start();
                    this.slotHighlightTweens.push(highlightTween);
                    s.mesh.material.color.setHex(0xffffff); // 高亮
                });

                if (player.isPlayer) {
                    this.log("请点击闪烁的副地块进行互动/建造。");
                    document.getElementById('btn-end').style.display = 'block';
                } else {
                    // AI 自动逻辑：优先巩固自己的建筑，再考虑新建。
                    setTimeout(() => {
                        this.stopSlotHighlightOnly();
                        this.performAiBuildAction(player, slots);
                    }, 1000);
                }
            },

            performAiBuildAction(player, slots) {
                const ownedSlots = slots.filter(s => s.owner === player && s.type !== 'EMPTY');
                const transferTarget = ownedSlots
                    .filter(slot => this.canFacilityHostGuards(slot) && slot.guards.length === 0)
                    .sort((a, b) => a.defense - b.defense)[0];
                const transferSource = ownedSlots
                    .filter(slot => slot.guards.length > 1)
                    .sort((a, b) => b.guards.length - a.guards.length)[0];
                if (transferSource && transferTarget && transferSource !== transferTarget) {
                    this.performGuardTransfer(transferSource, transferTarget);
                    this.endTurn();
                    return;
                }

                const recruitable = ownedSlots
                    .filter(slot => this.canFacilityHostGuards(slot)
                        && slot.guards.length < this.getGuardCapacity(slot)
                        && player.gold >= this.getGuardRecruitCost(slot))
                    .sort((a, b) => this.getBuildingBattlePreview(a).hp - this.getBuildingBattlePreview(b).hp);
                if (recruitable.length > 0) {
                    const slot = recruitable[0];
                    const roleKey = this.getGuardArchetype(null, slot)?.key || null;
                    this.performRecruitGuard(player, slot, roleKey);
                    this.endTurn();
                    return;
                }

                const upgradeable = ownedSlots
                    .filter(slot => !this.isFacilityMaxLevel(slot) && player.gold >= this.getUpgradeCost(slot))
                    .sort((a, b) => a.level - b.level || a.defense - b.defense);
                if (upgradeable.length > 0) {
                    this.performUpgradeFacility(player, upgradeable[0]);
                    this.endTurn();
                    return;
                }

                const emptySlot = slots.find(s => s.type === 'EMPTY' && !s.monster);
                const preferredTypes = ['FORTRESS', 'COMMAND', 'BARRACKS', 'WORKSHOP', 'GUARD', 'INCOME', 'HEAL', 'TRAINING', 'TRAP'];
                const types = preferredTypes.filter(type => player.gold >= this.facilityConfigs[type].cost);
                if (emptySlot && types.length > 0) {
                    this.selectedSlot = emptySlot;
                    this.buildFacility(types[Math.floor(Math.random() * types.length)]);
                } else {
                    this.endTurn();
                }
            },

            stopSlotHighlightOnly() {
                this.slotHighlightTweens.forEach(tween => tween.stop());
                this.slotHighlightTweens = [];
                if (!this.activeNode) return;
                this.activeNode.slots.forEach(s => {
                    s.mesh.position.y = s.mesh.userData.baseY ?? 0.05;
                    s.mesh.material.color.setHex(0xdfe4ea);
                    this.startTileFloat(s.mesh, this.slots.indexOf(s));
                });
            },

            handleSlotClick(slot) {
                if (!this.activeNode.slots.includes(slot)) return;
                
                this.stopSlotHighlightOnly();
                this.resetGuardTransferMenu();
                this.selectedSlot = slot;

                const player = this.players[this.currentPlayerIndex];
                this.transitionTo(TurnState.ACTION_MENU);
                
                // 阶段二：弹出菜单
                if (slot.type === 'EMPTY' && slot.monster) {
                    this.setBuildMenuButtons('monster');
                    document.getElementById('build-desc').innerText = `${slot.monster.name} 占着这块地。打败它后才能在这里建造。胜利不消耗行动，失败会消耗行动。`;
                } else if (slot.type === 'EMPTY') {
                    this.setBuildMenuButtons('build');
                    document.getElementById('build-desc').innerText = "选择要建造的设施。兵营偏向练兵和补守军，指挥所负责整队联动，堡垒与城防工坊则更偏向堆墙和抬高攻城难度。建造会消耗当前行动。";
                } else if (slot.owner === player) {
                    this.setBuildMenuButtons('owned');
                    const upgradeBtn = document.getElementById('btn-upgrade-facility');
                    const recruitBtn = document.getElementById('btn-recruit-guard');
                    const transferBtn = document.getElementById('btn-transfer-guard');
                    const demolishBtn = document.getElementById('btn-demolish-facility');
                    const maxed = this.isFacilityMaxLevel(slot);
                    const guardCapacity = this.getGuardCapacity(slot);
                    const guardCost = this.getGuardRecruitCost(slot);
                    const transferTargets = this.getTransferTargets(slot, player);
                    upgradeBtn.disabled = maxed || player.gold < this.getUpgradeCost(slot);
                    upgradeBtn.innerText = maxed ? "已满级" : `升级 (${this.getUpgradeCost(slot)}G)`;
                    recruitBtn.disabled = !this.canFacilityHostGuards(slot) || slot.guards.length >= guardCapacity || player.gold < guardCost;
                    recruitBtn.innerText = this.canFacilityHostGuards(slot)
                        ? `招募守军 (${guardCost}G)`
                        : "不可驻防";
                    transferBtn.disabled = slot.guards.length === 0 || transferTargets.length === 0;
                    transferBtn.innerText = transferTargets.length > 0 ? "调防守军" : "无可调目标";
                    demolishBtn.disabled = false;
                    const guardNote = this.canFacilityHostGuards(slot)
                        ? `守军 ${slot.guards.length}/${guardCapacity}`
                        : '不可驻防，但升级会更快提高防御';
                    document.getElementById('build-desc').innerText = `${this.getFacilityName(slot)} Lv.${slot.level}/${slot.maxLevel}，防御 ${slot.defense}，${guardNote}。当前驻军：${this.getGuardSummary(slot)}。升级、招募或调防会消耗行动，拆毁不会消耗行动。`;
                    document.querySelector('.build-options').style.display = 'flex';
                } else {
                    this.setBuildMenuButtons('enemy');
                    const preview = this.getBuildingBattlePreview(slot);
                    document.getElementById('build-desc').innerText = `${this.getFacilityName(slot)} Lv.${slot.level} 是敌方设施：${preview.battlePlan || preview.label}。${this.getGuardTraitSummary(slot)}。城墙 HP ${preview.wallHp} / 减伤 ${preview.wallArmor}，守军 HP ${preview.guardHp} / 减伤 ${preview.guardArmor} / 闪避 ${Math.round(preview.dodgeChance * 100)}%。攻破后可摧毁建筑，胜利不消耗行动，失败会消耗行动。`;
                    document.querySelector('.build-options').style.display = 'flex';
                }
                
                document.getElementById('build-menu').style.display = 'block';
                document.getElementById('btn-end').style.display = 'none';
            },

            closeBuildMenu() {
                document.getElementById('build-menu').style.display = 'none';
                this.resetGuardTransferMenu();
                this.enterBuildPhase(this.players[this.currentPlayerIndex]); // 返回阶段一重新选
            },

            openGuardTransferMenu() {
                const player = this.players[this.currentPlayerIndex];
                const sourceSlot = this.selectedSlot;
                if (!sourceSlot || sourceSlot.owner !== player || sourceSlot.guards.length === 0) {
                    this.log("这座建筑没有可调动的守军。");
                    return;
                }

                const targets = this.getTransferTargets(sourceSlot, player);
                if (targets.length === 0) {
                    this.log("当前没有可接收守军的友方建筑。");
                    return;
                }

                this.guardTransferSource = sourceSlot;
                document.querySelector('#build-menu .build-options').style.display = 'none';
                const options = document.getElementById('guard-transfer-options');
                options.innerHTML = '';
                document.getElementById('build-desc').innerText = `选择调防目标。将 ${sourceSlot.guards[sourceSlot.guards.length - 1].name} 调往哪座建筑？调防会消耗本回合行动。`;

                targets.forEach(target => {
                    const btn = document.createElement('button');
                    btn.className = 'build-btn transfer';
                    btn.innerText = `${this.getFacilityName(target)} (${target.guards.length}/${this.getGuardCapacity(target)})`;
                    btn.onclick = () => this.transferGuardToSlot(this.slots.indexOf(target));
                    options.appendChild(btn);
                });

                const backBtn = document.createElement('button');
                backBtn.className = 'build-btn cancel';
                backBtn.innerText = '返回建筑操作';
                backBtn.onclick = () => this.handleSlotClick(sourceSlot);
                options.appendChild(backBtn);
                options.style.display = 'flex';
            },

            transferGuardToSlot(targetIndex) {
                const player = this.players[this.currentPlayerIndex];
                const sourceSlot = this.guardTransferSource;
                const targetSlot = this.slots[targetIndex];
                if (!sourceSlot || !targetSlot || sourceSlot.owner !== player || targetSlot.owner !== player) {
                    this.log("守军调防失败，目标已变化。");
                    return;
                }
                if (sourceSlot.guards.length === 0) {
                    this.log("原建筑已经没有守军了。");
                    return;
                }
                if (!this.canFacilityHostGuards(targetSlot) || targetSlot.guards.length >= this.getGuardCapacity(targetSlot)) {
                    this.log("目标建筑无法继续接收守军。");
                    return;
                }

                this.performGuardTransfer(sourceSlot, targetSlot);
                document.getElementById('build-menu').style.display = 'none';
                this.updateUI();
                this.finishAction(true);
            },

            performGuardTransfer(sourceSlot, targetSlot) {
                const guard = sourceSlot.guards.pop();
                targetSlot.guards.push(guard);
                this.updateGuardMarkers(sourceSlot);
                this.updateGuardMarkers(targetSlot);
                this.createFloatingText(`调防 ${guard.name}`, targetSlot.mesh.position, "#70a1ff");
                this.log(`${guard.name} 已从 ${this.getFacilityName(sourceSlot)} 调往 ${this.getFacilityName(targetSlot)}。`);
            },

            async fightSelectedMonster() {
                const player = this.players[this.currentPlayerIndex];
                const slot = this.selectedSlot;
                if (!slot || !slot.monster) {
                    this.log("这里没有可以讨伐的野怪。");
                    return;
                }

                document.getElementById('build-menu').style.display = 'none';
                const victory = await this.resolveBattleShell({
                    attacker: player,
                    enemy: slot.monster,
                    sourceSlot: slot,
                    kind: 'monster'
                });

                if (victory) {
                    player.gold += slot.monster.gold;
                    this.gainExp(player, slot.monster.exp);
                    this.clearMonster(slot);
                    this.log("野怪被赶走了，这块地现在可以建造。");
                    this.updateUI();
                    this.finishAction(false);
                } else {
                    this.log("讨伐失败，本次行动结束。");
                    this.updateUI();
                    this.finishAction(true);
                }
            },

            async challengeSelectedFacility() {
                const player = this.players[this.currentPlayerIndex];
                const slot = this.selectedSlot;
                if (!slot || slot.type === 'EMPTY' || slot.owner === player) {
                    this.log("只能挑战敌方建筑。");
                    return;
                }

                document.getElementById('build-menu').style.display = 'none';
                const enemy = this.createBuildingBattleEnemy(slot);
                const victory = await this.resolveBattleShell({
                    attacker: player,
                    enemy,
                    sourceSlot: slot,
                    kind: 'facility'
                });

                if (victory) {
                    const rewards = this.getFacilityBattleRewards(slot);
                    const name = this.getFacilityName(slot);
                    player.gold += rewards.gold;
                    this.gainExp(player, rewards.exp);
                    this.clearFacility(slot);
                    this.createFloatingText("摧毁", slot.mesh.position, "#ff4757");
                    this.log(`攻破并摧毁了敌方 ${name}，获得 ${rewards.gold}G 和 ${rewards.exp}EXP。胜利不消耗行动。`);
                    this.updateUI();
                    this.finishAction(false);
                } else {
                    this.log("挑战失败，本次行动结束。");
                    this.updateUI();
                    this.finishAction(true);
                }
            },

            createBuildingBattleEnemy(slot) {
                const preview = this.getBuildingBattlePreview(slot);
                return {
                    name: preview.hasGuard ? `${this.getFacilityName(slot)}城墙` : `${this.getFacilityName(slot)}城墙`,
                    hp: preview.wallHp,
                    maxHp: preview.wallHp,
                    atk: preview.atk,
                    facilityType: slot.type,
                    facilityName: this.getFacilityName(slot),
                    wallHp: preview.wallHp,
                    wallMaxHp: preview.wallHp,
                    wallAtk: preview.wallAtk,
                    guardHp: preview.guardHp,
                    guardMaxHp: preview.guardHp,
                    guardAtk: preview.guardPhaseAtk,
                    wallArmor: preview.wallArmor,
                    guardArmor: preview.guardArmor,
                    dodgeChance: preview.dodgeChance,
                    counterBonus: preview.counterBonus,
                    roleCounts: preview.roleCounts,
                    hasGuard: preview.hasGuard,
                    phase: 'wall',
                    slot,
                    meshGroup: slot.facilityMesh || slot.mesh
                };
            },

            createEnemyBattleState(enemy, kind) {
                if (kind === 'facility' && enemy.wallHp) {
                    return {
                        name: `${enemy.facilityName}城墙`,
                        hp: enemy.wallHp,
                        maxHp: enemy.wallMaxHp || enemy.wallHp,
                        atk: enemy.atk || enemy.wallAtk || 4,
                        phase: 'wall',
                        phaseLabel: enemy.hasGuard ? '先破城墙，再逼出守军' : '摧毁城墙即可获胜',
                        intentLabel: '',
                        facilityType: enemy.facilityType,
                        facilityName: enemy.facilityName,
                        wallHp: enemy.wallHp,
                        wallMaxHp: enemy.wallMaxHp || enemy.wallHp,
                        wallAtk: enemy.wallAtk || enemy.atk || 4,
                        guardHp: enemy.guardHp || 0,
                        guardMaxHp: enemy.guardMaxHp || enemy.guardHp || 0,
                        guardAtk: enemy.guardAtk || enemy.atk || 4,
                        wallArmor: enemy.wallArmor || 0,
                        guardArmor: enemy.guardArmor || 0,
                        dodgeChance: enemy.dodgeChance || 0,
                        counterBonus: enemy.counterBonus || 0,
                        roleCounts: enemy.roleCounts || { SHIELD: 0, SPEAR: 0, SCOUT: 0, total: 0 },
                        hasGuard: !!enemy.hasGuard
                    };
                }

                return {
                    name: enemy.name,
                    hp: enemy.hp,
                    maxHp: enemy.maxHp || enemy.hp,
                    atk: enemy.atk || 4,
                    phase: 'single',
                    phaseLabel: kind === 'monster' ? '击败野怪即可清空地块' : '常规战斗',
                    intentLabel: '',
                    facilityType: enemy.facilityType || null
                };
            },

            applyDamageToEnemyState(enemyState, damage) {
                const outcome = {
                    defeated: false,
                    stageBroken: false,
                    stageShifted: false
                };
                if (damage <= 0) return outcome;

                enemyState.hp -= damage;
                if (enemyState.phase === 'wall') {
                    enemyState.wallHp = Math.max(0, enemyState.hp);
                    if (enemyState.hp <= 0) {
                        outcome.stageBroken = true;
                        if (enemyState.hasGuard && enemyState.guardHp > 0) {
                            const overflow = Math.max(0, -enemyState.hp);
                            enemyState.phase = 'guard';
                            enemyState.name = `${enemyState.facilityName}守军`;
                            enemyState.maxHp = enemyState.guardMaxHp;
                            enemyState.hp = Math.max(0, enemyState.guardHp - overflow);
                            enemyState.guardHp = enemyState.hp;
                            enemyState.atk = enemyState.guardAtk;
                            enemyState.phaseLabel = '守军离开城墙掩体，开始正面作战';
                            outcome.stageShifted = enemyState.hp > 0;
                            if (enemyState.hp <= 0) outcome.defeated = true;
                            return outcome;
                        }
                        outcome.defeated = true;
                        enemyState.hp = 0;
                        return outcome;
                    }
                    return outcome;
                }

                if (enemyState.phase === 'guard') {
                    enemyState.guardHp = Math.max(0, enemyState.hp);
                }
                if (enemyState.hp <= 0) {
                    enemyState.hp = 0;
                    outcome.defeated = true;
                }
                return outcome;
            },

            resolveFacilityDamage(enemyState, rawDamage) {
                if (!enemyState || rawDamage <= 0) {
                    return { damage: Math.max(0, rawDamage), note: '' };
                }

                let damage = rawDamage;
                const notes = [];
                if (enemyState.phase === 'wall') {
                    const blocked = Math.min(Math.max(0, damage - 1), enemyState.wallArmor || 0);
                    if (blocked > 0) {
                        damage -= blocked;
                        notes.push(`盾墙减伤 ${blocked}`);
                    }
                } else if (enemyState.phase === 'guard') {
                    if ((enemyState.dodgeChance || 0) > 0 && Math.random() < enemyState.dodgeChance) {
                        const evade = Math.max(1, Math.floor(damage * 0.45));
                        damage = Math.max(1, damage - evade);
                        notes.push(`斥候闪避 ${evade}`);
                    }
                    const blocked = Math.min(Math.max(0, damage - 1), enemyState.guardArmor || 0);
                    if (blocked > 0) {
                        damage -= blocked;
                        notes.push(`盾卫格挡 ${blocked}`);
                    }
                }

                return {
                    damage: Math.max(1, damage),
                    note: notes.join(' / ')
                };
            },

            async handleFacilityBattleStageShift(enemyState, enemyTarget) {
                if (enemyState.phase !== 'guard') return;
                this.log(`${enemyState.facilityName} 的城墙被攻破，守军被迫出阵！`);
                this.createFloatingText('城墙破碎!', enemyTarget.position || enemyTarget, '#ff9f43');
                this.showHitEffect(enemyTarget, 0xff9f43);
                await this.focusBattleCamera(enemyTarget, 1.84, 240);
                await this.wait(220);
                this.createFloatingText('守军出阵!', enemyTarget.position || enemyTarget, '#1e90ff');
                await this.focusBattleCamera(enemyTarget, 1.7, 220);
                await this.wait(180);
            },

            captureBattleSnapshot(attacker, enemyMesh) {
                const mapObjects = [
                    ...this.roadSegments,
                    ...this.nodes.map(n => n.mesh),
                    ...this.slots.map(s => s.mesh),
                    ...this.slots.map(s => s.facilityMesh).filter(Boolean),
                    ...this.monsters.map(m => m.meshGroup).filter(Boolean)
                ].filter(obj => obj !== attacker.meshGroup && obj !== enemyMesh);
                const bystanders = this.players
                    .map(player => player.meshGroup)
                    .filter(mesh => mesh && mesh !== attacker.meshGroup && mesh !== enemyMesh);

                return {
                    camera: {
                        position: this.camera.position.clone(),
                        zoom: this.camera.zoom
                    },
                    attacker: {
                        mesh: attacker.meshGroup,
                        position: attacker.meshGroup.position.clone(),
                        rotation: attacker.meshGroup.rotation.clone(),
                        scale: attacker.meshGroup.scale.clone()
                    },
                    enemy: enemyMesh ? {
                        mesh: enemyMesh,
                        position: enemyMesh.position.clone(),
                        rotation: enemyMesh.rotation.clone(),
                        scale: enemyMesh.scale.clone()
                    } : null,
                    mapObjects: mapObjects.map((mesh, index) => ({
                        mesh,
                        index,
                        position: mesh.position.clone(),
                        visible: mesh.visible
                    })),
                    bystanders: bystanders.map((mesh, index) => ({
                        mesh,
                        index,
                        position: mesh.position.clone(),
                        rotation: mesh.rotation.clone(),
                        scale: mesh.scale.clone(),
                        visible: mesh.visible
                    }))
                };
            },

            createBattleFloor() {
                if (this.battleFloor) this.scene.remove(this.battleFloor);
                const group = new THREE.Group();
                const base = this.createToonBox(10, 0.35, 6, 0x9be7a5);
                base.position.set(0, -0.18, 0);
                const stripe = this.createToonBox(8.4, 0.08, 0.42, 0xf7f1e3, false);
                stripe.position.set(0, 0.06, 0);
                const heroMark = this.createToonBox(2.4, 0.1, 1.4, 0x70a1ff, false);
                heroMark.position.set(-2.8, 0.11, 1.25);
                const enemyMark = this.createToonBox(2.4, 0.1, 1.4, 0xff6b81, false);
                enemyMark.position.set(2.8, 0.11, -1.25);
                group.add(base, stripe, heroMark, enemyMark);
                group.position.set(5, -8, 5);
                this.scene.add(group);
                this.battleFloor = group;
                return group;
            },

            async enterBattleScene(attacker, enemy) {
                const enemyMesh = enemy.meshGroup || null;
                this.battleSnapshot = this.captureBattleSnapshot(attacker, enemyMesh);
                this.battleCameraFocus = attacker.meshGroup.position.clone();
                const floor = this.createBattleFloor();

                this.battleSnapshot.mapObjects.forEach(({ mesh, index, position }) => {
                    this.stopTileFloat(mesh);
                    new TWEEN.Tween(mesh.position)
                        .to({ y: position.y - 10 }, 420)
                        .delay(index * 14)
                        .easing(TWEEN.Easing.Back.In)
                        .start();
                });
                this.battleSnapshot.bystanders.forEach(({ mesh, index, position }) => {
                    new TWEEN.Tween(mesh.position)
                        .to({ y: position.y - 9 }, 360)
                        .delay(index * 36)
                        .easing(TWEEN.Easing.Back.In)
                        .start();
                });

                new TWEEN.Tween(floor.position)
                    .to({ x: 5, y: 0, z: 5 }, 620)
                    .easing(TWEEN.Easing.Elastic.Out)
                    .start();

                await this.wait(360);
                const heroPos = new THREE.Vector3(2.4, 0.35, 7.0);
                const enemyPos = new THREE.Vector3(7.4, 0.55, 3.0);

                new TWEEN.Tween(attacker.meshGroup.position)
                    .to({ x: heroPos.x, y: heroPos.y, z: heroPos.z }, 620)
                    .easing(TWEEN.Easing.Back.Out)
                    .start();
                new TWEEN.Tween(attacker.meshGroup.rotation)
                    .to({ y: -0.75 }, 420)
                    .start();

                if (enemyMesh) {
                    new TWEEN.Tween(enemyMesh.position)
                        .to({ x: enemyPos.x, y: enemyPos.y, z: enemyPos.z }, 620)
                        .easing(TWEEN.Easing.Back.Out)
                        .start();
                    new TWEEN.Tween(enemyMesh.rotation)
                        .to({ y: 2.35 }, 420)
                        .start();
                }

                this.focusBattleCamera(new THREE.Vector3(4.9, 0.4, 5.0), 1.25, 520);
                await this.wait(700);
            },

            focusBattleCamera(target, zoom = 1.35, duration = 360) {
                const targetPos = target.position ? target.position : target;
                if (!this.battleCameraFocus) {
                    this.battleCameraFocus = new THREE.Vector3(this.camera.position.x - 20, 0, this.camera.position.z - 20);
                }

                new TWEEN.Tween(this.battleCameraFocus)
                    .to({ x: targetPos.x, y: targetPos.y || 0, z: targetPos.z }, duration)
                    .easing(TWEEN.Easing.Cubic.Out)
                    .start();

                new TWEEN.Tween(this.camera)
                    .to({ zoom }, duration)
                    .easing(TWEEN.Easing.Cubic.Out)
                    .onUpdate(() => this.camera.updateProjectionMatrix())
                    .start();

                return this.wait(duration);
            },

            async exitBattleScene() {
                if (!this.battleSnapshot) return;
                this.setBattlePhase(BattlePhase.RESTORE);
                const snapshot = this.battleSnapshot;
                snapshot.mapObjects.forEach(({ mesh, position, visible, index }) => {
                    mesh.visible = visible;
                    new TWEEN.Tween(mesh.position)
                        .to({ x: position.x, y: position.y, z: position.z }, 440)
                        .delay(index * 10)
                        .easing(TWEEN.Easing.Back.Out)
                        .onComplete(() => {
                            if (mesh.userData.floatingTile) this.startTileFloat(mesh, index);
                        })
                        .start();
                });
                snapshot.bystanders.forEach(({ mesh, position, rotation, scale, visible, index }) => {
                    mesh.visible = visible;
                    new TWEEN.Tween(mesh.position)
                        .to({ x: position.x, y: position.y, z: position.z }, 420)
                        .delay(index * 34)
                        .easing(TWEEN.Easing.Back.Out)
                        .start();
                    mesh.rotation.copy(rotation);
                    mesh.scale.copy(scale);
                });

                new TWEEN.Tween(snapshot.attacker.mesh.position)
                    .to({ x: snapshot.attacker.position.x, y: snapshot.attacker.position.y, z: snapshot.attacker.position.z }, 440)
                    .easing(TWEEN.Easing.Back.Out)
                    .start();
                snapshot.attacker.mesh.rotation.copy(snapshot.attacker.rotation);
                snapshot.attacker.mesh.scale.copy(snapshot.attacker.scale);

                if (snapshot.enemy) {
                    new TWEEN.Tween(snapshot.enemy.mesh.position)
                        .to({ x: snapshot.enemy.position.x, y: snapshot.enemy.position.y, z: snapshot.enemy.position.z }, 440)
                        .easing(TWEEN.Easing.Back.Out)
                        .start();
                    snapshot.enemy.mesh.rotation.copy(snapshot.enemy.rotation);
                    snapshot.enemy.mesh.scale.copy(snapshot.enemy.scale);
                }

                if (this.battleFloor) {
                    new TWEEN.Tween(this.battleFloor.position)
                        .to({ y: -8 }, 360)
                        .easing(TWEEN.Easing.Back.In)
                        .onComplete(() => {
                            this.scene.remove(this.battleFloor);
                            this.battleFloor = null;
                        })
                        .start();
                }

                this.camera.position.copy(snapshot.camera.position);
                this.battleCameraFocus = null;
                new TWEEN.Tween(this.camera)
                    .to({ zoom: snapshot.camera.zoom }, 300)
                    .onUpdate(() => this.camera.updateProjectionMatrix())
                    .start();
                await this.wait(620);
                this.battleSnapshot = null;
            },

            getTauntLines(attacker, enemy, kind) {
                if (kind === 'monster') {
                    return {
                        hero: `${attacker.name}: 让开！这块地我要拿来扎营！`,
                        enemy: `${enemy.name}: 咕噜咕噜！先赢过我再说！`
                    };
                }
                const wallLine = enemy.name.includes('城墙')
                    ? `${enemy.name}: 墙不说话，但墙很硬！`
                    : `${enemy.name}: 守军在城墙后等你很久了！`;
                return {
                    hero: `${attacker.name}: 开门，或者我自己打进去！`,
                    enemy: wallLine
                };
            },

            async showTauntSequence(attacker, enemy, kind) {
                this.setBattlePhase(BattlePhase.TAUNT);
                const layer = document.getElementById('taunt-layer');
                const heroBox = document.getElementById('taunt-hero');
                const enemyBox = document.getElementById('taunt-enemy');
                const lines = this.getTauntLines(attacker, enemy, kind);
                const enemyName = enemy.name;
                const enemyFocus = enemy.meshGroup || enemy.slot?.mesh || attacker.meshGroup;
                layer.style.display = 'block';
                heroBox.className = 'taunt-box';
                enemyBox.className = 'taunt-box enemy';
                heroBox.dataset.speaker = attacker.name;
                enemyBox.dataset.speaker = enemyName;
                heroBox.innerText = '';
                enemyBox.innerText = '';
                await this.focusBattleCamera(attacker.meshGroup, 1.68, 340);
                await this.typeBattleText(heroBox, lines.hero);
                await this.wait(220);
                await this.focusBattleCamera(enemyFocus, 1.78, 340);
                await this.typeBattleText(enemyBox, lines.enemy);
                await this.wait(420);
                await this.focusBattleCamera(new THREE.Vector3(4.9, 0.4, 5.0), 1.25, 300);
                layer.style.display = 'none';
            },

            async typeBattleText(element, text) {
                element.innerText = '';
                for (let i = 0; i < text.length; i++) {
                    element.innerText += text[i];
                    await this.wait(24);
                }
            },

            resolveBattleChoice(choice) {
                if (!this.battleCommandResolver) return;
                const resolve = this.battleCommandResolver;
                this.battleCommandResolver = null;
                const battleUi = document.getElementById('battle-ui');
                battleUi.style.display = 'none';
                battleUi.innerHTML = '';
                resolve(choice);
            },

            chooseBattleCommand(command) {
                if (!this.battleCommandResolver) return;
                const attacker = this.battleContext?.attacker || this.players[this.currentPlayerIndex];
                if (command === 'skill') {
                    this.renderBattleCommandUi(attacker, 'skills');
                    return;
                }
                if (command === 'back') {
                    this.renderBattleCommandUi(attacker, 'commands');
                    return;
                }
                this.resolveBattleChoice(command);
            },

            waitForBattleCommand(attacker) {
                this.drawBattleCards(attacker, 3);
                this.renderBattleCommandUi(attacker, 'commands');
                return new Promise(resolve => {
                    this.battleCommandResolver = resolve;
                });
            },

            prepareBattleDeck(player) {
                player.drawPile = this.shuffleCards([...(player.deck || [])]);
                player.discardPile = [];
                this.battleHand = [];
            },

            shuffleCards(cards) {
                const shuffled = [...cards];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            },

            drawBattleCards(player, count = 3) {
                const hand = [];
                for (let i = 0; i < count; i++) {
                    if (player.drawPile.length === 0) {
                        player.drawPile = this.shuffleCards(player.discardPile);
                        player.discardPile = [];
                    }
                    if (player.drawPile.length === 0) break;
                    hand.push(player.drawPile.pop());
                }
                this.battleHand = hand;
                return hand;
            },

            renderBattleCards(player) {
                const battleUi = document.getElementById('battle-ui');
                const hand = this.drawBattleCards(player, 3);
                battleUi.innerHTML = '';
                const hud = document.createElement('div');
                hud.className = 'battle-deck-hud';
                hud.innerHTML = `
                    <div>抽牌堆 ${player.drawPile.length}</div>
                    <div>弃牌堆 ${player.discardPile.length}</div>
                    <div>手牌 ${hand.length}</div>
                `;
                battleUi.appendChild(hud);
                hand.forEach((cardId, index) => {
                    const card = this.cardLibrary[cardId];
                    const btn = document.createElement('button');
                    btn.className = 'battle-card';
                    btn.onclick = () => this.chooseBattleCard(index);
                    btn.innerHTML = `<strong>${card.name}</strong><em>${this.getCardKindLabel(card.kind)}</em><span>${card.text}</span>`;
                    battleUi.appendChild(btn);
                });

                const fleeBtn = document.createElement('button');
                fleeBtn.className = 'battle-card flee';
                fleeBtn.onclick = () => this.chooseBattleCommand('flee');
                fleeBtn.innerHTML = '<strong>撤退</strong><span>尝试脱离战斗。</span>';
                battleUi.appendChild(fleeBtn);
                battleUi.style.display = 'flex';
            },

            getBattleCommandCopy(command) {
                const copy = {
                    attack: {
                        title: '攻击',
                        text: '稳定的基础攻击，不依赖手牌。适合保底输出，或者先试探敌方城墙和守军特性。'
                    },
                    skill: {
                        title: '技能',
                        text: '从这回合抽到的手牌里挑一张打出。这里保留了卡牌构筑层，爆发、治疗、强化都从这里来。'
                    },
                    defend: {
                        title: '防御',
                        text: '摆出防御姿态，降低即将到来的反击伤害。对守军反扑或者枪兵重击尤其有用。'
                    },
                    flee: {
                        title: '逃跑',
                        text: '尝试脱离战斗。对野怪更容易成功，攻城战则风险更高。'
                    }
                };
                return copy[command] || copy.attack;
            },

            renderBattleCommandUi(player, mode = 'commands') {
                const battleUi = document.getElementById('battle-ui');
                battleUi.innerHTML = '';

                const commandStack = document.createElement('div');
                commandStack.className = 'battle-command-stack';

                const hud = document.createElement('div');
                hud.className = 'battle-deck-hud';
                hud.innerHTML = `
                    <div>抽牌堆 ${player.drawPile.length}</div>
                    <div>弃牌堆 ${player.discardPile.length}</div>
                    <div>手牌 ${this.battleHand.length}</div>
                `;
                commandStack.appendChild(hud);

                const commandGrid = document.createElement('div');
                commandGrid.className = 'battle-command-grid';
                [
                    { id: 'attack', label: '攻击', className: '' },
                    { id: 'skill', label: '技能', className: 'skill' },
                    { id: 'defend', label: '防御', className: 'defend' },
                    { id: 'flee', label: '逃跑', className: 'flee' }
                ].forEach(def => {
                    const btn = document.createElement('button');
                    btn.className = `battle-command ${def.className}`.trim();
                    btn.innerText = def.label;
                    btn.disabled = def.id === 'skill' && this.battleHand.length === 0;
                    btn.onclick = () => this.chooseBattleCommand(def.id);
                    commandGrid.appendChild(btn);
                });
                commandStack.appendChild(commandGrid);
                battleUi.appendChild(commandStack);

                const detailPanel = document.createElement('div');
                detailPanel.className = 'battle-detail-panel';

                const copyBox = document.createElement('div');
                copyBox.className = 'battle-detail-copy';
                const activeCopy = this.getBattleCommandCopy(mode === 'skills' ? 'skill' : 'attack');
                copyBox.innerHTML = `<strong>${activeCopy.title}</strong><span>${activeCopy.text}</span>`;
                detailPanel.appendChild(copyBox);

                const cardRow = document.createElement('div');
                cardRow.className = 'battle-skill-row';
                if (mode === 'skills') {
                    if (this.battleHand.length === 0) {
                        const empty = document.createElement('div');
                        empty.className = 'battle-detail-copy';
                        empty.innerHTML = '<strong>技能空档</strong><span>这一回合没有抽到可用手牌，可以退回去选择普通攻击、防御或逃跑。</span>';
                        cardRow.appendChild(empty);
                    } else {
                        this.battleHand.forEach((cardId, index) => {
                            const card = this.cardLibrary[cardId];
                            const btn = document.createElement('button');
                            btn.className = 'battle-card';
                            btn.onclick = () => this.chooseBattleCard(index);
                            btn.innerHTML = `<strong>${card.name}</strong><em>${this.getCardKindLabel(card.kind)}</em><span>${card.text}</span>`;
                            cardRow.appendChild(btn);
                        });
                    }
                    const backBtn = document.createElement('button');
                    backBtn.className = 'battle-card back';
                    backBtn.onclick = () => this.chooseBattleCommand('back');
                    backBtn.innerHTML = '<strong>返回</strong><span>回到攻击、技能、防御、逃跑四选一。</span>';
                    cardRow.appendChild(backBtn);
                } else {
                    const hint = document.createElement('div');
                    hint.className = 'battle-detail-copy';
                    hint.innerHTML = `<strong>技能预览</strong><span>本回合已抽到 ${this.battleHand.length} 张手牌。点“技能”后，再从这些卡里挑一张打出。</span>`;
                    cardRow.appendChild(hint);
                }
                detailPanel.appendChild(cardRow);
                battleUi.appendChild(detailPanel);
                battleUi.style.display = 'flex';
            },
