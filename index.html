            getCardKindLabel(kind) {
                const labels = {
                    attack: '攻击',
                    skill: '技能',
                    defend: '防御',
                    heal: '治疗',
                    buff: '强化'
                };
                return labels[kind] || '行动';
            },

            chooseBattleCard(index) {
                if (!this.battleCommandResolver) return;
                const cardId = this.battleHand[index];
                if (!cardId) return;
                this.resolveBattleChoice({ type: 'card', cardId });
            },

            getBattlePhaseLabel() {
                const labels = {
                    [BattlePhase.ENTER]: '入场',
                    [BattlePhase.TAUNT]: '叫嚣',
                    [BattlePhase.ATTACKER_TURN]: '我方行动',
                    [BattlePhase.ENEMY_TURN]: '敌方反击',
                    [BattlePhase.RESULT]: '结算',
                    [BattlePhase.RESTORE]: '复位'
                };
                return labels[this.battlePhase] || '战斗';
            },

            getHpPercent(current, max) {
                if (!max || max <= 0) return 0;
                return Math.max(0, Math.min(100, (current / max) * 100));
            },

            getEnemyBattleStatusLine(enemyState) {
                const phase = enemyState?.phaseLabel || '';
                const intent = enemyState?.intentLabel || '';
                if (phase && intent) return `${phase} / ${intent}`;
                return phase || intent;
            },

            updateBattleStatus(attacker, enemyState, round = 0) {
                const status = document.getElementById('battle-status');
                if (!status || !attacker || !enemyState) return;
                const attackerHp = Math.max(0, attacker.hp);
                const enemyHp = Math.max(0, enemyState.hp);
                const attackerPct = this.getHpPercent(attackerHp, attacker.maxHp);
                const enemyPct = this.getHpPercent(enemyHp, enemyState.maxHp);
                const phaseText = round > 0 ? `第${round}回合<br>${this.getBattlePhaseLabel()}` : this.getBattlePhaseLabel();
                status.innerHTML = `
                    <div class="battle-status-card">
                        <div class="battle-status-name"><span>${this.escapeHtml(attacker.name)}</span><span>${attackerHp}/${attacker.maxHp}</span></div>
                        <div class="battle-status-bar"><div class="battle-status-fill" style="width:${attackerPct}%"></div></div>
                    </div>
                    <div class="battle-status-phase">${phaseText}</div>
                    <div class="battle-status-card enemy">
                        <div class="battle-status-name"><span>${this.escapeHtml(enemyState.name)}</span><span>${enemyHp}/${enemyState.maxHp}</span></div>
                        <div class="battle-status-bar"><div class="battle-status-fill" style="width:${enemyPct}%"></div></div>
                        <div class="battle-status-sub">${this.escapeHtml(this.getEnemyBattleStatusLine(enemyState) || '')}</div>
                    </div>
                `;
                status.style.display = 'flex';
            },

            hideBattleStatus() {
                const status = document.getElementById('battle-status');
                if (!status) return;
                status.style.display = 'none';
                status.innerHTML = '';
            },

            async chooseAutoBattleCommand(attacker, enemyState, kind, round) {
                await this.wait(420);
                if (attacker.hp < attacker.maxHp * 0.28 && kind === 'monster') return 'flee';
                if (attacker.hp < attacker.maxHp * 0.35 && round % 2 === 0) return 'defend';
                if (enemyState.hp > attacker.atk + 12 && Math.random() < 0.45) return 'skill';
                return 'attack';
            },

            getBattleResultPayload(victory, fled, attacker, enemyState) {
                if (fled) {
                    return {
                        className: 'flee',
                        kicker: '战术撤离',
                        title: '脱离战场',
                        sub: `${attacker.name} 暂时退出了这场战斗，准备下次再来。`
                    };
                }
                if (victory) {
                    return {
                        className: 'victory',
                        kicker: '战斗结束',
                        title: '胜利',
                        sub: `${attacker.name} 压住了 ${enemyState.name}，这一轮的气势彻底打出来了。`
                    };
                }
                return {
                    className: 'defeat',
                    kicker: '战斗结束',
                    title: '败退',
                    sub: `${attacker.name} 被 ${enemyState.name} 顶了回来，这一轮只能先收住阵脚。`
                };
            },

            chooseEnemyBattleAction(enemyState, kind, round) {
                if (kind === 'monster') {
                    if (enemyState.hp <= enemyState.maxHp * 0.45) {
                        return {
                            type: 'attack',
                            name: '狂扑',
                            label: '野怪蓄力猛扑',
                            damageBonus: 3,
                            blockPierce: 1
                        };
                    }
                    return {
                        type: 'attack',
                        name: round % 2 === 0 ? '撕咬' : '拍击',
                        label: '野怪正面突袭',
                        damageBonus: round % 2 === 0 ? 2 : 0,
                        blockPierce: 0
                    };
                }

                if (enemyState.phase === 'wall') {
                    if (enemyState.facilityType === 'FORTRESS' && round % 2 === 0) {
                        return {
                            type: 'fortify',
                            name: '封门加固',
                            label: '堡垒正在用厚门与垛墙拖延时间',
                            heal: 10 + Math.min(14, Math.floor(enemyState.wallMaxHp * 0.1))
                        };
                    }
                    if (enemyState.facilityType === 'WORKSHOP' && enemyState.wallHp < enemyState.maxHp && round % 2 === 0) {
                        return {
                            type: 'fortify',
                            name: '紧急修墙',
                            label: '城防工坊正在修补墙体',
                            heal: 8 + Math.min(10, Math.floor(enemyState.wallMaxHp * 0.08))
                        };
                    }
                    if ((enemyState.roleCounts?.SHIELD || 0) > 0 && round % 3 === 1) {
                        return {
                            type: 'attack',
                            name: '盾墙震击',
                            label: '盾卫顶在墙后发动重撞',
                            damageBonus: 2 + enemyState.roleCounts.SHIELD,
                            blockPierce: 1
                        };
                    }
                    return {
                        type: 'attack',
                        name: '碎石压落',
                        label: '城墙上有碎石滚落',
                        damageBonus: 1,
                        blockPierce: 0
                    };
                }

                if (enemyState.facilityType === 'COMMAND' && round % 2 === 1) {
                    return {
                        type: 'buff',
                        name: '战旗号令',
                        label: '指挥所守军正借号角整队反扑',
                        atkGain: 2 + Math.min(4, enemyState.roleCounts?.total || 0),
                        heal: 4 + (enemyState.roleCounts?.total || 0) * 2
                    };
                }
                if (enemyState.facilityType === 'BARRACKS' && round % 2 === 0) {
                    return {
                        type: 'buff',
                        name: '战吼整队',
                        label: '兵营守军正在重整队形',
                        atkGain: 2 + Math.min(3, enemyState.roleCounts?.total || 0),
                        heal: 5 + (enemyState.roleCounts?.total || 0) * 2
                    };
                }
                if ((enemyState.roleCounts?.SPEAR || 0) > 0) {
                    return {
                        type: 'attack',
                        name: '长枪突刺',
                        label: '枪兵瞄准破绽发起穿刺',
                        damageBonus: 3 + enemyState.roleCounts.SPEAR,
                        blockPierce: 2 + enemyState.roleCounts.SPEAR
                    };
                }
                if ((enemyState.roleCounts?.SCOUT || 0) > 0 && round % 2 === 1) {
                    return {
                        type: 'attack',
                        name: '影袭突进',
                        label: '斥候正在绕侧突袭',
                        damageBonus: 2 + enemyState.roleCounts.SCOUT,
                        blockPierce: 1
                    };
                }
                return {
                    type: 'attack',
                    name: '正面反击',
                    label: '守军准备正面反扑',
                    damageBonus: 1,
                    blockPierce: 0
                };
            },

            async showBattleResult(victory, fled = false, attacker = null, enemyState = null) {
                this.setBattlePhase(BattlePhase.RESULT, { victory, fled });
                const result = document.getElementById('battle-result');
                const actingAttacker = attacker || this.battleContext?.attacker || this.players[this.currentPlayerIndex];
                const actingEnemy = enemyState || this.battleContext?.enemy || { name: '对手' };
                const payload = this.getBattleResultPayload(victory, fled, actingAttacker, actingEnemy);

                if (this.battleSnapshot) {
                    const winnerMesh = victory
                        ? this.battleSnapshot.attacker.mesh
                        : (this.battleSnapshot.enemy ? this.battleSnapshot.enemy.mesh : this.battleSnapshot.attacker.mesh);
                    const loserMesh = victory
                        ? (this.battleSnapshot.enemy ? this.battleSnapshot.enemy.mesh : null)
                        : this.battleSnapshot.attacker.mesh;
                    if (winnerMesh) {
                        await this.focusBattleCamera(winnerMesh, victory ? 1.86 : 1.7, 260);
                    }
                    if (victory) {
                        this.cheerCombatant(winnerMesh);
                        if (loserMesh) this.slumpCombatant(loserMesh);
                        this.spawnConfetti(winnerMesh.position);
                    } else if (!fled) {
                        this.slumpCombatant(loserMesh);
                        if (winnerMesh && winnerMesh !== loserMesh) this.cheerCombatant(winnerMesh);
                    }
                }

                result.className = '';
                result.innerHTML = `
                    <div class="battle-result-burst"></div>
                    <span class="battle-result-kicker">${this.escapeHtml(payload.kicker)}</span>
                    <span class="battle-result-title">${this.escapeHtml(payload.title)}</span>
                    <span class="battle-result-sub">${this.escapeHtml(payload.sub)}</span>
                `;
                void result.offsetWidth;
                result.className = `${payload.className} show`;

                await this.wait(1180);
                result.className = '';
                result.style.display = 'none';
                result.innerHTML = '';
            },

            cheerCombatant(mesh) {
                new TWEEN.Tween(mesh.scale)
                    .to({ x: 1.18, y: 1.28, z: 1.18 }, 160)
                    .yoyo(true)
                    .repeat(3)
                    .easing(TWEEN.Easing.Back.Out)
                    .start();
                new TWEEN.Tween(mesh.rotation)
                    .to({ z: 0.22 }, 120)
                    .yoyo(true)
                    .repeat(5)
                    .start();
            },

            slumpCombatant(mesh) {
                new TWEEN.Tween(mesh.scale)
                    .to({ x: 1.18, y: 0.72, z: 1.18 }, 260)
                    .easing(TWEEN.Easing.Bounce.Out)
                    .start();
                new TWEEN.Tween(mesh.rotation)
                    .to({ z: -0.45 }, 260)
                    .easing(TWEEN.Easing.Back.Out)
                    .start();
            },

            spawnConfetti(origin) {
                const colors = [0xff4757, 0x1e90ff, 0x2ed573, 0xeccc68, 0xa55eea];
                for (let i = 0; i < 18; i++) {
                    const confetti = this.createToonBox(0.12, 0.04, 0.18, colors[i % colors.length], false);
                    confetti.position.set(origin.x, origin.y + 1.2, origin.z);
                    this.scene.add(confetti);
                    new TWEEN.Tween(confetti.position)
                        .to({
                            x: origin.x + (Math.random() - 0.5) * 4,
                            y: origin.y + 1.2 + Math.random() * 2.2,
                            z: origin.z + (Math.random() - 0.5) * 3
                        }, 520)
                        .easing(TWEEN.Easing.Quadratic.Out)
                        .onComplete(() => {
                            new TWEEN.Tween(confetti.position)
                                .to({ y: origin.y - 0.2 }, 620)
                                .easing(TWEEN.Easing.Quadratic.In)
                                .onComplete(() => this.scene.remove(confetti))
                                .start();
                        })
                        .start();
                    new TWEEN.Tween(confetti.rotation)
                        .to({ x: Math.PI * 4, y: Math.PI * 3, z: Math.PI * 2 }, 1000)
                        .start();
                }
            },

            showDefendEffect(meshGroup, blockValue = 0) {
                if (!meshGroup) return;
                const ring = new THREE.Mesh(
                    new THREE.TorusGeometry(0.74, 0.055, 8, 28),
                    new THREE.MeshBasicMaterial({ color: 0x70a1ff, transparent: true, opacity: 0.88 })
                );
                ring.position.set(meshGroup.position.x, meshGroup.position.y + 0.62, meshGroup.position.z);
                ring.rotation.x = Math.PI / 2;
                ring.scale.set(0.25, 0.25, 0.25);
                this.scene.add(ring);
                this.createFloatingText(blockValue > 0 ? `格挡 ${blockValue}` : '防御', meshGroup.position, '#70a1ff');

                new TWEEN.Tween(ring.scale)
                    .to({ x: 1.25, y: 1.25, z: 1.25 }, 360)
                    .easing(TWEEN.Easing.Back.Out)
                    .start();
                new TWEEN.Tween(ring.material)
                    .to({ opacity: 0 }, 420)
                    .delay(120)
                    .onComplete(() => this.scene.remove(ring))
                    .start();
                new TWEEN.Tween(meshGroup.scale)
                    .to({ x: 1.08, y: 0.92, z: 1.08 }, 110)
                    .yoyo(true)
                    .repeat(1)
                    .easing(TWEEN.Easing.Quadratic.Out)
                    .start();
            },

            showHitEffect(target, color = 0xff4757) {
                const origin = target.position ? target.position : target;
                for (let i = 0; i < 8; i++) {
                    const spark = this.createToonBox(0.12, 0.08, 0.12, color, false);
                    spark.position.set(origin.x, origin.y + 0.68, origin.z);
                    this.scene.add(spark);
                    new TWEEN.Tween(spark.position)
                        .to({
                            x: origin.x + (Math.random() - 0.5) * 1.3,
                            y: origin.y + 0.7 + Math.random() * 0.9,
                            z: origin.z + (Math.random() - 0.5) * 1.3
                        }, 260)
                        .easing(TWEEN.Easing.Quadratic.Out)
                        .onComplete(() => {
                            new TWEEN.Tween(spark.position)
                                .to({ y: origin.y + 0.05 }, 260)
                                .easing(TWEEN.Easing.Quadratic.In)
                                .onComplete(() => this.scene.remove(spark))
                                .start();
                        })
                        .start();
                }
                if (target.position) {
                    const start = target.position.clone();
                    new TWEEN.Tween(target.position)
                        .to({ x: start.x + 0.12, z: start.z - 0.12 }, 55)
                        .yoyo(true)
                        .repeat(3)
                        .onComplete(() => target.position.copy(start))
                        .start();
                }
            },

            async playCounterAttack(enemyMesh, attackerMesh) {
                if (enemyMesh) {
                    this.bumpCombatant(enemyMesh, attackerMesh.position);
                    await this.wait(150);
                    return;
                }
                await this.wait(120);
            },

            async resolveBattleShell({ attacker, enemy, sourceSlot, kind }) {
                this.transitionTo(TurnState.BATTLE, kind === 'monster' ? '野怪战斗' : '建筑挑战');
                this.setBattlePhase(BattlePhase.ENTER, {
                    attacker,
                    enemy,
                    kind,
                    round: 0
                });
                this.stopSlotHighlightOnly();
                document.getElementById('btn-end').style.display = 'none';

                const enemyState = this.createEnemyBattleState(enemy, kind);
                this.log(`${attacker.name} 向 ${enemyState.name} 发起战斗！`);
                this.updateBattleStatus(attacker, enemyState, 0);

                await this.enterBattleScene(attacker, enemy);
                await this.showTauntSequence(attacker, enemy, kind);
                if (attacker.isPlayer) this.prepareBattleDeck(attacker);
                const enemyMesh = enemy.meshGroup || (sourceSlot ? sourceSlot.mesh : null);
                const enemyPos = enemyMesh ? enemyMesh.position : attacker.meshGroup.position;

                let fled = false;
                for (let round = 1; round <= 8 && attacker.hp > 0 && enemyState.hp > 0; round++) {
                    this.setBattlePhase(BattlePhase.ATTACKER_TURN, { round });
                    enemyState.intentLabel = '';
                    this.updateBattleStatus(attacker, enemyState, round);
                    this.log(`选择行动：${attacker.name} HP ${attacker.hp}/${attacker.maxHp}，${enemyState.name} HP ${Math.max(0, enemyState.hp)}/${enemyState.maxHp}`);
                    const command = attacker.isPlayer
                        ? await this.waitForBattleCommand(attacker)
                        : await this.chooseAutoBattleCommand(attacker, enemyState, kind, round);
                    if (attacker.isPlayer && this.battleHand.length > 0) {
                        attacker.discardPile.push(...this.battleHand);
                        this.battleHand = [];
                    }
                    let defend = false;
                    let blockValue = 0;
                    let playerDmg = 0;

                    if (command?.type === 'card') {
                        const card = this.cardLibrary[command.cardId];
                        this.log(`${attacker.name} 打出《${card.name}》。`);
                        if (card.kind === 'attack') {
                            playerDmg = Math.max(4, attacker.atk + card.power + Math.floor(Math.random() * 5));
                            await this.focusBattleCamera(attacker.meshGroup, 1.62, 220);
                        } else if (card.kind === 'skill') {
                            playerDmg = Math.max(8, attacker.atk + card.power + Math.floor(Math.random() * 7));
                            await this.focusBattleCamera(attacker.meshGroup, 1.86, 260);
                        } else if (card.kind === 'defend') {
                            defend = true;
                            blockValue = card.block || 7;
                            await this.focusBattleCamera(attacker.meshGroup, 1.58, 220);
                        } else if (card.kind === 'heal') {
                            const before = attacker.hp;
                            attacker.hp = Math.min(attacker.maxHp, attacker.hp + card.heal);
                            this.createFloatingText(`+${attacker.hp - before}HP`, attacker.meshGroup.position, "#2ed573");
                            await this.focusBattleCamera(attacker.meshGroup, 1.5, 220);
                        } else if (card.kind === 'buff') {
                            attacker.atk += card.atk;
                            this.createFloatingText(`ATK +${card.atk}`, attacker.meshGroup.position, "#ffb142");
                            await this.focusBattleCamera(attacker.meshGroup, 1.5, 220);
                        }
                    } else if (command === 'flee') {
                        await this.focusBattleCamera(attacker.meshGroup, 1.45, 220);
                        fled = Math.random() < 0.55 || kind === 'monster';
                        this.log(fled ? "成功撤退！" : "撤退失败！");
                        if (fled) break;
                    } else if (command === 'defend') {
                        defend = true;
                        blockValue = 7;
                        this.log(`${attacker.name} 摆出防御姿态。`);
                        await this.focusBattleCamera(attacker.meshGroup, 1.58, 220);
                    } else if (command === 'skill') {
                        playerDmg = Math.max(8, attacker.atk + 8 + Math.floor(Math.random() * 8));
                        this.log(`${attacker.name} 释放技能！`);
                        await this.focusBattleCamera(attacker.meshGroup, 1.86, 260);
                    } else if (command === 'attack') {
                        playerDmg = Math.max(4, attacker.atk + Math.floor(Math.random() * 6));
                        await this.focusBattleCamera(attacker.meshGroup, 1.62, 220);
                    } else {
                        this.log("指令失效，默认防御。");
                        defend = true;
                        blockValue = 7;
                        await this.focusBattleCamera(attacker.meshGroup, 1.5, 180);
                    }

                    if (defend) {
                        this.showDefendEffect(attacker.meshGroup, blockValue);
                        await this.wait(120);
                    }

                    if (playerDmg > 0) {
                        let dealtDamage = playerDmg;
                        if (kind === 'facility') {
                            const damageResult = this.resolveFacilityDamage(enemyState, playerDmg);
                            dealtDamage = damageResult.damage;
                            if (damageResult.note) {
                                this.log(`${enemyState.name} ${damageResult.note}。`);
                                this.createFloatingText(damageResult.note, enemyPos, "#70a1ff");
                            }
                        }
                        const strikeOutcome = this.applyDamageToEnemyState(enemyState, dealtDamage);
                        this.updateBattleStatus(attacker, enemyState, round);
                        this.createFloatingText(`-${dealtDamage}`, enemyPos, "#ff4757");
                        this.bumpCombatant(attacker.meshGroup, enemyPos);
                        this.showHitEffect(enemyMesh || enemyPos, 0xff6b81);
                        await this.focusBattleCamera(enemyMesh || enemyPos, 1.72, 220);
                        await this.wait(300);
                        if (strikeOutcome.stageShifted) {
                            this.updateBattleStatus(attacker, enemyState, round);
                            await this.handleFacilityBattleStageShift(enemyState, enemyMesh || enemyPos);
                        }
                    }

                    if (enemyState.hp <= 0 || fled) break;

                    this.setBattlePhase(BattlePhase.ENEMY_TURN, { round });
                    const enemyAction = this.chooseEnemyBattleAction(enemyState, kind, round);
                    enemyState.intentLabel = enemyAction.label || enemyAction.name;
                    this.updateBattleStatus(attacker, enemyState, round);
                    await this.focusBattleCamera(enemyMesh || enemyPos, 1.58, 220);
                    this.log(`${enemyState.name} 使出了 ${enemyAction.name}！`);
                    this.createFloatingText(enemyAction.name, enemyPos, "#ff9f43");

                    if (enemyAction.type === 'fortify') {
                        enemyState.hp = Math.min(enemyState.maxHp, enemyState.hp + enemyAction.heal);
                        if (enemyState.phase === 'wall') enemyState.wallHp = enemyState.hp;
                        this.updateBattleStatus(attacker, enemyState, round);
                        this.showDefendEffect(enemyMesh || attacker.meshGroup, enemyAction.heal);
                        this.createFloatingText(`+${enemyAction.heal}`, enemyPos, "#2ed573");
                        await this.wait(360);
                        continue;
                    }

                    if (enemyAction.type === 'buff') {
                        enemyState.atk += enemyAction.atkGain;
                        enemyState.hp = Math.min(enemyState.maxHp, enemyState.hp + enemyAction.heal);
                        if (enemyState.phase === 'guard') enemyState.guardHp = enemyState.hp;
                        this.updateBattleStatus(attacker, enemyState, round);
                        this.createFloatingText(`ATK +${enemyAction.atkGain}`, enemyPos, "#ffb142");
                        this.createFloatingText(`+${enemyAction.heal}`, enemyPos, "#2ed573");
                        await this.wait(360);
                        continue;
                    }

                    const effectiveBlock = Math.max(0, (defend ? blockValue : 0) - (enemyAction.blockPierce || 0));
                    const incoming = Math.max(1, enemyState.atk + (enemyAction.damageBonus || 0) + Math.floor(Math.random() * 4) - effectiveBlock);
                    await this.playCounterAttack(enemyMesh, attacker.meshGroup);
                    attacker.hp -= incoming;
                    this.updateBattleStatus(attacker, enemyState, round);
                    this.screenFlash();
                    this.createFloatingText(`-${incoming}`, attacker.meshGroup.position, "#ff0000");
                    if ((enemyAction.blockPierce || 0) > 0 && defend) {
                        this.createFloatingText(`破防 ${enemyAction.blockPierce}`, attacker.meshGroup.position, "#ffa502");
                    }
                    this.showHitEffect(attacker.meshGroup, defend ? 0x70a1ff : 0xff4757);
                    await this.focusBattleCamera(attacker.meshGroup, 1.72, 180);
                    await this.wait(380);
                }

                document.getElementById('battle-ui').style.display = 'none';
                document.getElementById('battle-ui').innerHTML = '';
                const victory = !fled && enemyState.hp <= 0 && attacker.hp > 0;
                if (attacker.hp <= 0) {
                    attacker.hp = Math.max(1, Math.floor(attacker.maxHp * 0.35));
                }
                this.setBattlePhase(BattlePhase.RESULT, { victory, fled });
                this.updateBattleStatus(attacker, enemyState, this.battleContext?.round || 0);

                await this.showBattleResult(victory, fled, attacker, enemyState);
                await this.exitBattleScene();
                this.hideBattleStatus();
                this.setBattlePhase(BattlePhase.NONE);
                this.battleContext = null;
                this.transitionTo(TurnState.ACTION_SELECT);
                return victory;
            },

            bumpCombatant(meshGroup, targetPos) {
                const start = meshGroup.position.clone();
                const x = start.x + (targetPos.x - start.x) * 0.25;
                const z = start.z + (targetPos.z - start.z) * 0.25;
                new TWEEN.Tween(meshGroup.position)
                    .to({ x, z }, 120)
                    .yoyo(true)
                    .repeat(1)
                    .easing(TWEEN.Easing.Quadratic.Out)
                    .start();
            },

            wait(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            },

            upgradeSelectedFacility() {
                const player = this.players[this.currentPlayerIndex];
                const slot = this.selectedSlot;
                if (!slot || slot.owner !== player || slot.type === 'EMPTY') {
                    this.log("只能升级自己的建筑。");
                    return;
                }

                if (this.isFacilityMaxLevel(slot)) {
                    this.log(`${this.getFacilityName(slot)} 已经满级，不能继续升级。`);
                    return;
                }

                const cost = this.getUpgradeCost(slot);
                if (player.gold < cost) {
                    this.log(`金币不足，升级需要 ${cost}G。`);
                    return;
                }

                this.performUpgradeFacility(player, slot);
                document.getElementById('build-menu').style.display = 'none';
                this.updateUI();
                this.finishAction(true);
            },

            performUpgradeFacility(player, slot) {
                const cost = this.getUpgradeCost(slot);
                player.gold -= cost;
                slot.level += 1;
                const defenseGain = this.getUpgradeDefenseGain(slot);
                slot.defense += defenseGain;
                if (this.canFacilityHostGuards(slot)) slot.guardSlots = this.getGuardCapacity(slot);
                this.updateFacilityVisual(slot);
                this.createFloatingText(`Lv.${slot.level}`, slot.mesh.position, "#2ed573");
                this.log(`花费 ${cost}G 将 ${this.getFacilityName(slot)} 升到 Lv.${slot.level}，防御 +${defenseGain}。`);
            },

            recruitGuardForSelectedFacility() {
                const player = this.players[this.currentPlayerIndex];
                const slot = this.selectedSlot;
                if (!slot || slot.owner !== player || slot.type === 'EMPTY') {
                    this.log("只能给自己的建筑招募守军。");
                    return;
                }
                if (!this.canFacilityHostGuards(slot)) {
                    this.log(`${this.getFacilityName(slot)} 不能驻防守军，但可以快速升级防御。`);
                    return;
                }

                const capacity = this.getGuardCapacity(slot);
                if (slot.guards.length >= capacity) {
                    this.log("守军已经满员。升级建筑可以扩充驻防上限。");
                    return;
                }

                const cost = this.getGuardRecruitCost(slot);
                if (player.gold < cost) {
                    this.log(`金币不足，招募守军需要 ${cost}G。`);
                    return;
                }

                this.openGuardRecruitMenu(slot, player);
            },

            openGuardRecruitMenu(slot, player) {
                this.resetGuardTransferMenu();
                document.querySelector('#build-menu .build-options').style.display = 'none';
                const options = document.getElementById('guard-recruit-options');
                const cost = this.getGuardRecruitCost(slot);
                options.innerHTML = '';
                document.getElementById('build-desc').innerText = `选择要补入的守军。当前花费 ${cost}G，不同守军会直接影响攻城战表现。`;

                this.guardArchetypes.forEach(archetype => {
                    const copy = this.getGuardRecruitMenuCopy(archetype, slot);
                    const btn = document.createElement('button');
                    btn.className = 'battle-card';
                    btn.onclick = () => this.recruitSpecificGuard(archetype.key);
                    btn.innerHTML = `<strong>${copy.title}</strong><span>${copy.text}</span>`;
                    options.appendChild(btn);
                });

                const backBtn = document.createElement('button');
                backBtn.className = 'battle-card back';
                backBtn.onclick = () => this.handleSlotClick(slot);
                backBtn.innerHTML = '<strong>返回</strong><span>回到这座建筑的操作菜单。</span>';
                options.appendChild(backBtn);
                options.style.display = 'flex';
            },

            recruitSpecificGuard(roleKey) {
                const player = this.players[this.currentPlayerIndex];
                const slot = this.selectedSlot;
                if (!slot || slot.owner !== player || slot.type === 'EMPTY') return;
                this.performRecruitGuard(player, slot, roleKey);
                document.getElementById('build-menu').style.display = 'none';
                this.updateUI();
                this.finishAction(true);
            },

            performRecruitGuard(player, slot, roleKey = null) {
                const cost = this.getGuardRecruitCost(slot);
                player.gold -= cost;
                const guard = this.createGuard(slot, roleKey);
                slot.guards.push(guard);
                slot.defense += 6 + slot.level * 2;
                this.updateGuardMarkers(slot);
                this.createFloatingText("+守军", slot.mesh.position, "#1e90ff");
                this.log(`花费 ${cost}G 为 ${this.getFacilityName(slot)} 招募了 ${guard.name}。`);
            },

            demolishSelectedFacility() {
                const player = this.players[this.currentPlayerIndex];
                const slot = this.selectedSlot;
                if (!slot || slot.owner !== player || slot.type === 'EMPTY') {
                    this.log("只能拆毁自己的建筑。");
                    return;
                }

                const name = this.getFacilityName(slot);
                this.clearFacility(slot);
                this.createFloatingText("拆毁", slot.mesh.position, "#ced6e0");
                this.log(`拆毁了自己的 ${name}。拆毁不消耗行动。`);
                document.getElementById('build-menu').style.display = 'none';
                this.updateUI();
                this.finishAction(false);
            },

            buildFacility(type) {
                const config = this.getFacilityConfig(type);
                const player = this.players[this.currentPlayerIndex];
                const cost = config.cost;
                const slot = this.selectedSlot;

                if (!slot || slot.type !== 'EMPTY') {
                    this.log("只能在空地上建造。");
                    return;
                }
                if (slot.monster) {
                    this.log("这块地还有野怪，先打败它才能建造。");
                    return;
                }

                if (player.gold >= cost) {
                    player.gold -= cost;
                    slot.type = type;
                    slot.owner = player;
                    slot.level = 1;
                    slot.maxLevel = config.maxLevel || this.maxFacilityLevel;
                    slot.defense = config.baseDefense;
                    slot.guardSlots = config.allowsGuards ? config.guardSlots : 0;
                    slot.guards = [];
                    
                    // 在地块上生成 3D 建筑模型
                    let fColor = 0xffffff, geom = null;
                    if(type === 'TRAP') { fColor = config.color; geom = new THREE.CylinderGeometry(0.5, 0.8, 0.5, 8); }
                    if(type === 'GUARD') { fColor = config.color; geom = new THREE.BoxGeometry(0.8, 1.2, 0.8); }
                    if(type === 'INCOME') { fColor = config.color; geom = new THREE.OctahedronGeometry(0.6); }
                    if(type === 'HEAL') { fColor = config.color; geom = new THREE.CylinderGeometry(0.7, 0.7, 0.42, 16); }
                    if(type === 'TRAINING') { fColor = config.color; geom = new THREE.ConeGeometry(0.72, 1.05, 4); }
                    if(type === 'BARRACKS') { fColor = config.color; geom = new THREE.BoxGeometry(1.0, 0.9, 0.8); }
                    if(type === 'COMMAND') { fColor = config.color; geom = new THREE.CylinderGeometry(0.48, 0.82, 1.15, 5); }
                    if(type === 'FORTRESS') { fColor = config.color; geom = new THREE.BoxGeometry(1.08, 1.0, 1.08); }
                    if(type === 'WORKSHOP') { fColor = config.color; geom = new THREE.CylinderGeometry(0.78, 0.9, 0.7, 6); }

                    const mesh = new THREE.Mesh(geom, new THREE.MeshToonMaterial({color: fColor}));
                    
                    // 同样加上描边
                    const outline = new THREE.Mesh(geom, new THREE.MeshBasicMaterial({color:0x000, side:THREE.BackSide}));
                    outline.scale.set(1.1, 1.1, 1.1);
                    mesh.add(outline);

                    mesh.position.set(slot.x, 0.6, slot.z);
                    this.scene.add(mesh);
                    slot.facilityMesh = mesh;
                    this.updateFacilityVisual(slot);

                    this.log(`花费 ${cost}G 建造了 ${this.getFacilityName(type)}！`);
                    
                    // 特效：小跳一下
                    new TWEEN.Tween(mesh.position).to({y: 1.5}, 200).yoyo(true).repeat(1).start();
                } else {
                    this.log("金币不足，无法建造。");
                    return;
                }
                
                document.getElementById('build-menu').style.display = 'none';
                this.updateUI();
                this.finishAction(true);
            },

            endTurn() {
                this.stopSlotHighlightOnly();
                this.clearBranchChoiceArrows();
                this.clearHoverState();
                this.hideBattleStatus();
                this.restoreDiceOccluders();
                this.resetGuardTransferMenu();
                this.setBattlePhase(BattlePhase.NONE);
                this.battleContext = null;
                this.setActionConsumed(false);
                document.getElementById('build-menu').style.display = 'none';
                document.getElementById('branch-menu').style.display = 'none';
                document.getElementById('wizard-menu').style.display = 'none';
                this.resetWizardMenu();
                document.getElementById('btn-end').style.display = 'none';
                
                this.currentPlayerIndex = (this.currentPlayerIndex + 1) % 4;
                this.updateUI();
                
                const nextPlayer = this.players[this.currentPlayerIndex];
                this.transitionTo(TurnState.IDLE);
                
                if (!nextPlayer.isPlayer) {
                    this.log(`====== ${nextPlayer.name} 的回合 ======`);
                    setTimeout(() => this.rollDice(), 1000); // AI 自动掷骰子
                } else {
                    this.log(`====== 你的回合 ======`);
                    // 相机重置归位
                    this.cameraOffset.set(0,0,0);
                }
            },

            animate() {
                requestAnimationFrame(() => this.animate());
                TWEEN.update();

                // 相机阻尼跟随逻辑
                const p = this.players[this.currentPlayerIndex];
                if (p && p.meshGroup) {
                    if (this.state === TurnState.BATTLE && this.battleCameraFocus) {
                        this.cameraTarget.copy(this.battleCameraFocus);
                    } else {
                        // 目标位置 = 当前角色位置 + 拖拽偏移量
                        this.cameraTarget.set(
                            p.meshGroup.position.x + this.cameraOffset.x,
                            p.meshGroup.position.y,
                            p.meshGroup.position.z + this.cameraOffset.z
                        );
                    }
                    
                    // lerp 平滑插值 (阻尼感)
                    const lerpFactor = this.cameraMode === CameraMode.DRAGGING
                        ? 0.3
                        : (this.state === TurnState.BATTLE ? 0.16 : (this.cameraMode === CameraMode.RETURNING ? 0.12 : 0.05));
                    
                    // 计算相机 lookAt 中心点
                    const currentCenter = new THREE.Vector3();
                    // 为了简化，我们通过反推相机的相对位置来实现平滑
                    currentCenter.x = this.camera.position.x - 20;
                    currentCenter.z = this.camera.position.z - 20;
                    
                    currentCenter.lerp(this.cameraTarget, lerpFactor);
                    
                    this.camera.position.set(currentCenter.x + 20, 20, currentCenter.z + 20);
                    this.camera.lookAt(currentCenter.x, 0, currentCenter.z);
                }

                // AI 角色的微弱呼吸动画
                const time = Date.now() * 0.003;
                this.players.forEach(player => {
                    if(this.state !== TurnState.MOVING || player.id !== this.currentPlayerIndex) {
                       player.bodyMesh.position.y = 0.43 + Math.sin(time + player.id)*0.04;
                    }
                });

                this.renderer.render(this.scene, this.camera);
            }
        };

        // 页面加载完成后启动
        window.onload = () => {
            Game.init();
        };
    </script>
