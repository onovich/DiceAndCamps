                    .to({ x: snapshot.attacker.position.x, y: snapshot.attacker.position.y, z: snapshot.attacker.position.z }, 440)
                    .easing(TWEEN.Easing.Back.Out)
                    .start();
                snapshot.attacker.mesh.rotation.copy(snapshot.attacker.rotation);
                snapshot.attacker.mesh.scale.copy(snapshot.attacker.scale);

                if (snapshot.enemy) {
                    new TWEEN.Tween(snapshot.enemy.mesh.position)
                        .to({ x: snapshot.enemy.position.x, y: snapshot.enemy.position.y, z: snapshot.enemy.position.z }, 440)
                        .easing(TWEEN.Easing.Back.Out)
                        .start();
                    snapshot.enemy.mesh.rotation.copy(snapshot.enemy.rotation);
                    snapshot.enemy.mesh.scale.copy(snapshot.enemy.scale);
                }

                if (this.battleFloor) {
                    new TWEEN.Tween(this.battleFloor.position)
                        .to({ y: -8 }, 360)
                        .easing(TWEEN.Easing.Back.In)
                        .onComplete(() => {
                            this.scene.remove(this.battleFloor);
                            this.battleFloor = null;
                        })
                        .start();
                }

                this.camera.position.copy(snapshot.camera.position);
                this.battleCameraFocus = null;
                new TWEEN.Tween(this.camera)
                    .to({ zoom: snapshot.camera.zoom }, 300)
                    .onUpdate(() => this.camera.updateProjectionMatrix())
                    .start();
                await this.wait(620);
                this.battleSnapshot = null;
            },

            async showTauntSequence(attacker, enemy) {
                const layer = document.getElementById('taunt-layer');
                const heroBox = document.getElementById('taunt-hero');
                const enemyBox = document.getElementById('taunt-enemy');
                const enemyName = enemy.name;
                const enemyFocus = enemy.meshGroup || enemy.slot?.mesh || attacker.meshGroup;
                layer.style.display = 'block';
                heroBox.innerText = '';
                enemyBox.innerText = '';
                await this.focusBattleCamera(attacker.meshGroup, 1.68, 340);
                await this.typeBattleText(heroBox, `${attacker.name}: 这块地，我要闯过去！`);
                await this.wait(220);
                await this.focusBattleCamera(enemyFocus, 1.78, 340);
                await this.typeBattleText(enemyBox, `${enemyName}: 来吧，先打碎我的气势！`);
                await this.wait(420);
                await this.focusBattleCamera(new THREE.Vector3(4.9, 0.4, 5.0), 1.25, 300);
                layer.style.display = 'none';
            },

            async typeBattleText(element, text) {
                element.innerText = '';
                for (let i = 0; i < text.length; i++) {
                    element.innerText += text[i];
                    await this.wait(24);
                }
            },

            chooseBattleCommand(command) {
                if (!this.battleCommandResolver) return;
                const resolve = this.battleCommandResolver;
                this.battleCommandResolver = null;
                document.getElementById('battle-ui').style.display = 'none';
                resolve(command);
            },

            waitForBattleCommand(attacker) {
                this.renderBattleCards(attacker);
                return new Promise(resolve => {
                    this.battleCommandResolver = resolve;
                });
            },

            prepareBattleDeck(player) {
                player.drawPile = this.shuffleCards([...(player.deck || [])]);
                player.discardPile = [];
                this.battleHand = [];
            },

            shuffleCards(cards) {
                const shuffled = [...cards];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            },

            drawBattleCards(player, count = 3) {
                const hand = [];
                for (let i = 0; i < count; i++) {
                    if (player.drawPile.length === 0) {
                        player.drawPile = this.shuffleCards(player.discardPile);
                        player.discardPile = [];
                    }
                    if (player.drawPile.length === 0) break;
                    hand.push(player.drawPile.pop());
                }
                this.battleHand = hand;
                return hand;
            },

            renderBattleCards(player) {
                const battleUi = document.getElementById('battle-ui');
                const hand = this.drawBattleCards(player, 3);
                battleUi.innerHTML = '';
                hand.forEach((cardId, index) => {
                    const card = this.cardLibrary[cardId];
                    const btn = document.createElement('button');
                    btn.className = 'battle-card';
                    btn.onclick = () => this.chooseBattleCard(index);
                    btn.innerHTML = `<strong>${card.name}</strong><span>${card.text}</span>`;
                    battleUi.appendChild(btn);
                });

                const fleeBtn = document.createElement('button');
                fleeBtn.className = 'battle-card flee';
                fleeBtn.onclick = () => this.chooseBattleCommand('flee');
                fleeBtn.innerHTML = '<strong>撤退</strong><span>尝试脱离战斗。</span>';
                battleUi.appendChild(fleeBtn);
                battleUi.style.display = 'flex';
            },

            chooseBattleCard(index) {
                if (!this.battleCommandResolver) return;
                const cardId = this.battleHand[index];
                if (!cardId) return;
                const resolve = this.battleCommandResolver;
                this.battleCommandResolver = null;
                document.getElementById('battle-ui').style.display = 'none';
                resolve({ type: 'card', cardId });
            },

            async chooseAutoBattleCommand(attacker, enemyState, kind, round) {
                await this.wait(420);
                if (attacker.hp < attacker.maxHp * 0.28 && kind === 'monster') return 'flee';
                if (attacker.hp < attacker.maxHp * 0.35 && round % 2 === 0) return 'defend';
                if (enemyState.hp > attacker.atk + 12 && Math.random() < 0.45) return 'skill';
                return 'attack';
            },

            async showBattleResult(victory, fled = false) {
                const result = document.getElementById('battle-result');
                result.innerText = fled ? '撤退!' : (victory ? '胜利!' : '失败!');
                result.style.background = victory ? '#ffdd59' : (fled ? '#ced6e0' : '#ff6b81');
                result.style.display = 'block';

                if (this.battleSnapshot) {
                    const actor = victory ? this.battleSnapshot.attacker.mesh : (this.battleSnapshot.enemy ? this.battleSnapshot.enemy.mesh : this.battleSnapshot.attacker.mesh);
                    if (victory) {
                        this.cheerCombatant(actor);
                        this.spawnConfetti(actor.position);
                    } else if (!fled) {
                        this.slumpCombatant(this.battleSnapshot.attacker.mesh);
                    }
                }

                await this.wait(900);
                result.style.display = 'none';
            },

            cheerCombatant(mesh) {
                new TWEEN.Tween(mesh.scale)
                    .to({ x: 1.18, y: 1.28, z: 1.18 }, 160)
                    .yoyo(true)
                    .repeat(3)
                    .easing(TWEEN.Easing.Back.Out)
                    .start();
                new TWEEN.Tween(mesh.rotation)
                    .to({ z: 0.22 }, 120)
                    .yoyo(true)
                    .repeat(5)
                    .start();
            },

            slumpCombatant(mesh) {
                new TWEEN.Tween(mesh.scale)
                    .to({ x: 1.18, y: 0.72, z: 1.18 }, 260)
                    .easing(TWEEN.Easing.Bounce.Out)
                    .start();
                new TWEEN.Tween(mesh.rotation)
                    .to({ z: -0.45 }, 260)
                    .easing(TWEEN.Easing.Back.Out)
                    .start();
            },

            spawnConfetti(origin) {
                const colors = [0xff4757, 0x1e90ff, 0x2ed573, 0xeccc68, 0xa55eea];
                for (let i = 0; i < 18; i++) {
                    const confetti = this.createToonBox(0.12, 0.04, 0.18, colors[i % colors.length], false);
                    confetti.position.set(origin.x, origin.y + 1.2, origin.z);
                    this.scene.add(confetti);
                    new TWEEN.Tween(confetti.position)
                        .to({
                            x: origin.x + (Math.random() - 0.5) * 4,
                            y: origin.y + 1.2 + Math.random() * 2.2,
                            z: origin.z + (Math.random() - 0.5) * 3
                        }, 520)
                        .easing(TWEEN.Easing.Quadratic.Out)
                        .onComplete(() => {
                            new TWEEN.Tween(confetti.position)
                                .to({ y: origin.y - 0.2 }, 620)
                                .easing(TWEEN.Easing.Quadratic.In)
                                .onComplete(() => this.scene.remove(confetti))
                                .start();
                        })
                        .start();
                    new TWEEN.Tween(confetti.rotation)
                        .to({ x: Math.PI * 4, y: Math.PI * 3, z: Math.PI * 2 }, 1000)
                        .start();
                }
            },

            async resolveBattleShell({ attacker, enemy, sourceSlot, kind }) {
                this.transitionTo(TurnState.BATTLE, kind === 'monster' ? '野怪战斗' : '建筑挑战');
                this.stopSlotHighlightOnly();
                document.getElementById('btn-end').style.display = 'none';

                const enemyState = {
                    name: enemy.name,
                    hp: enemy.hp,
                    maxHp: enemy.maxHp || enemy.hp,
                    atk: enemy.atk || 4
                };
                this.log(`${attacker.name} 向 ${enemyState.name} 发起战斗！`);

                await this.enterBattleScene(attacker, enemy);
                await this.showTauntSequence(attacker, enemy);
                if (attacker.isPlayer) this.prepareBattleDeck(attacker);
                const enemyMesh = enemy.meshGroup || (sourceSlot ? sourceSlot.mesh : null);
                const enemyPos = enemyMesh ? enemyMesh.position : attacker.meshGroup.position;

                let fled = false;
                for (let round = 1; round <= 8 && attacker.hp > 0 && enemyState.hp > 0; round++) {
                    this.log(`选择行动：${attacker.name} HP ${attacker.hp}/${attacker.maxHp}，${enemyState.name} HP ${Math.max(0, enemyState.hp)}/${enemyState.maxHp}`);
                    const command = attacker.isPlayer
                        ? await this.waitForBattleCommand(attacker)
                        : await this.chooseAutoBattleCommand(attacker, enemyState, kind, round);
                    if (attacker.isPlayer && this.battleHand.length > 0) {
                        attacker.discardPile.push(...this.battleHand);
                        this.battleHand = [];
                    }
                    let defend = false;
                    let blockValue = 0;
                    let playerDmg = 0;

                    if (command?.type === 'card') {
                        const card = this.cardLibrary[command.cardId];
                        this.log(`${attacker.name} 打出《${card.name}》。`);
                        if (card.kind === 'attack') {
                            playerDmg = Math.max(4, attacker.atk + card.power + Math.floor(Math.random() * 5));
                            await this.focusBattleCamera(attacker.meshGroup, 1.62, 220);
                        } else if (card.kind === 'skill') {
                            playerDmg = Math.max(8, attacker.atk + card.power + Math.floor(Math.random() * 7));
                            await this.focusBattleCamera(attacker.meshGroup, 1.86, 260);
                        } else if (card.kind === 'defend') {
                            defend = true;
                            blockValue = card.block || 7;
                            await this.focusBattleCamera(attacker.meshGroup, 1.58, 220);
                        } else if (card.kind === 'heal') {
                            const before = attacker.hp;
                            attacker.hp = Math.min(attacker.maxHp, attacker.hp + card.heal);
                            this.createFloatingText(`+${attacker.hp - before}HP`, attacker.meshGroup.position, "#2ed573");
                            await this.focusBattleCamera(attacker.meshGroup, 1.5, 220);
                        } else if (card.kind === 'buff') {
                            attacker.atk += card.atk;
                            this.createFloatingText(`ATK +${card.atk}`, attacker.meshGroup.position, "#ffb142");
                            await this.focusBattleCamera(attacker.meshGroup, 1.5, 220);
                        }
                    } else if (command === 'flee') {
                        await this.focusBattleCamera(attacker.meshGroup, 1.45, 220);
                        fled = Math.random() < 0.55 || kind === 'monster';
                        this.log(fled ? "成功撤退！" : "撤退失败！");
                        if (fled) break;
                    } else if (command === 'defend') {
                        defend = true;
                        blockValue = 7;
                        this.log(`${attacker.name} 摆出防御姿态。`);
                        await this.focusBattleCamera(attacker.meshGroup, 1.58, 220);
                    } else if (command === 'skill') {
                        playerDmg = Math.max(8, attacker.atk + 8 + Math.floor(Math.random() * 8));
                        this.log(`${attacker.name} 释放技能！`);
                        await this.focusBattleCamera(attacker.meshGroup, 1.86, 260);
                    } else if (command === 'attack') {
                        playerDmg = Math.max(4, attacker.atk + Math.floor(Math.random() * 6));
                        await this.focusBattleCamera(attacker.meshGroup, 1.62, 220);
                    } else {
                        this.log("指令失效，默认防御。");
                        defend = true;
                        await this.focusBattleCamera(attacker.meshGroup, 1.5, 180);
                    }

                    if (playerDmg > 0) {
                        enemyState.hp -= playerDmg;
                        this.createFloatingText(`-${playerDmg}`, enemyPos, "#ff4757");
                        this.bumpCombatant(attacker.meshGroup, enemyPos);
                        await this.focusBattleCamera(enemyMesh || enemyPos, 1.72, 220);
                        await this.wait(300);
                    }

                    if (enemyState.hp <= 0 || fled) break;

                    const incoming = Math.max(1, enemyState.atk + Math.floor(Math.random() * 4) - (defend ? blockValue : 0));
                    await this.focusBattleCamera(enemyMesh || enemyPos, 1.58, 220);
                    attacker.hp -= incoming;
                    this.screenFlash();
                    this.createFloatingText(`-${incoming}`, attacker.meshGroup.position, "#ff0000");
                    await this.focusBattleCamera(attacker.meshGroup, 1.72, 180);
                    await this.wait(380);
                }

                document.getElementById('battle-ui').style.display = 'none';
                const victory = !fled && enemyState.hp <= 0 && attacker.hp > 0;
                if (attacker.hp <= 0) {
                    attacker.hp = Math.max(1, Math.floor(attacker.maxHp * 0.35));
                }

                await this.showBattleResult(victory, fled);
                await this.exitBattleScene();
                this.transitionTo(TurnState.ACTION_SELECT);
                return victory;
            },

            bumpCombatant(meshGroup, targetPos) {
                const start = meshGroup.position.clone();
                const x = start.x + (targetPos.x - start.x) * 0.25;
                const z = start.z + (targetPos.z - start.z) * 0.25;
                new TWEEN.Tween(meshGroup.position)
                    .to({ x, z }, 120)
                    .yoyo(true)
                    .repeat(1)
                    .easing(TWEEN.Easing.Quadratic.Out)
                    .start();
            },

            wait(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            },

            upgradeSelectedFacility() {
                const player = this.players[this.currentPlayerIndex];
                const slot = this.selectedSlot;
                if (!slot || slot.owner !== player || slot.type === 'EMPTY') {
                    this.log("只能升级自己的建筑。");
                    return;
                }

                if (this.isFacilityMaxLevel(slot)) {
                    this.log(`${this.getFacilityName(slot)} 已经满级，不能继续升级。`);
                    return;
                }

                const cost = this.getUpgradeCost(slot);
                if (player.gold < cost) {
                    this.log(`金币不足，升级需要 ${cost}G。`);
                    return;
                }

                player.gold -= cost;
                slot.level += 1;
                const defenseGain = this.getUpgradeDefenseGain(slot);
                slot.defense += defenseGain;
                if (this.canFacilityHostGuards(slot)) slot.guardSlots = this.getGuardCapacity(slot);
                this.updateFacilityVisual(slot);
                this.createFloatingText(`Lv.${slot.level}`, slot.mesh.position, "#2ed573");
                this.log(`花费 ${cost}G 将 ${this.getFacilityName(slot)} 升到 Lv.${slot.level}，防御 +${defenseGain}。`);
                document.getElementById('build-menu').style.display = 'none';
                this.updateUI();
                this.finishAction(true);
            },

            recruitGuardForSelectedFacility() {
                const player = this.players[this.currentPlayerIndex];
                const slot = this.selectedSlot;
                if (!slot || slot.owner !== player || slot.type === 'EMPTY') {
                    this.log("只能给自己的建筑招募守军。");
                    return;
                }
                if (!this.canFacilityHostGuards(slot)) {
                    this.log(`${this.getFacilityName(slot)} 不能驻防守军，但可以快速升级防御。`);
                    return;
                }

                const capacity = this.getGuardCapacity(slot);
                if (slot.guards.length >= capacity) {
                    this.log("守军已经满员。升级建筑可以扩充驻防上限。");
                    return;
                }

                const cost = this.getGuardRecruitCost(slot);
                if (player.gold < cost) {
                    this.log(`金币不足，招募守军需要 ${cost}G。`);
                    return;
                }

                player.gold -= cost;
                const guard = this.createGuard(slot);
                slot.guards.push(guard);
                slot.defense += 6 + slot.level * 2;
                this.updateGuardMarkers(slot);
                this.createFloatingText("+守军", slot.mesh.position, "#1e90ff");
                this.log(`花费 ${cost}G 为 ${this.getFacilityName(slot)} 招募了 ${guard.name}。`);
                document.getElementById('build-menu').style.display = 'none';
                this.updateUI();
                this.finishAction(true);
            },

            demolishSelectedFacility() {
                const player = this.players[this.currentPlayerIndex];
                const slot = this.selectedSlot;
                if (!slot || slot.owner !== player || slot.type === 'EMPTY') {
                    this.log("只能拆毁自己的建筑。");
                    return;
                }

                const name = this.getFacilityName(slot);
                this.clearFacility(slot);
                this.createFloatingText("拆毁", slot.mesh.position, "#ced6e0");
                this.log(`拆毁了自己的 ${name}。拆毁不消耗行动。`);
                document.getElementById('build-menu').style.display = 'none';
                this.updateUI();
                this.finishAction(false);
            },

            buildFacility(type) {
                const config = this.getFacilityConfig(type);
                const player = this.players[this.currentPlayerIndex];
                const cost = config.cost;
                const slot = this.selectedSlot;

                if (!slot || slot.type !== 'EMPTY') {
                    this.log("只能在空地上建造。");
                    return;
                }
                if (slot.monster) {
                    this.log("这块地还有野怪，先打败它才能建造。");
                    return;
                }

                if (player.gold >= cost) {
                    player.gold -= cost;
                    slot.type = type;
                    slot.owner = player;
                    slot.level = 1;
                    slot.maxLevel = config.maxLevel || this.maxFacilityLevel;
                    slot.defense = config.baseDefense;
                    slot.guardSlots = config.allowsGuards ? config.guardSlots : 0;
                    slot.guards = [];
                    
                    // 在地块上生成 3D 建筑模型
                    let fColor = 0xffffff, geom = null;
                    if(type === 'TRAP') { fColor = config.color; geom = new THREE.CylinderGeometry(0.5, 0.8, 0.5, 8); }
                    if(type === 'GUARD') { fColor = config.color; geom = new THREE.BoxGeometry(0.8, 1.2, 0.8); }
                    if(type === 'INCOME') { fColor = config.color; geom = new THREE.OctahedronGeometry(0.6); }
                    if(type === 'HEAL') { fColor = config.color; geom = new THREE.CylinderGeometry(0.7, 0.7, 0.42, 16); }
                    if(type === 'TRAINING') { fColor = config.color; geom = new THREE.ConeGeometry(0.72, 1.05, 4); }

                    const mesh = new THREE.Mesh(geom, new THREE.MeshToonMaterial({color: fColor}));
                    
                    // 同样加上描边
                    const outline = new THREE.Mesh(geom, new THREE.MeshBasicMaterial({color:0x000, side:THREE.BackSide}));
                    outline.scale.set(1.1, 1.1, 1.1);
                    mesh.add(outline);

                    mesh.position.set(slot.x, 0.6, slot.z);
                    this.scene.add(mesh);
                    slot.facilityMesh = mesh;
                    this.updateFacilityVisual(slot);

                    this.log(`花费 ${cost}G 建造了 ${this.getFacilityName(type)}！`);
                    
                    // 特效：小跳一下
                    new TWEEN.Tween(mesh.position).to({y: 1.5}, 200).yoyo(true).repeat(1).start();
                } else {
                    this.log("金币不足，无法建造。");
                    return;
                }
                
                document.getElementById('build-menu').style.display = 'none';
                this.updateUI();
                this.finishAction(true);
            },

            endTurn() {
                this.stopSlotHighlightOnly();
                this.setActionConsumed(false);
                document.getElementById('build-menu').style.display = 'none';
                document.getElementById('branch-menu').style.display = 'none';
                document.getElementById('wizard-menu').style.display = 'none';
                document.getElementById('btn-end').style.display = 'none';
                
                this.currentPlayerIndex = (this.currentPlayerIndex + 1) % 4;
                this.updateUI();
                
                const nextPlayer = this.players[this.currentPlayerIndex];
                this.transitionTo(TurnState.IDLE);
                
                if (!nextPlayer.isPlayer) {
                    this.log(`====== ${nextPlayer.name} 的回合 ======`);
                    setTimeout(() => this.rollDice(), 1000); // AI 自动掷骰子
                } else {
                    this.log(`====== 你的回合 ======`);
                    // 相机重置归位
                    this.cameraOffset.set(0,0,0);
                }
            },

            animate() {
                requestAnimationFrame(() => this.animate());
                TWEEN.update();

                // 相机阻尼跟随逻辑
                const p = this.players[this.currentPlayerIndex];
                if (p && p.meshGroup) {
                    if (this.state === TurnState.BATTLE && this.battleCameraFocus) {
                        this.cameraTarget.copy(this.battleCameraFocus);
                    } else {
                        // 目标位置 = 当前角色位置 + 拖拽偏移量
                        this.cameraTarget.set(
                            p.meshGroup.position.x + this.cameraOffset.x,
                            p.meshGroup.position.y,
                            p.meshGroup.position.z + this.cameraOffset.z
                        );
                    }
                    
                    // lerp 平滑插值 (阻尼感)
                    const lerpFactor = this.cameraMode === CameraMode.DRAGGING
                        ? 0.3
                        : (this.state === TurnState.BATTLE ? 0.16 : (this.cameraMode === CameraMode.RETURNING ? 0.12 : 0.05));
                    
                    // 计算相机 lookAt 中心点
                    const currentCenter = new THREE.Vector3();
                    // 为了简化，我们通过反推相机的相对位置来实现平滑
                    currentCenter.x = this.camera.position.x - 20;
                    currentCenter.z = this.camera.position.z - 20;
                    
                    currentCenter.lerp(this.cameraTarget, lerpFactor);
                    
                    this.camera.position.set(currentCenter.x + 20, 20, currentCenter.z + 20);
                    this.camera.lookAt(currentCenter.x, 0, currentCenter.z);
                }

                // AI 角色的微弱呼吸动画
                const time = Date.now() * 0.003;
                this.players.forEach(player => {
                    if(this.state !== TurnState.MOVING || player.id !== this.currentPlayerIndex) {
                       player.bodyMesh.position.y = 0.45 + Math.sin(time + player.id)*0.04;
                    }
                });

                this.renderer.render(this.scene, this.camera);
            }
        };

        // 页面加载完成后启动
        window.onload = () => {
            Game.init();
        };
    </script>
</body>
