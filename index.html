<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D魔幻RPG大富翁</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* 禁用默认的下拉刷新和双指缩放 */
            user-select: none;
        }
        #game-canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        
        /* 界面UI */
        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }
        
        .panel {
            background: rgba(255, 255, 255, 0.9);
            border: 4px solid #333;
            border-radius: 12px;
            padding: 15px;
            pointer-events: auto;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
        }

        #stats-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            min-width: 200px;
        }
        .stat-line { margin: 5px 0; font-weight: bold; color: #333; }
        .bar-bg { width: 100%; height: 15px; background: #ddd; border-radius: 8px; overflow: hidden; border: 2px solid #555; }
        .bar-fill { height: 100%; transition: width 0.3s; }
        .bar-hp { background: #ff4757; }
        .bar-exp { background: #1e90ff; }

        #action-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
        }

        .btn {
            background: #ff7f50;
            color: white;
            font-size: 24px;
            font-weight: bold;
            padding: 15px 40px;
            border: 4px solid #333;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 6px 0 #cc4e20, 0 8px 10px rgba(0,0,0,0.3);
            transition: all 0.1s;
            pointer-events: auto;
        }
        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #cc4e20, 0 2px 5px rgba(0,0,0,0.3);
        }
        .btn:disabled {
            background: #ccc;
            box-shadow: 0 6px 0 #999;
            cursor: not-allowed;
            color: #666;
        }

        #build-menu {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            text-align: center;
        }
        .build-options { display: flex; gap: 10px; margin-top: 15px; }
        .build-btn { padding: 10px; border: 2px solid #333; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .build-btn.trap { background: #a55eea; color: white; }
        .build-btn.guard { background: #ff4757; color: white; }
        .build-btn.income { background: #eccc68; color: #333; }
        .build-btn.heal { background: #7bed9f; color: #063b1f; }
        .build-btn.training { background: #ffb142; color: #332000; }
        .build-btn.barracks { background: #ff7f50; color: white; }
        .build-btn.command { background: #4b7bec; color: white; }
        .build-btn.fortress { background: #8c564b; color: white; }
        .build-btn.workshop { background: #747d8c; color: white; }
        .build-btn.upgrade { background: #2ed573; color: #063b1f; }
        .build-btn.demolish { background: #57606f; color: white; }
        .build-btn.recruit { background: #ff9f1a; color: #211300; }
        .build-btn.transfer { background: #70a1ff; color: white; }
        .build-btn.monster { background: #ff6b81; color: white; }
        .build-btn.challenge { background: #1e90ff; color: white; }
        .build-btn.cancel { background: #ced6e0; color: #333; }
        .build-btn:disabled { opacity: 0.45; cursor: not-allowed; }

        #msg-log {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 250px;
            max-height: 200px;
            overflow-y: hidden;
            background: rgba(0,0,0,0.6);
            color: white;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
            pointer-events: none;
        }
        .log-entry { margin-bottom: 5px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        /* 全屏红闪 (受伤特效) */
        #damage-flash {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: red; opacity: 0; pointer-events: none; transition: opacity 0.1s;
        }

        #battle-ui {
            position: absolute;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%);
            display: none;
            gap: 12px;
            pointer-events: auto;
            background: rgba(255,255,255,0.92);
            border: 4px solid #111;
            border-radius: 8px;
            padding: 12px;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.28);
            align-items: stretch;
            min-width: min(760px, calc(100vw - 36px));
        }
        .battle-command-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 220px;
        }
        .battle-command-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }
        .battle-detail-panel {
            display: flex;
            align-items: stretch;
            gap: 10px;
            flex: 1 1 auto;
            min-width: 0;
        }
        .battle-detail-copy {
            min-width: 180px;
            max-width: 220px;
            padding: 10px;
            border: 3px solid #111;
            background: #fff8e8;
            color: #111;
            font-weight: 900;
            box-shadow: 0 4px 0 #111;
        }
        .battle-detail-copy strong {
            display: block;
            margin-bottom: 6px;
            font-size: 16px;
        }
        .battle-detail-copy span {
            display: block;
            font-size: 12px;
            line-height: 1.45;
        }
        .battle-skill-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: stretch;
            min-width: 0;
        }
        #battle-status {
            position: absolute;
            left: 50%;
            top: 22px;
            transform: translateX(-50%);
            display: none;
            gap: 12px;
            align-items: stretch;
            min-width: min(720px, calc(100vw - 36px));
            pointer-events: none;
            z-index: 35;
        }
        .battle-status-card {
            flex: 1 1 0;
            min-width: 0;
            padding: 10px 12px;
            background: rgba(255, 248, 232, 0.96);
            border: 4px solid #111;
            border-radius: 8px;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.28);
            color: #111;
        }
        .battle-status-card.enemy {
            background: rgba(255, 230, 236, 0.96);
        }
        .battle-status-name {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            font-size: 14px;
            font-weight: 900;
            margin-bottom: 6px;
        }
        .battle-status-sub {
            margin-top: 6px;
            font-size: 11px;
            font-weight: 700;
            opacity: 0.8;
        }
        .battle-status-bar {
            height: 10px;
            overflow: hidden;
            border: 2px solid #111;
            border-radius: 999px;
            background: #ced6e0;
        }
        .battle-status-fill {
            height: 100%;
            width: 100%;
            background: #2ed573;
            transition: width 0.18s ease-out;
        }
        .battle-status-card.enemy .battle-status-fill {
            background: #ff4757;
        }
        .battle-status-phase {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 112px;
            padding: 0 12px;
            background: #111;
            color: #fff8e8;
            border: 4px solid #fff8e8;
            border-radius: 8px;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.28);
            font-weight: 900;
            text-align: center;
        }
        .battle-deck-hud {
            min-width: 104px;
            padding: 10px;
            border: 3px solid #111;
            background: #f7f1e3;
            color: #111;
            font-weight: 900;
            text-align: left;
            box-shadow: 0 4px 0 #111;
        }
        .battle-deck-hud div {
            font-size: 12px;
            margin: 3px 0;
        }
        .battle-command {
            min-width: 92px;
            padding: 12px 14px;
            border: 3px solid #111;
            background: #f8f1e1;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 0 #111;
        }
        .battle-command:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .battle-command.skill {
            background: #ffeaa7;
        }
        .battle-command.defend {
            background: #dff9fb;
        }
        .battle-command.flee {
            background: #ced6e0;
        }
        .battle-card {
            min-width: 112px;
            max-width: 140px;
            min-height: 118px;
            padding: 10px;
            border: 4px solid #111;
            border-radius: 8px;
            background: #fff8e8;
            color: #111;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 5px 0 #111;
            text-align: left;
        }
        .battle-card strong {
            display: block;
            margin-bottom: 8px;
            font-size: 16px;
        }
        .battle-card em {
            display: inline-block;
            margin-bottom: 8px;
            padding: 3px 6px;
            border: 2px solid #111;
            background: #ffffff;
            font-size: 11px;
            font-style: normal;
        }
        .battle-card span {
            display: block;
            font-size: 12px;
            line-height: 1.25;
        }
        .battle-card.flee {
            background: #ced6e0;
        }
        .battle-card.back {
            background: #f1f2f6;
        }
        .battle-card:active {
            transform: translateY(5px);
            box-shadow: none;
        }
        #taunt-layer {
            display: none;
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        .taunt-box {
            position: absolute;
            max-width: min(420px, 42vw);
            min-height: 58px;
            background: #fff8e8;
            color: #111;
            border: 5px solid #111;
            border-radius: 6px;
            padding: 14px 18px;
            font-size: 20px;
            font-weight: 900;
            line-height: 1.25;
            box-shadow: 7px 7px 0 rgba(0,0,0,0.32);
            transform: rotate(-2deg) skew(-3deg);
            clip-path: polygon(0 7%, 4% 0, 98% 3%, 100% 87%, 94% 100%, 3% 96%);
            z-index: 2;
        }
        .taunt-box::before {
            content: attr(data-speaker);
            position: absolute;
            left: 16px;
            top: -18px;
            padding: 3px 10px;
            background: #111;
            color: #fff8e8;
            border: 3px solid #fff8e8;
            font-size: 13px;
            font-weight: 1000;
            transform: rotate(-2deg);
        }
        .taunt-box::after {
            content: "";
            position: absolute;
            width: 34px;
            height: 24px;
            left: 28px;
            bottom: -18px;
            background: #111;
            clip-path: polygon(0 0, 100% 0, 18% 100%);
            z-index: -1;
        }
        .taunt-box.enemy {
            background: #ffe6ec;
            transform: rotate(2deg) skew(3deg);
            clip-path: polygon(2% 3%, 96% 0, 100% 9%, 98% 97%, 5% 100%, 0 88%);
        }
        .taunt-box.enemy::before {
            left: auto;
            right: 16px;
            transform: rotate(2deg);
        }
        .taunt-box.enemy::after {
            left: auto;
            right: 28px;
            clip-path: polygon(0 0, 100% 0, 82% 100%);
        }
        #taunt-hero { left: 7%; bottom: 24%; }
        #taunt-enemy { right: 7%; top: 18%; }
        #battle-result {
            display: none;
            position: absolute;
            left: 50%;
            top: 38%;
            transform: translate(-50%, -50%) scale(0.72) rotate(-3deg);
            min-width: min(520px, calc(100vw - 40px));
            max-width: min(640px, calc(100vw - 32px));
            padding: 20px 24px 18px;
            background: #ffdd59;
            color: #111;
            border: 6px solid #111;
            border-radius: 8px;
            font-weight: 1000;
            letter-spacing: 0;
            box-shadow: 10px 10px 0 rgba(0,0,0,0.32);
            pointer-events: none;
            opacity: 0;
            z-index: 50;
            clip-path: polygon(1% 8%, 7% 0, 98% 2%, 100% 82%, 94% 100%, 3% 97%, 0 26%);
        }
        #battle-result.show {
            display: block;
            animation: battleResultPop 0.42s cubic-bezier(.2,1.15,.3,1) both;
        }
        #battle-result.victory {
            background: #ffdd59;
        }
        #battle-result.defeat {
            background: #ff8fa3;
        }
        #battle-result.flee {
            background: #ced6e0;
        }
        .battle-result-kicker {
            display: inline-block;
            margin-bottom: 10px;
            padding: 4px 10px;
            background: #111;
            color: #fff8e8;
            border: 3px solid #fff8e8;
            font-size: 13px;
            transform: rotate(-2deg);
        }
        .battle-result-title {
            display: block;
            font-size: clamp(34px, 7vw, 78px);
            line-height: 0.95;
            margin-bottom: 10px;
        }
        .battle-result-sub {
            display: block;
            font-size: clamp(13px, 2.3vw, 18px);
            line-height: 1.35;
        }
        .battle-result-burst {
            position: absolute;
            right: 18px;
            top: -18px;
            width: 112px;
            height: 112px;
            opacity: 0.32;
            background:
                radial-gradient(circle at center, transparent 18%, #111 19%, #111 24%, transparent 25%),
                conic-gradient(from 0deg, #111 0 8%, transparent 8% 16%, #111 16% 24%, transparent 24% 32%, #111 32% 40%, transparent 40% 48%, #111 48% 56%, transparent 56% 64%, #111 64% 72%, transparent 72% 80%, #111 80% 88%, transparent 88% 100%);
            transform: rotate(18deg);
        }
        @keyframes battleResultPop {
            0% {
                opacity: 0;
                transform: translate(-50%, -46%) scale(0.58) rotate(-7deg);
            }
            55% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.06) rotate(1deg);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1) rotate(-2deg);
            }
        }
        #hover-info {
            position: absolute;
            display: none;
            min-width: 150px;
            max-width: 240px;
            padding: 10px 12px;
            background: rgba(255, 248, 232, 0.96);
            color: #111;
            border: 3px solid #111;
            border-radius: 6px;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.3);
            font-size: 13px;
            line-height: 1.35;
            pointer-events: none;
            z-index: 40;
        }
        #hover-info .info-title {
            font-size: 15px;
            font-weight: 900;
            margin-bottom: 5px;
        }
        #hover-info .info-tag {
            display: inline-block;
            margin-bottom: 6px;
            padding: 2px 6px;
            border-radius: 4px;
            background: #111;
            color: #fff;
            font-weight: 900;
            font-size: 11px;
        }
        #hover-info .info-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            white-space: nowrap;
        }

        #branch-menu {
            position: absolute;
            left: 50%;
            bottom: 118px;
            transform: translateX(-50%);
            display: none;
            text-align: center;
        }
        #branch-options {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }
        .branch-btn {
            min-width: 82px;
            padding: 10px 14px;
            border: 3px solid #111;
            border-radius: 8px;
            background: #f7f1e3;
            color: #111;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 0 #111;
        }
        .branch-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        #wizard-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            text-align: center;
            max-width: 420px;
        }
        #wizard-options {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 14px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div id="damage-flash"></div>
    <canvas id="game-canvas"></canvas>
    
    <div class="ui-layer">
        <div id="stats-panel" class="panel">
            <h2 id="char-name" style="margin-top:0; color:#2ed573;">玩家回合</h2>
            <div class="stat-line">LV: <span id="char-lv">1</span> | ATK: <span id="char-atk">10</span></div>
            <div class="stat-line">金币: 🪙 <span id="char-gold" style="color:#ffa502;">100</span></div>
            <div class="stat-line">HP: <span id="char-hp-txt">50/50</span></div>
            <div class="bar-bg"><div id="char-hp-bar" class="bar-fill bar-hp" style="width: 100%;"></div></div>
            <div class="stat-line">EXP:</div>
            <div class="bar-bg"><div id="char-exp-bar" class="bar-fill bar-exp" style="width: 0%;"></div></div>
        </div>

        <div id="action-panel">
            <button id="btn-roll" class="btn">掷骰子</button>
            <button id="btn-end" class="btn" style="display:none; background:#7bed9f; box-shadow: 0 6px 0 #2ed573;">结束回合</button>
        </div>

        <div id="build-menu" class="panel">
            <h3 style="margin-top:0;">建造地块操作</h3>
            <p id="build-desc">选择要建造的设施：</p>
            <div class="build-options">
                <button id="btn-build-trap" class="build-btn trap" onclick="Game.buildFacility('TRAP')">陷阱 (50G)</button>
                <button id="btn-build-guard" class="build-btn guard" onclick="Game.buildFacility('GUARD')">守卫 (80G)</button>
                <button id="btn-build-income" class="build-btn income" onclick="Game.buildFacility('INCOME')">金矿 (100G)</button>
                <button id="btn-build-heal" class="build-btn heal" onclick="Game.buildFacility('HEAL')">治疗营地 (90G)</button>
                <button id="btn-build-training" class="build-btn training" onclick="Game.buildFacility('TRAINING')">训练营 (120G)</button>
                <button id="btn-build-barracks" class="build-btn barracks" onclick="Game.buildFacility('BARRACKS')">兵营 (110G)</button>
                <button id="btn-build-command" class="build-btn command" onclick="Game.buildFacility('COMMAND')">指挥所 (125G)</button>
                <button id="btn-build-fortress" class="build-btn fortress" onclick="Game.buildFacility('FORTRESS')">堡垒 (140G)</button>
                <button id="btn-build-workshop" class="build-btn workshop" onclick="Game.buildFacility('WORKSHOP')">城防工坊 (130G)</button>
                <button id="btn-upgrade-facility" class="build-btn upgrade" onclick="Game.upgradeSelectedFacility()">升级</button>
                <button id="btn-recruit-guard" class="build-btn recruit" onclick="Game.recruitGuardForSelectedFacility()">招募守军</button>
                <button id="btn-transfer-guard" class="build-btn transfer" onclick="Game.openGuardTransferMenu()">调防守军</button>
                <button id="btn-demolish-facility" class="build-btn demolish" onclick="Game.demolishSelectedFacility()">拆毁</button>
                <button id="btn-fight-monster" class="build-btn monster" onclick="Game.fightSelectedMonster()">讨伐野怪</button>
                <button id="btn-challenge-facility" class="build-btn challenge" onclick="Game.challengeSelectedFacility()">挑战建筑</button>
                <button class="build-btn cancel" onclick="Game.closeBuildMenu()">返回选择</button>
            </div>
            <div id="guard-recruit-options" class="build-options" style="display:none;"></div>
            <div id="guard-transfer-options" class="build-options" style="display:none;"></div>
        </div>

        <div id="branch-menu" class="panel">
            <h3 style="margin:0;">选择岔路</h3>
            <div id="branch-options"></div>
        </div>

        <div id="wizard-menu" class="panel">
            <h3 style="margin-top:0;">岔路巫师</h3>
            <p id="wizard-desc">献上一点代价，换一张战斗卡。</p>
            <div id="wizard-options">
                <button class="build-btn training" onclick="Game.resolveWizardTrade('gold')">献上 60G</button>
                <button class="build-btn heal" onclick="Game.resolveWizardTrade('hp')">献上 12HP</button>
                <button class="build-btn cancel" onclick="Game.resolveWizardTrade('skip')">离开</button>
            </div>
        </div>

        <div id="taunt-layer">
            <div id="taunt-hero" class="taunt-box"></div>
            <div id="taunt-enemy" class="taunt-box"></div>
        </div>

        <div id="battle-result"></div>
        <div id="hover-info"></div>
        <div id="battle-status"></div>

        <div id="battle-ui"></div>

        <div id="msg-log"></div>
    </div>

    <!-- 引入 Three.js 和 Tween.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

    <script>
        // ------------------ 辅助函数：绘制骰子纹理 ------------------
        function createDiceTexture(number) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, 256, 256);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 10;
            ctx.strokeRect(0,0,256,256);
            ctx.fillStyle = '#000';
            const drawDot = (x, y) => {
                ctx.beginPath();
                ctx.arc(x, y, 25, 0, Math.PI * 2);
                ctx.fill();
            };
            const c = 128, l = 64, r = 192;
            if([1,3,5].includes(number)) drawDot(c, c);
            if([2,3,4,5,6].includes(number)) { drawDot(l, l); drawDot(r, r); }
            if([4,5,6].includes(number)) { drawDot(l, r); drawDot(r, l); }
            if(number === 6) { drawDot(l, c); drawDot(r, c); }
            if(number === 1) { ctx.fillStyle = '#ff4757'; drawDot(c,c); } // 一点红
            return new THREE.CanvasTexture(canvas);
        }

        // ------------------ 游戏核心逻辑 ------------------
        const TurnState = Object.freeze({
            IDLE: 'IDLE',
            DICE: 'DICE',
            MOVING: 'MOVING',
            BRANCH_CHOICE: 'BRANCH_CHOICE',
            OWNED_EVENTS: 'OWNED_EVENTS',

            transitionTo(nextState, reason = '') {

            init() {
                this.initEngine();

            initEngine() {
                const canvas = document.getElementById('game-canvas');
                this.scene = new THREE.Scene();
                
                // 正交相机设置
                const aspect = window.innerWidth / window.innerHeight;
                const frustumSize = 18;
                this.camera = new THREE.OrthographicCamera(
                    frustumSize * aspect / -2, frustumSize * aspect / 2,
                    frustumSize / 2, frustumSize / -2, 1, 1000
                );
                // 经典的等距倾斜视角 (RTS/CRPG)
                this.camera.position.set(20, 20, 20);
                this.camera.lookAt(0, 0, 0);

                this.renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true;
                
                // 灯光：卡通渲染需要 DirectionalLight
                const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
                dirLight.position.set(10, 20, 10);
                dirLight.castShadow = true;
                dirLight.shadow.camera.left = -24; dirLight.shadow.camera.right = 24;
                dirLight.shadow.camera.top = 24; dirLight.shadow.camera.bottom = -24;
                this.scene.add(dirLight);
                
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
                this.scene.add(ambientLight);

                window.addEventListener('resize', () => {
                    const aspect = window.innerWidth / window.innerHeight;
                    this.camera.left = -frustumSize * aspect / 2;
                    this.camera.right = frustumSize * aspect / 2;
                    this.camera.top = frustumSize / 2;
                    this.camera.bottom = -frustumSize / 2;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            },

            // 构建带有描边效果的立方体
            createToonBox(w, h, d, color, hasOutline = true) {
                const geom = new THREE.BoxGeometry(w, h, d);
                const mat = new THREE.MeshToonMaterial({ color: color });
                const mesh = new THREE.Mesh(geom, mat);
                mesh.castShadow = true;
                mesh.receiveShadow = true;

                if (hasOutline) {
                    const edges = new THREE.EdgesGeometry(geom);
                    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 }));
                    mesh.add(line);
                }
                return mesh;
            },

            buildMap() {
                // 构建规则正交网格：主干道是大回环，岔路只沿上下左右行走并最终回接。
                const mainLoopCoords = [
                    [-18,-10], [-16,-10], [-14,-10], [-12,-10], [-10,-10], [-8,-10], [-6,-10], [-4,-10], [-2,-10], [0,-10], [2,-10], [4,-10], [6,-10], [8,-10], [10,-10], [12,-10], [14,-10], [16,-10], [18,-10],
                    [18,-8], [18,-6], [18,-4], [18,-2], [18,0], [18,2], [18,4], [18,6], [18,8], [18,10],
                    [16,10], [14,10], [12,10], [10,10], [8,10], [6,10], [4,10], [2,10], [0,10], [-2,10], [-4,10], [-6,10], [-8,10], [-10,10], [-12,10], [-14,10], [-16,10], [-18,10],
                    [-18,8], [-18,6], [-18,4], [-18,2], [-18,0], [-18,-2], [-18,-4], [-18,-6], [-18,-8]
                ];
                const mainLoopCount = mainLoopCoords.length;
                this.mainLoopCount = mainLoopCount;
                this.mapBounds = {
                    minX: Math.min(...mainLoopCoords.map(([x]) => x)),
                    maxX: Math.max(...mainLoopCoords.map(([x]) => x)),
                    minZ: Math.min(...mainLoopCoords.map(([, z]) => z)),
                    maxZ: Math.max(...mainLoopCoords.map(([, z]) => z))
                };

                const nodeDefs = [
                    ...mainLoopCoords.map(([x, z], i, arr) => ({
                        id: i,
                        x,
                        z,
                        next: (i + 1) % arr.length,
                        branches: []
                    })),
                    { id: 56, x: 0, z: -8, next: 57 },
                    { id: 57, x: 0, z: -6, next: 58 },
                    { id: 58, x: 2, z: -6, next: 59 },
                    { id: 59, x: 4, z: -6, next: 60 },
                    { id: 60, x: 6, z: -6, next: 61 },
                    { id: 61, x: 8, z: -6, next: 62 },
                    { id: 62, x: 10, z: -6, next: 63 },
                    { id: 63, x: 12, z: -6, next: 64 },
                    { id: 64, x: 14, z: -6, next: 65 },
                    { id: 65, x: 16, z: -6, next: 20 },
                    { id: 66, x: 16, z: 6, next: 67 },
                    { id: 67, x: 14, z: 6, next: 68 },
                    { id: 68, x: 12, z: 6, next: 69 },
                    { id: 69, x: 10, z: 6, next: 70 },
                    { id: 70, x: 8, z: 6, next: 71 },
                    { id: 71, x: 6, z: 6, next: 72 },
                    { id: 72, x: 4, z: 6, next: 73 },
                    { id: 73, x: 2, z: 6, next: 74 },
                    { id: 74, x: 0, z: 6, next: 75 },
                    { id: 75, x: 0, z: 8, next: 37 },
                    { id: 76, x: -6, z: 8, next: 77 },
                    { id: 77, x: -6, z: 6, next: 78 },
                    { id: 78, x: -8, z: 6, next: 79 },
                    { id: 79, x: -10, z: 6, next: 80 },
                    { id: 80, x: -12, z: 6, next: 81 },
                    { id: 81, x: -14, z: 6, next: 82 },
                    { id: 82, x: -16, z: 6, next: 48 },
                    { id: 83, x: -16, z: 0, next: 84 },
                    { id: 84, x: -14, z: 0, next: 85 },
                    { id: 85, x: -12, z: 0, next: 86 },
                    { id: 86, x: -10, z: 0, next: 87 },
                    { id: 87, x: -8, z: 0, next: 88 },
                    { id: 88, x: -6, z: 0, next: 89 },
                    { id: 89, x: -4, z: 0, next: 90 },
                    { id: 90, x: -2, z: 0, next: 91 },
                    { id: 91, x: 0, z: 0, next: 92 },
                    { id: 92, x: 0, z: -2, next: 93 },
                    { id: 93, x: 0, z: -4, next: 57 },
                    { id: 94, x: -20, z: 0, next: 51, npc: 'WIZARD', deadEnd: true }
                ];
                nodeDefs[9].branches = [56];
                nodeDefs[26].branches = [66];
                nodeDefs[40].branches = [76];
                nodeDefs[51].branches = [83, 94];

                nodeDefs.forEach((def, i) => {
                    const { x, z } = def;
                    const nodeMesh = this.createToonBox(1.45, 0.48, 1.45, this.roadTileColor);
                    nodeMesh.userData.baseY = 0;
                    nodeMesh.userData.floatingTile = true;
                    nodeMesh.position.set(x, -8, z);
                    this.scene.add(nodeMesh);

                    const node = {
                        id: def.id,
                        x: x, z: z,
                        mesh: nodeMesh,
                        next: def.next,
                        nextOptions: [
                            { target: def.next, label: '主路' },
                            ...(def.branches || []).map(target => ({ target, label: '岔路' }))
                        ],
                        isBranch: def.id >= mainLoopCount,
                        npc: def.npc || null,
                        deadEnd: !!def.deadEnd,
                        slots: []
                    };
                    this.nodes.push(node);
                    if (node.npc === 'WIZARD') this.createWizardMarker(node);
                });
                this.createRoadSegments();
                this.nodes.forEach(node => this.createAdjacentSlotsForNode(node));

                this.animateMapIntro();
            },

            createRoadSegments() {
                const created = new Set();
                this.nodes.forEach(node => {
                    const targets = [
                        node.next,
                        ...node.nextOptions
                            .filter(option => option.target !== node.next)
                            .map(option => option.target)
                    ];

                    targets.forEach(targetId => {
                        const target = this.nodes[targetId];
                        if (!target) return;
                        const key = [node.id, target.id].sort((a, b) => a - b).join('-');
                        if (created.has(key)) return;
                        created.add(key);

                        const dx = target.x - node.x;
                        const dz = target.z - node.z;
                        if ((dx !== 0 && dz !== 0) || Math.abs(dx) + Math.abs(dz) !== this.mapStep) return;

                        const horizontal = dz === 0;
                        const segment = this.createToonBox(
                            horizontal ? 0.78 : 0.34,
                            0.18,
                            horizontal ? 0.34 : 0.78,
                            this.roadSegmentColor,
                            false
                        );
                        segment.userData.baseY = -0.06;
                        segment.position.set((node.x + target.x) / 2, -8, (node.z + target.z) / 2);
                        this.scene.add(segment);
                        this.roadSegments.push(segment);
                    });
                });
            },

            createAdjacentSlotsForNode(node) {
                const spacing = this.mapStep;
                const roadPositions = new Set(this.nodes.map(n => `${n.x},${n.z}`));
                const directions = [
                    { dx: 0, dz: -spacing, edge: 'south' },
                    { dx: spacing, dz: 0, edge: 'east' },
                    { dx: 0, dz: spacing, edge: 'north' },
                    { dx: -spacing, dz: 0, edge: 'west' }
                ];

                const available = directions.filter(({ dx, dz }) => !roadPositions.has(`${node.x + dx},${node.z + dz}`));
                const createFromDirection = ({ dx, dz }) => this.createSlot(node, node.x + dx, node.z + dz);

                const isCornerNode = node.id < this.mainLoopCount && (
                    (node.x === this.mapBounds.minX || node.x === this.mapBounds.maxX)
                    && (node.z === this.mapBounds.minZ || node.z === this.mapBounds.maxZ)
                );

                if (node.id < this.mainLoopCount && this.mapBounds) {
                    const outward = [];
                    if (node.z === this.mapBounds.minZ) outward.push(...available.filter(dir => dir.edge === 'south'));
                    if (node.z === this.mapBounds.maxZ) outward.push(...available.filter(dir => dir.edge === 'north'));
                    if (node.x === this.mapBounds.minX) outward.push(...available.filter(dir => dir.edge === 'west'));
                    if (node.x === this.mapBounds.maxX) outward.push(...available.filter(dir => dir.edge === 'east'));
                    const shouldCreate = isCornerNode || node.id % 2 === 0;
                    if (shouldCreate) (outward.length > 0 ? outward : available.slice(0, 1)).forEach(createFromDirection);
                    return;
                }

                if (node.npc === 'WIZARD') {
                    available.forEach(createFromDirection);
                    return;
                }

                if (available.length > 0 && node.id % 3 === 0) {
                    const index = Math.abs(node.id + node.x * 3 + node.z) % available.length;
                    createFromDirection(available[index]);
                }
            },

            createWizardMarker(node) {
                const group = new THREE.Group();
                const hat = new THREE.Mesh(
                    new THREE.ConeGeometry(0.55, 0.95, 6),
                    new THREE.MeshToonMaterial({ color: 0xa55eea })
                );
                hat.position.y = 0.85;
                const brim = this.createToonBox(0.9, 0.12, 0.9, 0x2f2147, false);
                brim.position.y = 0.35;
                group.add(hat, brim);
                group.userData.baseY = 0.18;
                group.position.set(node.x, -8, node.z);
                this.scene.add(group);
                node.npcMesh = group;
            },

            getMapIntroObjects() {
                return [
                    ...this.roadSegments,
                    ...this.nodes.map(n => n.mesh),
                    ...this.slots.map(s => s.mesh),
                    ...this.nodes.map(n => n.npcMesh).filter(Boolean),
                    ...this.monsters.map(m => m.meshGroup)
                ].filter(Boolean);
            },

            animateMapIntro() {
                this.getMapIntroObjects().forEach((mesh, index) => {
                    const baseY = mesh.userData.baseY ?? mesh.position.y;
                    new TWEEN.Tween(mesh.position)
                        .to({ y: baseY }, 720)
                        .delay(index * 22)
                        .easing(TWEEN.Easing.Elastic.Out)
                        .onComplete(() => {
                            if (mesh.userData.startFloatAfterIntro) mesh.userData.startFloatAfterIntro();
                            if (mesh.userData.floatingTile) this.startTileFloat(mesh, index);
                        })
                        .start();
                });
            },

            startTileFloat(mesh, index = 0) {
                if (!mesh || !mesh.userData.floatingTile || mesh.userData.floatTween) return;
                const baseY = mesh.userData.baseY ?? mesh.position.y;
                mesh.position.y = baseY;
                const amplitude = mesh.userData.floatAmplitude ?? 0.07;
                const tween = new TWEEN.Tween(mesh.position)
                    .to({ y: baseY + amplitude }, 950 + (index % 5) * 70)
                    .delay((index % 7) * 45)
                    .yoyo(true)
                    .repeat(Infinity)
                    .easing(TWEEN.Easing.Sinusoidal.InOut)
                    .start();
                mesh.userData.floatTween = tween;
                this.tileFloatTweens.push(tween);
            },

            stopTileFloat(mesh) {
                if (!mesh?.userData?.floatTween) return;
                mesh.userData.floatTween.stop();
                this.tileFloatTweens = this.tileFloatTweens.filter(tween => tween !== mesh.userData.floatTween);
                mesh.userData.floatTween = null;
                mesh.position.y = mesh.userData.baseY ?? mesh.position.y;
            },

            createSlot(node, x, z) {
                // 检查是否与其他主路/副地块重叠 (简易判定)
                const overlap = this.nodes.find(n => n.x === x && n.z === z);
                if (overlap) return;
                const slotOverlap = this.slots.find(s => s.x === x && s.z === z);
                if (slotOverlap) {
                    if (!node.slots.includes(slotOverlap)) node.slots.push(slotOverlap);
                    return slotOverlap;
                }

                const slotMesh = this.createToonBox(1.3, 0.36, 1.3, this.slotTileColor);
                slotMesh.userData.baseY = 0.05;
                slotMesh.userData.floatingTile = true;
                slotMesh.userData.floatAmplitude = 0.055;
                slotMesh.position.set(x, -8, z);
                this.scene.add(slotMesh);

                const slot = {
                    node: node, x: x, z: z, mesh: slotMesh,
                    type: 'EMPTY', // EMPTY, TRAP, GUARD, INCOME, HEAL, TRAINING
                    level: 0,
                    maxLevel: this.maxFacilityLevel,
                    owner: null,
                    facilityMesh: null,
                    defense: 0,
                    guardSlots: 0,
                    guards: [],
                    monster: null
                };
                node.slots.push(slot);
                this.slots.push(slot);
                if (node.id % 5 === 2) this.spawnMonsterOnSlot(slot);
                return slot;
            },

            spawnMonsterOnSlot(slot) {
                const group = new THREE.Group();
                const bodyGeom = new THREE.SphereGeometry(0.36, 16, 16);
                const body = new THREE.Mesh(bodyGeom, new THREE.MeshToonMaterial({ color: 0x20bf6b }));
                body.scale.set(1.15, 0.72, 1.15);
                body.position.y = 0.42;
                body.castShadow = true;

                const hornGeom = new THREE.ConeGeometry(0.16, 0.32, 8);
                const horn = new THREE.Mesh(hornGeom, new THREE.MeshToonMaterial({ color: 0xf7f1e3 }));
                horn.position.set(0.18, 0.78, 0.06);
                horn.rotation.z = -0.35;
                horn.castShadow = true;

                group.add(body);
                group.add(horn);
                group.userData.baseY = 0.18;
                group.position.set(slot.x, -8, slot.z);
                this.scene.add(group);

                const monster = {
                    name: '野生黏黏怪',
                    hp: 28,
                    maxHp: 28,
                    atk: 6,
                    exp: 20,
                    gold: 25,
                    slot,
                    meshGroup: group,
                    bodyMesh: body
                };
                slot.monster = monster;
                this.monsters.push(monster);

                group.userData.startFloatAfterIntro = () => {
                    if (monster.floatTween) return;
                    monster.floatTween = new TWEEN.Tween(group.position)
                        .to({ y: 0.34 }, 700)
                        .yoyo(true)
                        .repeat(Infinity)
                        .easing(TWEEN.Easing.Sinusoidal.InOut)
                        .start();
                };
            },

            clearMonster(slot) {
                if (!slot || !slot.monster) return;
                const monster = slot.monster;
                if (monster.floatTween) monster.floatTween.stop();
                if (monster.meshGroup) this.scene.remove(monster.meshGroup);
                this.monsters = this.monsters.filter(m => m !== monster);
                slot.monster = null;
            },

            initPlayers() {
                const colors = [0x70a1ff, 0xff4757, 0xeccc68, 0xa55eea]; // 蓝(玩家), 红, 黄, 紫
                const names = ["人类勇者", "兽人AI", "精灵AI", "亡灵AI"];

                for (let i = 0; i < 4; i++) {
                    // 角色模型：球体 + 挤压变形组
                    const group = new THREE.Group();
                    const geom = new THREE.SphereGeometry(0.32, 16, 16);
                    const mat = new THREE.MeshToonMaterial({ color: colors[i] });
                    const mesh = new THREE.Mesh(geom, mat);
                    mesh.position.y = 0.43;
                    mesh.castShadow = true;

                    // 背面膨胀描边法 (BackSide Outline)
                    const outlineMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.BackSide });
                    const outlineMesh = new THREE.Mesh(geom, outlineMat);
                    outlineMesh.scale.set(1.12, 1.12, 1.12);
                    mesh.add(outlineMesh);

                    const stancePad = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.26, 0.32, 0.045, 18),
                        new THREE.MeshToonMaterial({ color: colors[i] })
                    );
                    stancePad.position.y = 0.04;
                    stancePad.castShadow = false;
                    stancePad.receiveShadow = true;

                    group.add(stancePad, mesh);
                    group.position.set(this.nodes[0].x, 0.25, this.nodes[0].z);
                    this.scene.add(group);

                    this.players.push({
                        id: i, isPlayer: i === 0, name: names[i], color: colors[i],
                        meshGroup: group, bodyMesh: mesh, stancePad,
                        nodeIndex: 0,
                        hp: 50, maxHp: 50, atk: 10, gold: 200, exp: 0, level: 1,
                        deck: ['STRIKE', 'STRIKE', 'STRIKE', 'GUARD_UP', 'GUARD_UP', 'FIREBALL'],
                        drawPile: [],
                        discardPile: []
                    });
                }
                this.reflowAllCharacterStances(false);
            },

            getPlayersOnNode(nodeIndex) {
                return this.players
                    .filter(player => player.nodeIndex === nodeIndex)
                    .sort((a, b) => a.id - b.id);
            },

            getNodeStandPosition(nodeIndex, player, occupants = null) {
                const node = this.nodes[nodeIndex];
                const group = occupants || this.getPlayersOnNode(nodeIndex);
                const count = Math.max(1, group.length);
                const index = Math.max(0, group.findIndex(p => p.id === player.id));

                if (count === 1) {
                    return new THREE.Vector3(node.x, 0.25, node.z);
                }

                const radius = Math.min(0.62, 0.34 + count * 0.08);
                const angle = -Math.PI / 2 + (Math.PI * 2 * index / count);
                return new THREE.Vector3(
                    node.x + Math.cos(angle) * radius,
                    0.25,
                    node.z + Math.sin(angle) * radius
                );
            },

            animateStandShift(player, target) {
                const lift = Math.max(player.meshGroup.position.y, target.y) + 0.18;
                new TWEEN.Tween(player.meshGroup.position)
                    .to({ x: target.x, y: lift, z: target.z }, 190)
                    .easing(TWEEN.Easing.Back.Out)
                    .onComplete(() => {
                        new TWEEN.Tween(player.meshGroup.position)
                            .to({ x: target.x, y: target.y, z: target.z }, 210)
                            .easing(TWEEN.Easing.Bounce.Out)
                            .start();
                    })
                    .start();
                new TWEEN.Tween(player.meshGroup.rotation)
                    .to({ z: player.id % 2 === 0 ? 0.18 : -0.18 }, 120)
                    .yoyo(true)
                    .repeat(1)
                    .easing(TWEEN.Easing.Quadratic.Out)
                    .onComplete(() => { player.meshGroup.rotation.z = 0; })
                    .start();
                new TWEEN.Tween(player.bodyMesh.scale)
                    .to({ x: 1.08, y: 0.92, z: 1.08 }, 100)
                    .yoyo(true)
                    .repeat(1)
                    .easing(TWEEN.Easing.Quadratic.Out)
                    .start();
            },

            reflowNodeOccupants(nodeIndex, animated = true, excludePlayer = null) {
                const occupants = this.getPlayersOnNode(nodeIndex);
                occupants.forEach(player => {
                    if (excludePlayer && player.id === excludePlayer.id) return;
                    const target = this.getNodeStandPosition(nodeIndex, player, occupants);
                    if (animated) {
                        this.animateStandShift(player, target);
                    } else {
                        player.meshGroup.position.copy(target);
                    }
                });
            },

            reflowAllCharacterStances(animated = true) {
                this.nodes.forEach(node => this.reflowNodeOccupants(node.id, animated));
            },

            bounceNode(node) {
                if (!node || !node.mesh) return;
                this.stopTileFloat(node.mesh);
                const baseY = node.mesh.userData.baseY ?? 0;
                new TWEEN.Tween(node.mesh.position)
                    .to({ y: baseY - 0.18 }, 90)
                    .easing(TWEEN.Easing.Quadratic.In)
                    .onComplete(() => {
                        new TWEEN.Tween(node.mesh.position)
                            .to({ y: baseY }, 420)
                            .easing(TWEEN.Easing.Elastic.Out)
                            .onComplete(() => this.startTileFloat(node.mesh, node.id))
                            .start();
                    })
                    .start();
            },

            async chooseNextNodeIndex(node, player, allowPlayerChoice = true) {
                const options = node.nextOptions || [{ target: node.next, weight: 1 }];
                if (options.length === 1) return options[0].target;
                if (player.isPlayer && allowPlayerChoice) return await this.waitForBranchChoice(node, options);

                const choice = options[Math.floor(Math.random() * options.length)];
                if (choice.target !== node.next) {
                    this.log(`${player.name} 发现岔路，走向了另一条浮空小径。`);
                }
                return choice.target;
            },

            waitForBranchChoice(node, options) {
                const menu = document.getElementById('branch-menu');
                const optionBox = document.getElementById('branch-options');
                this.transitionTo(TurnState.BRANCH_CHOICE);
                menu.style.display = 'none';
                optionBox.innerHTML = '';
                this.showBranchChoiceArrows(node, options);
                this.log("来到岔路口，请点击路块上的箭头选择方向。");

                return new Promise(resolve => {
                    this.branchChoiceResolver = (option) => {
                        this.clearBranchChoiceArrows();
                        if (option.target !== node.next) {
                            this.log(`${this.players[this.currentPlayerIndex].name} 选择了岔路。`);
                        }
                        this.transitionTo(TurnState.MOVING);
                        resolve(option.target);
                    };
                });
            },

            showBranchChoiceArrows(node, options) {
                this.clearBranchChoiceArrows();
                options.forEach(option => {
                    const target = this.nodes[option.target];
                    const arrow = this.createBranchChoiceArrow(node, target, option);
                    this.branchChoiceArrows.push(arrow);
                });
            },

            createBranchChoiceArrow(node, target, option) {
                const dx = Math.sign(target.x - node.x);
                const dz = Math.sign(target.z - node.z);
                const group = new THREE.Group();
                group.position.set(0, 0.34, 0);
                group.rotation.y = Math.atan2(-dx, -dz);

                const mat = new THREE.MeshToonMaterial({ color: this.branchArrowColor });
                const shaft = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.08, 0.72), mat);
                shaft.position.z = -0.14;
                const head = new THREE.Mesh(new THREE.ConeGeometry(0.34, 0.52, 3), mat);
                head.rotation.x = -Math.PI / 2;
                head.position.z = -0.62;
                const hit = new THREE.Mesh(
                    new THREE.BoxGeometry(0.82, 0.18, 1.22),
                    new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false })
                );
                hit.position.set(0, 0.03, -0.34);

                group.add(shaft, head, hit);
                node.mesh.add(group);

                const arrow = {
                    node,
                    target,
                    option,
                    group,
                    material: mat,
                    meshes: [shaft, head, hit]
                };
                group.userData.branchArrow = arrow;
                arrow.meshes.forEach(mesh => {
                    mesh.userData.branchArrow = arrow;
                    mesh.userData.clickableBranchArrow = true;
                });
                return arrow;
            },

            clearBranchChoiceArrows() {
                this.setHoveredBranchArrow(null);
                this.branchChoiceArrows.forEach(arrow => {
                    if (arrow.group.parent) arrow.group.parent.remove(arrow.group);
                });
                this.branchChoiceArrows = [];
                this.branchChoiceResolver = null;
            },

            selectBranchArrow(arrow) {
                if (!arrow || !this.branchChoiceResolver) return;
                const resolver = this.branchChoiceResolver;
                this.branchChoiceResolver = null;
                resolver(arrow.option);
            },

            getBranchDirectionLabel(fromNode, targetNode, fallback = '道路') {
                const dx = targetNode.x - fromNode.x;
                const dz = targetNode.z - fromNode.z;
                if (Math.abs(dx) > Math.abs(dz)) return dx > 0 ? `${fallback} 向右` : `${fallback} 向左`;
                if (dz !== 0) return dz > 0 ? `${fallback} 向后` : `${fallback} 向前`;
                return fallback;
            },

            getOrderedLandingEventSlots(slots, player) {
                const priority = (slot) => {
                    if (slot.owner === player) return 0;
                    if (slot.owner && slot.owner !== player) return 1;
                    return 2;
                };
                return [...slots].sort((a, b) => priority(a) - priority(b));
            },

            setNodeFacilityOpacity(node, opacity) {
                if (!node) return;
                node.slots.forEach(slot => {
                    if (!slot.facilityMesh) return;
                    slot.facilityMesh.traverse(child => {
                        if (!child.material) return;
                        child.material.transparent = opacity < 1;
                        child.material.opacity = opacity;
                    });
                });
            },

            getDiceOccluderMeshes(node) {
                if (!node) return [];
                return node.slots.flatMap(slot => [
                    slot.facilityMesh,
                    slot.guardMarkerGroup
                ]).filter(Boolean);
            },

            fadeDiceOccluders(node, opacity = 0.36) {
                this.restoreDiceOccluders();
                this.getDiceOccluderMeshes(node).forEach(root => {
                    root.traverse(child => {
                        if (!child.material) return;
                        const materials = Array.isArray(child.material) ? child.material : [child.material];
                        materials.forEach(material => {
                            this.diceOccluderSnapshots.push({
                                material,
                                transparent: material.transparent,
                                opacity: material.opacity,
                                depthWrite: material.depthWrite
                            });
                            material.transparent = opacity < 1;
                            material.opacity = opacity;
                            material.depthWrite = opacity >= 1;
                            material.needsUpdate = true;
                        });
                    });
                });
            },

            restoreDiceOccluders() {
                this.diceOccluderSnapshots.forEach(snapshot => {
                    snapshot.material.transparent = snapshot.transparent;
                    snapshot.material.opacity = snapshot.opacity;
                    snapshot.material.depthWrite = snapshot.depthWrite;
                    snapshot.material.needsUpdate = true;
                });
                this.diceOccluderSnapshots = [];
            },

            getFacilityConfig(type) {
                return this.facilityConfigs[type] || this.facilityConfigs.TRAP;
            },

            getFacilityName(slotOrType) {
                const type = typeof slotOrType === 'string' ? slotOrType : slotOrType.type;
                return this.getFacilityConfig(type).name;
            },

            getUpgradeCost(slot) {
                return 50 + slot.level * 35;
            },

            getUpgradeDefenseGain(slot) {
                if (slot?.type === 'FORTRESS') {
                    return 28 + slot.level * 12;
                }
                return this.canFacilityHostGuards(slot)
                    ? 12 + slot.level * 4
                    : 20 + slot.level * 9;
            },

            isFacilityMaxLevel(slot) {
                return slot.type !== 'EMPTY' && slot.level >= slot.maxLevel;
            },

            canFacilityHostGuards(slot) {
                return slot.type !== 'EMPTY' && !!this.getFacilityConfig(slot.type).allowsGuards;
            },

            getGuardCapacity(slot) {
                if (!this.canFacilityHostGuards(slot)) return 0;
                const config = this.getFacilityConfig(slot.type);
                return Math.max(config.guardSlots || 1, slot.level);
            },

            getGuardRecruitCost(slot) {
                return this.guardRecruitCost + slot.guards.length * 25 + Math.max(0, slot.level - 1) * 10;
            },

            getGuardArchetype(preferredKey = null, slot = null) {
                if (preferredKey) {
                    const explicit = this.guardArchetypes.find(guard => guard.key === preferredKey);
                    if (explicit) return explicit;
                }
                if (slot?.type === 'TRAP') {
                    return this.guardArchetypes.find(guard => guard.key === 'SCOUT');
                }
                if (slot?.type === 'COMMAND') {
                    return this.guardArchetypes.find(guard => guard.key === 'SPEAR');
                }
                if (slot?.type === 'WORKSHOP' || slot?.type === 'GUARD') {
                    return this.guardArchetypes.find(guard => guard.key === 'SHIELD');
                }
                if (slot?.type === 'BARRACKS' || slot?.type === 'TRAINING') {
                    return this.guardArchetypes.find(guard => guard.key === 'SPEAR');
                }
                if (slot?.type === 'HEAL' || slot?.type === 'INCOME') {
                    return this.guardArchetypes.find(guard => guard.key === 'SCOUT');
                }
                return this.guardArchetypes[(slot.guards.length + slot.level - 1) % this.guardArchetypes.length];
            },

            createGuard(slot, preferredKey = null) {
                const archetype = this.getGuardArchetype(preferredKey, slot);
                const index = slot.guards.length + 1;
                return {
                    key: archetype.key,
                    roleName: archetype.name,
                    name: `${archetype.name}${index}`,
                    maxHp: archetype.maxHp + slot.level * 5,
                    hp: archetype.maxHp + slot.level * 5,
                    atk: archetype.atk + slot.level * 2,
                    color: archetype.color
                };
            },

            getGuardPower(slot) {
                return slot.guards.reduce((sum, guard) => sum + guard.hp + guard.atk * 3, 0);
            },

            getGuardSummary(slot, joiner = ' / ') {
                if (!slot.guards || slot.guards.length === 0) return '无守军';
                return slot.guards
                    .map(guard => `${guard.name} HP${guard.hp}/${guard.maxHp} ATK${guard.atk}`)
                    .join(joiner);
            },

            getGuardRoleCounts(slot) {
                const counts = { SHIELD: 0, SPEAR: 0, SCOUT: 0, total: 0 };
                (slot.guards || []).forEach(guard => {
                    if (counts[guard.key] === undefined) counts[guard.key] = 0;
                    counts[guard.key] += 1;
                    counts.total += 1;
                });
                return counts;
            },

            getGuardTraitSummary(slot) {
                const counts = this.getGuardRoleCounts(slot);
                const traits = [];
                if (counts.SHIELD > 0) traits.push(`盾卫${counts.SHIELD} 提升城墙减伤`);
                if (counts.SPEAR > 0) traits.push(`枪兵${counts.SPEAR} 强化反击`);
                if (counts.SCOUT > 0) traits.push(`斥候${counts.SCOUT} 提高闪避`);
                return traits.length > 0 ? traits.join(' / ') : '暂无守军特性';
            },

            getGuardRecruitMenuCopy(archetype, slot) {
                const levelBoost = slot?.level || 1;
                const baseHp = archetype.maxHp + levelBoost * 5;
                const baseAtk = archetype.atk + levelBoost * 2;
                const traitText = {
                    SHIELD: '顶在最前面，显著提高城墙与守军的减伤。',
                    SPEAR: '反击更狠，容易打出破防式的穿刺压力。',
                    SCOUT: '更灵活，能给守军阶段带来闪避和绕侧突袭。'
                };
                return {
                    title: `${archetype.name} (${baseHp}HP / ${baseAtk}ATK)`,
                    text: traitText[archetype.key] || '可部署守军。'
                };
            },

            getTransferTargets(slot, owner) {
                if (!slot || !owner) return [];
                return this.activeNode.slots.filter(other =>
                    other !== slot
                    && other.owner === owner
                    && other.type !== 'EMPTY'
                    && this.canFacilityHostGuards(other)
                    && other.guards.length < this.getGuardCapacity(other)
                );
            },

            getNodeOwnedFacilities(owner) {
                if (!this.activeNode || !owner) return [];
                return this.activeNode.slots.filter(slot => slot.owner === owner && slot.type !== 'EMPTY');
            },

            getNodeOtherOwnedFacilities(slot) {
                if (!slot?.owner) return [];
                return this.getNodeOwnedFacilities(slot.owner).filter(other => other !== slot);
            },

            resetGuardTransferMenu() {
                this.guardTransferSource = null;
                const transferOptions = document.getElementById('guard-transfer-options');
                transferOptions.innerHTML = '';
                transferOptions.style.display = 'none';
                const recruitOptions = document.getElementById('guard-recruit-options');
                recruitOptions.innerHTML = '';
                recruitOptions.style.display = 'none';
                document.querySelector('#build-menu .build-options').style.display = 'flex';
            },

            getBuildingBattlePreview(slot) {
                const hasGuard = slot.guards.length > 0 || slot.type === 'GUARD';
                const roleCounts = this.getGuardRoleCounts(slot);
                const wallHp = Math.max(28, slot.defense * 2);
                const freeGuardHp = slot.type === 'GUARD' && slot.guards.length === 0 ? 24 + slot.level * 8 : 0;
                const guardHp = slot.guards.reduce((sum, guard) => sum + guard.hp, 0) + freeGuardHp;
                const guardAtk = slot.guards.reduce((sum, guard) => sum + guard.atk, 0);
                const fortressWallBonus = slot.type === 'FORTRESS' ? 18 + slot.level * 10 : 0;
                const fortressArmorBonus = slot.type === 'FORTRESS' ? 4 + slot.level * 2 : 0;
                const wallArmor = roleCounts.SHIELD * 3 + (slot.type === 'WORKSHOP' ? 2 + slot.level : 0) + fortressArmorBonus;
                const guardArmor = roleCounts.SHIELD * 2 + (slot.type === 'COMMAND' ? 1 + Math.floor(slot.level / 2) : 0);
                const dodgeChance = Math.min(0.36, roleCounts.SCOUT * 0.08);
                const counterBonus = roleCounts.SPEAR * 2;
                const fortifiedWallHp = wallHp + roleCounts.SHIELD * 10 + fortressWallBonus;
                const wallAtk = 3 + slot.level + Math.ceil(guardAtk * 0.45) + roleCounts.SPEAR + (slot.type === 'FORTRESS' ? 2 + slot.level : 0);
                const commandBonus = slot.type === 'COMMAND' ? 2 + roleCounts.total : 0;
                const guardPhaseAtk = hasGuard ? 5 + slot.level * 2 + guardAtk + counterBonus + roleCounts.SCOUT + commandBonus : wallAtk;
                const atk = hasGuard ? wallAtk : guardPhaseAtk;
                const hp = fortifiedWallHp + guardHp;
                const battlePlan = slot.type === 'FORTRESS'
                    ? '只有厚重堡墙，但会持续加固并压制来犯者'
                    : (slot.type === 'COMMAND' && hasGuard
                    ? '守军会在指挥所号令下整队反扑'
                    : (hasGuard ? '守军躲在城墙后' : '只有城墙'));
                return {
                    hasGuard,
                    wallHp: fortifiedWallHp,
                    guardHp,
                    guardAtk,
                    wallAtk,
                    guardPhaseAtk,
                    wallArmor,
                    guardArmor,
                    dodgeChance,
                    counterBonus,
                    roleCounts,
                    atk,
                    hp,
                    battlePlan,
                    label: hasGuard ? '守军+城墙' : '墙壁战'
                };
            },

            getFacilityBattleRewards(slot) {
                const guardCount = slot.guards?.length || 0;
                return {
                    gold: 70 + slot.level * 35 + guardCount * 25 + (slot.type === 'WORKSHOP' ? 20 : 0) + (slot.type === 'COMMAND' ? 15 : 0) + (slot.type === 'FORTRESS' ? 25 : 0),
                    exp: 30 + slot.level * 15 + guardCount * 10 + (slot.type === 'GUARD' ? 10 : 0) + (slot.type === 'COMMAND' ? 12 : 0) + (slot.type === 'FORTRESS' ? 18 : 0)
                };
            },

            getGuardPressurePayload(slot) {
                const roleCounts = this.getGuardRoleCounts(slot);
                return {
                    goldLoss: 8 + slot.level * 4 + roleCounts.SPEAR * 6 + roleCounts.total * 2 + (slot.type === 'COMMAND' ? 6 + roleCounts.total * 3 : 0),
                    damage: roleCounts.SCOUT * (2 + Math.ceil(slot.level / 2)) + (slot.type === 'GUARD' ? 3 + slot.level : 0) + (slot.type === 'COMMAND' ? 2 + slot.level : 0),
                    defenseBoost: roleCounts.SHIELD * 2 + (slot.type === 'GUARD' ? slot.level : 0),
                    roleCounts
                };
            },

            setActionConsumed(consumed) {
                this.actionConsumedThisTurn = consumed;
            },

            finishAction(consumesTurn = true) {
                if (consumesTurn) {
                    this.setActionConsumed(true);
                    this.endTurn();
                } else {
                    this.setActionConsumed(false);
                    this.closeBuildMenu();
                }
            },

            setBuildMenuButtons(mode) {
                const buildIds = ['btn-build-trap', 'btn-build-guard', 'btn-build-income', 'btn-build-heal', 'btn-build-training', 'btn-build-barracks', 'btn-build-command', 'btn-build-fortress', 'btn-build-workshop'];
                document.querySelector('.build-options').style.display = 'flex';
                const player = this.players[this.currentPlayerIndex];
                buildIds.forEach(id => {
                    const btn = document.getElementById(id);
                    btn.style.display = mode === 'build' ? 'inline-block' : 'none';
                    const type = btn.getAttribute('onclick').match(/'([^']+)'/)?.[1];
                    const cost = this.facilityConfigs[type]?.cost || 0;
                    btn.disabled = mode === 'build' && player.gold < cost;
                });
                const upgradeBtn = document.getElementById('btn-upgrade-facility');
                const recruitBtn = document.getElementById('btn-recruit-guard');
                const transferBtn = document.getElementById('btn-transfer-guard');
                const demolishBtn = document.getElementById('btn-demolish-facility');
                const monsterBtn = document.getElementById('btn-fight-monster');
                const challengeBtn = document.getElementById('btn-challenge-facility');
                upgradeBtn.style.display = mode === 'owned' ? 'inline-block' : 'none';
                recruitBtn.style.display = mode === 'owned' ? 'inline-block' : 'none';
                transferBtn.style.display = mode === 'owned' ? 'inline-block' : 'none';
                demolishBtn.style.display = mode === 'owned' ? 'inline-block' : 'none';
                monsterBtn.style.display = mode === 'monster' ? 'inline-block' : 'none';
                challengeBtn.style.display = mode === 'enemy' ? 'inline-block' : 'none';
                upgradeBtn.disabled = false;
                recruitBtn.disabled = false;
                transferBtn.disabled = false;
                demolishBtn.disabled = false;
                monsterBtn.disabled = false;
                challengeBtn.disabled = false;
            },

            updateFacilityVisual(slot) {
                if (!slot.facilityMesh) return;
                const scale = 1 + (slot.level - 1) * 0.18;
                slot.facilityMesh.scale.set(scale, scale, scale);
                slot.facilityMesh.position.y = 0.6 + (slot.level - 1) * 0.08;
                this.updateGuardMarkers(slot);
            },

            updateGuardMarkers(slot) {
                if (slot.guardMarkerGroup) {
                    this.scene.remove(slot.guardMarkerGroup);
                    slot.guardMarkerGroup = null;
                }
                if (!slot.guards || slot.guards.length === 0) return;

                const group = new THREE.Group();
                slot.guards.forEach((guard, index) => {
                    const marker = this.createToonBox(0.22, 0.28, 0.22, guard.color || 0x1e90ff, false);
                    const angle = (Math.PI * 2 * index) / Math.max(1, slot.guards.length);
                    marker.position.set(Math.cos(angle) * 0.55, 0.95, Math.sin(angle) * 0.55);
                    group.add(marker);
                });
                group.position.set(slot.x, 0, slot.z);
                this.scene.add(group);
                slot.guardMarkerGroup = group;
            },

            clearFacility(slot) {
                if (slot.facilityMesh) {
                    this.scene.remove(slot.facilityMesh);
                }
                if (slot.guardMarkerGroup) {
                    this.scene.remove(slot.guardMarkerGroup);
                }
                slot.type = 'EMPTY';
                slot.level = 0;
                slot.maxLevel = this.maxFacilityLevel;
                slot.owner = null;
                slot.facilityMesh = null;
                slot.defense = 0;
                slot.guardSlots = 0;
                slot.guards = [];
                slot.guardMarkerGroup = null;
            },

            setRayFromPointer(e) {
                this.mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                this.mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                this.raycaster.setFromCamera(this.mouse, this.camera);
            },

            getSlotDisplayColor(slot) {
                if (this.state === TurnState.ACTION_SELECT && this.activeNode?.slots.includes(slot)) return 0xffffff;
                return this.slotTileColor;
            },

            pickBranchArrow() {
                const meshes = this.branchChoiceArrows.flatMap(arrow => arrow.meshes);
                const intersects = this.raycaster.intersectObjects(meshes, false);
                return intersects.length > 0 ? intersects[0].object.userData.branchArrow : null;
            },

            isObjectInTree(object, root) {
                let current = object;
                while (current) {
                    if (current === root) return true;
                    current = current.parent;
                }
                return false;
            },

            pickPlayer() {
                const groups = this.players.map(player => player.meshGroup).filter(Boolean);
                const intersects = this.raycaster.intersectObjects(groups, true);
                if (intersects.length === 0) return null;
                return this.players.find(player => player.meshGroup && this.isObjectInTree(intersects[0].object, player.meshGroup)) || null;
            },

            pickMonster() {
                const groups = this.monsters.map(monster => monster.meshGroup).filter(Boolean);
                const intersects = this.raycaster.intersectObjects(groups, true);
                if (intersects.length === 0) return null;
                return this.monsters.find(monster => this.isObjectInTree(intersects[0].object, monster.meshGroup)) || null;
            },

            pickFacilitySlot() {
                const meshes = this.slots.flatMap(slot => [slot.facilityMesh, slot.guardMarkerGroup]).filter(Boolean);
                const intersects = this.raycaster.intersectObjects(meshes, true);
                if (intersects.length === 0) return null;
                return this.slots.find(slot =>
                    (slot.facilityMesh && this.isObjectInTree(intersects[0].object, slot.facilityMesh))
                    || (slot.guardMarkerGroup && this.isObjectInTree(intersects[0].object, slot.guardMarkerGroup))
                ) || null;
            },

            pickHoverInfoTarget() {
                const hoverables = [
                    ...this.players
                        .filter(player => player.meshGroup)
                        .map(player => ({ type: 'player', ref: player, root: player.meshGroup })),
                    ...this.slots
                        .filter(slot => slot.owner)
                        .flatMap(slot => [
                            slot.facilityMesh ? { type: 'facility', ref: slot, root: slot.facilityMesh } : null,
                            slot.guardMarkerGroup ? { type: 'facility', ref: slot, root: slot.guardMarkerGroup } : null
                        ])
                        .filter(Boolean),
                    ...this.monsters
                        .filter(monster => monster.meshGroup)
                        .map(monster => ({ type: 'monster', ref: monster, root: monster.meshGroup }))
                ];

                if (hoverables.length === 0) return null;
                const intersects = this.raycaster.intersectObjects(hoverables.map(item => item.root), true);
                if (intersects.length === 0) return null;
                const hit = hoverables.find(item => this.isObjectInTree(intersects[0].object, item.root));
                return hit ? { type: hit.type, ref: hit.ref } : null;
            },

            pickSlot() {
                const intersects = this.raycaster.intersectObjects(this.slots.map(s => s.mesh), false);
                if (intersects.length === 0) return null;
                return this.slots.find(s => s.mesh === intersects[0].object) || null;
            },

            pickNode() {
                const intersects = this.raycaster.intersectObjects(this.nodes.map(n => n.mesh), false);
                if (intersects.length === 0) return null;
                return this.nodes.find(n => n.mesh === intersects[0].object) || null;
            },

            setHoveredBranchArrow(arrow) {
                if (this.hoveredBranchArrow === arrow) return;
                if (this.hoveredBranchArrow) {
                    this.hoveredBranchArrow.material.color.setHex(this.branchArrowColor);
                }
                this.hoveredBranchArrow = arrow;
                if (this.hoveredBranchArrow) {
                    this.hoveredBranchArrow.material.color.setHex(this.branchArrowHoverColor);
                }
            },

            setHoveredSlot(slot) {
                if (this.hoveredSlot === slot) return;
                if (this.hoveredSlot) {
                    this.hoveredSlot.mesh.material.color.setHex(this.getSlotDisplayColor(this.hoveredSlot));
                }
                this.hoveredSlot = slot;
                if (this.hoveredSlot) {
                    this.hoveredSlot.mesh.material.color.setHex(this.slotHoverColor);
                }
            },

            setHoveredNode(node) {
                if (this.hoveredNode === node) return;
                if (this.hoveredNode) {
                    this.hoveredNode.mesh.material.color.setHex(this.roadTileColor);
                }
                this.hoveredNode = node;
                if (this.hoveredNode) {
                    this.hoveredNode.mesh.material.color.setHex(this.roadHoverColor);
                }
            },

            escapeHtml(value) {
                return String(value)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            },

            infoRow(label, value) {
                return `<div class="info-row"><span>${this.escapeHtml(label)}</span><strong>${this.escapeHtml(value)}</strong></div>`;
            },

            buildPlayerInfo(player) {
                const tag = player.isPlayer ? '我方角色' : '敌方角色';
                return `
                    <div class="info-title" style="color:#${player.color.toString(16).padStart(6, '0')}">${this.escapeHtml(player.name)}</div>
                    <div class="info-tag">${tag}</div>
                    ${this.infoRow('等级', `Lv.${player.level}`)}
                    ${this.infoRow('HP', `${player.hp}/${player.maxHp}`)}
                    ${this.infoRow('ATK', player.atk)}
                    ${this.infoRow('金币', `${player.gold}G`)}
                    ${this.infoRow('牌库', `${player.deck.length} 张`)}
                `;
            },

            buildMonsterInfo(monster) {
                return `
                    <div class="info-title">${this.escapeHtml(monster.name)}</div>
                    <div class="info-tag">野怪</div>
                    ${this.infoRow('HP', `${monster.hp}/${monster.maxHp}`)}
                    ${this.infoRow('ATK', monster.atk)}
                    ${this.infoRow('奖励', `${monster.gold}G / ${monster.exp}EXP`)}
                `;
            },

            buildFacilityInfo(slot) {
                const ownedByPlayer = slot.owner?.isPlayer;
                const tag = ownedByPlayer ? '我方建筑' : '敌方建筑';
                const capacity = this.getGuardCapacity(slot);
                const preview = this.getBuildingBattlePreview(slot);
                const guardText = capacity > 0
                    ? `${slot.guards.length}/${capacity}`
                    : '不可驻防';
                return `
                    <div class="info-title">${this.escapeHtml(this.getFacilityName(slot))}</div>
                    <div class="info-tag">${tag}</div>
                    ${this.infoRow('归属', slot.owner ? slot.owner.name : '无主')}
                    ${this.infoRow('等级', `Lv.${slot.level}/${slot.maxLevel}`)}
                    ${this.infoRow('防御', slot.defense)}
                    ${this.infoRow('守军', guardText)}
                    ${this.infoRow('驻军编成', this.getGuardSummary(slot, ' | '))}
                    ${this.infoRow('守军特性', this.getGuardTraitSummary(slot))}
                    ${this.infoRow('推荐补员', this.getGuardArchetype(null, slot)?.name || '通用守军')}
                    ${this.infoRow('防守类型', preview.battlePlan || preview.label)}
                    ${this.infoRow('城墙HP', preview.wallHp)}
                    ${this.infoRow('守军HP', preview.guardHp)}
                    ${this.infoRow('城墙减伤', preview.wallArmor)}
                    ${this.infoRow('守军减伤', preview.guardArmor)}
                    ${this.infoRow('闪避率', `${Math.round(preview.dodgeChance * 100)}%`)}
                    ${this.infoRow('城墙阶段ATK', preview.wallAtk)}
