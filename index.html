<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D魔幻RPG大富翁</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* 禁用默认的下拉刷新和双指缩放 */
            user-select: none;
        }
        #game-canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        
        /* 界面UI */
        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }
        
        .panel {
            background: rgba(255, 255, 255, 0.9);
            border: 4px solid #333;
            border-radius: 12px;
            padding: 15px;
            pointer-events: auto;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
        }

        #stats-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            min-width: 200px;
        }
        .stat-line { margin: 5px 0; font-weight: bold; color: #333; }
        .bar-bg { width: 100%; height: 15px; background: #ddd; border-radius: 8px; overflow: hidden; border: 2px solid #555; }
        .bar-fill { height: 100%; transition: width 0.3s; }
        .bar-hp { background: #ff4757; }
        .bar-exp { background: #1e90ff; }

        #action-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
        }

        .btn {
            background: #ff7f50;
            color: white;
            font-size: 24px;
            font-weight: bold;
            padding: 15px 40px;
            border: 4px solid #333;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 6px 0 #cc4e20, 0 8px 10px rgba(0,0,0,0.3);
            transition: all 0.1s;
            pointer-events: auto;
        }
        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #cc4e20, 0 2px 5px rgba(0,0,0,0.3);
        }
        .btn:disabled {
            background: #ccc;
            box-shadow: 0 6px 0 #999;
            cursor: not-allowed;
            color: #666;
        }

        #build-menu {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            text-align: center;
        }
        .build-options { display: flex; gap: 10px; margin-top: 15px; }
        .build-btn { padding: 10px; border: 2px solid #333; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .build-btn.trap { background: #a55eea; color: white; }
        .build-btn.guard { background: #ff4757; color: white; }
        .build-btn.income { background: #eccc68; color: #333; }
        .build-btn.heal { background: #7bed9f; color: #063b1f; }
        .build-btn.training { background: #ffb142; color: #332000; }
        .build-btn.upgrade { background: #2ed573; color: #063b1f; }
        .build-btn.demolish { background: #57606f; color: white; }
        .build-btn.recruit { background: #ff9f1a; color: #211300; }
        .build-btn.monster { background: #ff6b81; color: white; }
        .build-btn.challenge { background: #1e90ff; color: white; }
        .build-btn.cancel { background: #ced6e0; color: #333; }
        .build-btn:disabled { opacity: 0.45; cursor: not-allowed; }

        #msg-log {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 250px;
            max-height: 200px;
            overflow-y: hidden;
            background: rgba(0,0,0,0.6);
            color: white;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
            pointer-events: none;
        }
        .log-entry { margin-bottom: 5px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        /* 全屏红闪 (受伤特效) */
        #damage-flash {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: red; opacity: 0; pointer-events: none; transition: opacity 0.1s;
        }

        #battle-ui {
            position: absolute;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%);
            display: none;
            gap: 10px;
            pointer-events: auto;
            background: rgba(255,255,255,0.92);
            border: 4px solid #111;
            border-radius: 8px;
            padding: 12px;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.28);
        }
        .battle-command {
            min-width: 92px;
            padding: 12px 14px;
            border: 3px solid #111;
            background: #f8f1e1;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 0 #111;
        }
        .battle-command:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .battle-card {
            min-width: 112px;
            max-width: 140px;
            min-height: 118px;
            padding: 10px;
            border: 4px solid #111;
            border-radius: 8px;
            background: #fff8e8;
            color: #111;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 5px 0 #111;
            text-align: left;
        }
        .battle-card strong {
            display: block;
            margin-bottom: 8px;
            font-size: 16px;
        }
        .battle-card span {
            display: block;
            font-size: 12px;
            line-height: 1.25;
        }
        .battle-card.flee {
            background: #ced6e0;
        }
        .battle-card:active {
            transform: translateY(5px);
            box-shadow: none;
        }
        #taunt-layer {
            display: none;
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        .taunt-box {
            position: absolute;
            max-width: min(420px, 42vw);
            min-height: 58px;
            background: #fff8e8;
            color: #111;
            border: 5px solid #111;
            border-radius: 6px;
            padding: 14px 18px;
            font-size: 20px;
            font-weight: 900;
            line-height: 1.25;
            box-shadow: 7px 7px 0 rgba(0,0,0,0.32);
            transform: rotate(-2deg) skew(-3deg);
        }
        #taunt-hero { left: 7%; bottom: 24%; }
        #taunt-enemy { right: 7%; top: 18%; transform: rotate(2deg) skew(3deg); }
        #battle-result {
            display: none;
            position: absolute;
            left: 50%;
            top: 38%;
            transform: translate(-50%, -50%) rotate(-3deg);
            padding: 22px 34px;
            background: #ffdd59;
            color: #111;
            border: 6px solid #111;
            font-size: clamp(34px, 7vw, 78px);
            font-weight: 1000;
            letter-spacing: 0;
            box-shadow: 10px 10px 0 rgba(0,0,0,0.32);
            pointer-events: none;
        }

        #branch-menu {
            position: absolute;
            left: 50%;
            bottom: 118px;
            transform: translateX(-50%);
            display: none;
            text-align: center;
        }
        #branch-options {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }
        .branch-btn {
            min-width: 82px;
            padding: 10px 14px;
            border: 3px solid #111;
            border-radius: 8px;
            background: #f7f1e3;
            color: #111;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 0 #111;
        }
        .branch-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        #wizard-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            text-align: center;
            max-width: 420px;
        }
        #wizard-options {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 14px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div id="damage-flash"></div>
    <canvas id="game-canvas"></canvas>
    
    <div class="ui-layer">
        <div id="stats-panel" class="panel">
            <h2 id="char-name" style="margin-top:0; color:#2ed573;">玩家回合</h2>
            <div class="stat-line">LV: <span id="char-lv">1</span> | ATK: <span id="char-atk">10</span></div>
            <div class="stat-line">金币: 🪙 <span id="char-gold" style="color:#ffa502;">100</span></div>
            <div class="stat-line">HP: <span id="char-hp-txt">50/50</span></div>
            <div class="bar-bg"><div id="char-hp-bar" class="bar-fill bar-hp" style="width: 100%;"></div></div>
            <div class="stat-line">EXP:</div>
            <div class="bar-bg"><div id="char-exp-bar" class="bar-fill bar-exp" style="width: 0%;"></div></div>
        </div>

        <div id="action-panel">
            <button id="btn-roll" class="btn">掷骰子</button>
            <button id="btn-end" class="btn" style="display:none; background:#7bed9f; box-shadow: 0 6px 0 #2ed573;">结束回合</button>
        </div>

        <div id="build-menu" class="panel">
            <h3 style="margin-top:0;">建造地块操作</h3>
            <p id="build-desc">选择要建造的设施：</p>
            <div class="build-options">
                <button id="btn-build-trap" class="build-btn trap" onclick="Game.buildFacility('TRAP')">陷阱 (50G)</button>
                <button id="btn-build-guard" class="build-btn guard" onclick="Game.buildFacility('GUARD')">守卫 (80G)</button>
                <button id="btn-build-income" class="build-btn income" onclick="Game.buildFacility('INCOME')">金矿 (100G)</button>
                <button id="btn-build-heal" class="build-btn heal" onclick="Game.buildFacility('HEAL')">治疗营地 (90G)</button>
                <button id="btn-build-training" class="build-btn training" onclick="Game.buildFacility('TRAINING')">训练营 (120G)</button>
                <button id="btn-upgrade-facility" class="build-btn upgrade" onclick="Game.upgradeSelectedFacility()">升级</button>
                <button id="btn-recruit-guard" class="build-btn recruit" onclick="Game.recruitGuardForSelectedFacility()">招募守军</button>
                <button id="btn-demolish-facility" class="build-btn demolish" onclick="Game.demolishSelectedFacility()">拆毁</button>
                <button id="btn-fight-monster" class="build-btn monster" onclick="Game.fightSelectedMonster()">讨伐野怪</button>
                <button id="btn-challenge-facility" class="build-btn challenge" onclick="Game.challengeSelectedFacility()">挑战建筑</button>
                <button class="build-btn cancel" onclick="Game.closeBuildMenu()">返回选择</button>
            </div>
        </div>

        <div id="branch-menu" class="panel">
            <h3 style="margin:0;">选择岔路</h3>
            <div id="branch-options"></div>
        </div>

        <div id="wizard-menu" class="panel">
            <h3 style="margin-top:0;">岔路巫师</h3>
            <p id="wizard-desc">献上一点代价，换一张战斗卡。</p>
            <div id="wizard-options">
                <button class="build-btn training" onclick="Game.resolveWizardTrade('gold')">献上 60G</button>
                <button class="build-btn heal" onclick="Game.resolveWizardTrade('hp')">献上 12HP</button>
                <button class="build-btn cancel" onclick="Game.resolveWizardTrade('skip')">离开</button>
            </div>
        </div>

        <div id="taunt-layer">
            <div id="taunt-hero" class="taunt-box"></div>
            <div id="taunt-enemy" class="taunt-box"></div>
        </div>

        <div id="battle-result"></div>

        <div id="battle-ui">
            <button class="battle-command" onclick="Game.chooseBattleCommand('attack')">攻击</button>
            <button class="battle-command" onclick="Game.chooseBattleCommand('skill')">技能</button>
            <button class="battle-command" onclick="Game.chooseBattleCommand('defend')">防御</button>
            <button class="battle-command" onclick="Game.chooseBattleCommand('flee')">逃跑</button>
        </div>

        <div id="msg-log"></div>
    </div>

    <!-- 引入 Three.js 和 Tween.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

    <script>
        // ------------------ 辅助函数：绘制骰子纹理 ------------------
        function createDiceTexture(number) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, 256, 256);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 10;
            ctx.strokeRect(0,0,256,256);
            ctx.fillStyle = '#000';
            const drawDot = (x, y) => {
                ctx.beginPath();
                ctx.arc(x, y, 25, 0, Math.PI * 2);
                ctx.fill();
            };
            const c = 128, l = 64, r = 192;
            if([1,3,5].includes(number)) drawDot(c, c);
            if([2,3,4,5,6].includes(number)) { drawDot(l, l); drawDot(r, r); }
            if([4,5,6].includes(number)) { drawDot(l, r); drawDot(r, l); }
            if(number === 6) { drawDot(l, c); drawDot(r, c); }
            if(number === 1) { ctx.fillStyle = '#ff4757'; drawDot(c,c); } // 一点红
            return new THREE.CanvasTexture(canvas);
        }

        // ------------------ 游戏核心逻辑 ------------------
        const TurnState = Object.freeze({
            IDLE: 'IDLE',
            DICE: 'DICE',
            MOVING: 'MOVING',
            OWNED_EVENTS: 'OWNED_EVENTS',
            ENEMY_EVENTS: 'ENEMY_EVENTS',
            ACTION_SELECT: 'ACTION_SELECT',
            ACTION_MENU: 'ACTION_MENU',
            BATTLE: 'BATTLE',
            ENDING: 'ENDING'
        });

        const DicePhase = Object.freeze({
            READY: 'READY',
            LAUNCH: 'LAUNCH',
            ROLL: 'ROLL',
            SETTLE: 'SETTLE',
            DONE: 'DONE'
        });

        const CameraMode = Object.freeze({
            FOLLOW: 'FOLLOW',
            DRAGGING: 'DRAGGING',
            RETURNING: 'RETURNING'
        });

        const Game = {
            scene: null, camera: null, renderer: null,
            players: [],
            nodes: [], // 主路
            slots: [], // 副地块
            monsters: [],
            currentPlayerIndex: 0,
            state: TurnState.IDLE, // explicit turn/action state machine
            dicePhase: DicePhase.READY,
            cameraMode: CameraMode.FOLLOW,
            cameraReturnTween: null,
            slotHighlightTweens: [],
            battleContext: null,
            battleCommandResolver: null,
            battleFloor: null,
            battleSnapshot: null,
            battleCameraFocus: null,
            battleHand: [],
            wizardTradeResolver: null,
            actionConsumedThisTurn: false,
            maxFacilityLevel: 3,
            cardLibrary: {
                STRIKE: { name: '斩击', kind: 'attack', power: 8, text: '造成 ATK+8 伤害。' },
                GUARD_UP: { name: '架盾', kind: 'defend', block: 9, text: '本回合大幅减伤。' },
                FIREBALL: { name: '火球', kind: 'skill', power: 16, text: '造成 ATK+16 技能伤害。' },
                RALLY: { name: '振奋', kind: 'buff', atk: 2, text: '永久 ATK +2。' },
                MEND: { name: '治愈', kind: 'heal', heal: 16, text: '恢复 16HP。' }
            },
            facilityConfigs: {
                TRAP: { name: '陷阱', cost: 50, color: 0xa55eea, maxLevel: 3, baseDefense: 10, allowsGuards: false, guardSlots: 0 },
                GUARD: { name: '守卫哨站', cost: 80, color: 0xff4757, maxLevel: 3, baseDefense: 18, allowsGuards: true, guardSlots: 1 },
                INCOME: { name: '金矿', cost: 100, color: 0xeccc68, maxLevel: 3, baseDefense: 14, allowsGuards: true, guardSlots: 1 },
                HEAL: { name: '治疗营地', cost: 90, color: 0x7bed9f, maxLevel: 3, baseDefense: 12, allowsGuards: true, guardSlots: 1 },
                TRAINING: { name: '训练营', cost: 120, color: 0xffb142, maxLevel: 3, baseDefense: 16, allowsGuards: true, guardSlots: 1 }
            },
            guardRecruitCost: 65,
            cameraOffset: new THREE.Vector3(0, 0, 0),
            cameraTarget: new THREE.Vector3(0, 0, 0),
            dragStartPos: {x:0, y:0},
            isDragging: false,
            raycaster: new THREE.Raycaster(),
            mouse: new THREE.Vector2(),
            activeNode: null, // 当前停留的节点
            selectedSlot: null, // 当前选中的副地块

            transitionTo(nextState, reason = '') {
                if (this.state === nextState) return;
                this.state = nextState;
                if (reason) this.log(`[${nextState}] ${reason}`);
                this.updateUI();
            },

            setDicePhase(nextPhase) {
                this.dicePhase = nextPhase;
            },

            setCameraMode(nextMode) {
                this.cameraMode = nextMode;
            },

            returnCameraToFollow() {
                if (this.cameraReturnTween) this.cameraReturnTween.stop();
                this.setCameraMode(CameraMode.RETURNING);
                this.cameraReturnTween = new TWEEN.Tween(this.cameraOffset)
                    .to({ x: 0, y: 0, z: 0 }, 650)
                    .easing(TWEEN.Easing.Elastic.Out)
                    .onComplete(() => {
                        this.cameraReturnTween = null;
                        this.setCameraMode(CameraMode.FOLLOW);
                    })
                    .start();
            },

            init() {
                this.initEngine();
                this.buildMap();
                this.initPlayers();
                this.initEvents();
                this.updateUI();
                this.log("游戏开始！玩家回合。");
                this.animate();
            },

            initEngine() {
                const canvas = document.getElementById('game-canvas');
                this.scene = new THREE.Scene();
                
                // 正交相机设置
                const aspect = window.innerWidth / window.innerHeight;
                const frustumSize = 15;
                this.camera = new THREE.OrthographicCamera(
                    frustumSize * aspect / -2, frustumSize * aspect / 2,
                    frustumSize / 2, frustumSize / -2, 1, 1000
                );
                // 经典的等距倾斜视角 (RTS/CRPG)
                this.camera.position.set(20, 20, 20);
                this.camera.lookAt(0, 0, 0);

                this.renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true;
                
                // 灯光：卡通渲染需要 DirectionalLight
                const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
                dirLight.position.set(10, 20, 10);
                dirLight.castShadow = true;
                dirLight.shadow.camera.left = -15; dirLight.shadow.camera.right = 15;
                dirLight.shadow.camera.top = 15; dirLight.shadow.camera.bottom = -15;
                this.scene.add(dirLight);
                
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
                this.scene.add(ambientLight);

                window.addEventListener('resize', () => {
                    const aspect = window.innerWidth / window.innerHeight;
                    this.camera.left = -frustumSize * aspect / 2;
                    this.camera.right = frustumSize * aspect / 2;
                    this.camera.top = frustumSize / 2;
                    this.camera.bottom = -frustumSize / 2;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            },

            // 构建带有描边效果的立方体
            createToonBox(w, h, d, color, hasOutline = true) {
                const geom = new THREE.BoxGeometry(w, h, d);
                const mat = new THREE.MeshToonMaterial({ color: color });
                const mesh = new THREE.Mesh(geom, mat);
                mesh.castShadow = true;
                mesh.receiveShadow = true;

                if (hasOutline) {
                    const edges = new THREE.EdgesGeometry(geom);
                    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 }));
                    mesh.add(line);
                }
                return mesh;
            },

            buildMap() {
                // 构建规则正交网格：主干道是大回环，岔路只沿上下左右行走并最终回接。
                const nodeDefs = [
                    ...[
                        [-8,-4], [-6,-4], [-4,-4], [-2,-4], [0,-4], [2,-4], [4,-4], [6,-4], [8,-4],
                        [8,-2], [8,0], [8,2], [8,4], [8,6],
                        [6,6], [4,6], [2,6], [0,6], [-2,6], [-4,6], [-6,6], [-8,6],
                        [-8,4], [-8,2], [-8,0], [-8,-2]
                    ].map(([x, z], i, arr) => ({
                        id: i,
                        x,
                        z,
                        next: (i + 1) % arr.length,
                        branches: []
                    })),
                    { id: 26, x: 0, z: -2, next: 27 },
                    { id: 27, x: 0, z: 0, next: 28 },
                    { id: 28, x: 0, z: 2, next: 29 },
                    { id: 29, x: 2, z: 2, next: 30 },
                    { id: 30, x: 4, z: 2, next: 31 },
                    { id: 31, x: 6, z: 2, next: 11 },
                    { id: 32, x: 6, z: -2, next: 33 },
                    { id: 33, x: 4, z: -2, next: 34 },
                    { id: 34, x: 2, z: -2, next: 26 },
                    { id: 35, x: -2, z: 4, next: 36 },
                    { id: 36, x: -2, z: 2, next: 37 },
                    { id: 37, x: -2, z: 0, next: 38 },
                    { id: 38, x: -4, z: 0, next: 39 },
                    { id: 39, x: -6, z: 0, next: 24 },
                    { id: 40, x: -10, z: 0, next: 24, npc: 'WIZARD', deadEnd: true }
                ];
                nodeDefs[4].branches = [26];
                nodeDefs[9].branches = [32];
                nodeDefs[18].branches = [35];
                nodeDefs[24].branches = [40];

                nodeDefs.forEach((def, i) => {
                    const { x, z } = def;
                    const nodeMesh = this.createToonBox(1.8, 0.5, 1.8, 0x7bed9f);
                    nodeMesh.userData.baseY = 0;
                    nodeMesh.position.set(x, -8, z);
                    this.scene.add(nodeMesh);

                    const node = {
                        id: def.id,
                        x: x, z: z,
                        mesh: nodeMesh,
                        next: def.next,
                        nextOptions: [
                            { target: def.next, label: '主路' },
                            ...(def.branches || []).map(target => ({ target, label: '岔路' }))
                        ],
                        isBranch: def.id >= 26,
                        npc: def.npc || null,
                        deadEnd: !!def.deadEnd,
                        slots: []
                    };
                    this.nodes.push(node);
                    if (node.npc === 'WIZARD') this.createWizardMarker(node);
                });
                this.nodes.forEach(node => this.createAdjacentSlotsForNode(node));

                this.animateMapIntro();
            },

            createAdjacentSlotsForNode(node) {
                const spacing = 2;
                const roadPositions = new Set(this.nodes.map(n => `${n.x},${n.z}`));
                const directions = [
                    { dx: 0, dz: -spacing },
                    { dx: spacing, dz: 0 },
                    { dx: 0, dz: spacing },
                    { dx: -spacing, dz: 0 }
                ];

                directions.forEach(({ dx, dz }) => {
                    const x = node.x + dx;
                    const z = node.z + dz;
                    if (!roadPositions.has(`${x},${z}`)) this.createSlot(node, x, z);
                });
            },

            createWizardMarker(node) {
                const group = new THREE.Group();
                const hat = new THREE.Mesh(
                    new THREE.ConeGeometry(0.55, 0.95, 6),
                    new THREE.MeshToonMaterial({ color: 0xa55eea })
                );
                hat.position.y = 0.85;
                const brim = this.createToonBox(0.9, 0.12, 0.9, 0x2f2147, false);
                brim.position.y = 0.35;
                group.add(hat, brim);
                group.userData.baseY = 0.18;
                group.position.set(node.x, -8, node.z);
                this.scene.add(group);
                node.npcMesh = group;
            },

            getMapIntroObjects() {
                return [
                    ...this.nodes.map(n => n.mesh),
                    ...this.slots.map(s => s.mesh),
                    ...this.nodes.map(n => n.npcMesh).filter(Boolean),
                    ...this.monsters.map(m => m.meshGroup)
                ].filter(Boolean);
            },

            animateMapIntro() {
                this.getMapIntroObjects().forEach((mesh, index) => {
                    const baseY = mesh.userData.baseY ?? mesh.position.y;
                    new TWEEN.Tween(mesh.position)
                        .to({ y: baseY }, 720)
                        .delay(index * 22)
                        .easing(TWEEN.Easing.Elastic.Out)
                        .onComplete(() => {
                            if (mesh.userData.startFloatAfterIntro) mesh.userData.startFloatAfterIntro();
                        })
                        .start();
                });
            },

            createSlot(node, x, z) {
                // 检查是否与其他主路/副地块重叠 (简易判定)
                const overlap = this.nodes.find(n => n.x === x && n.z === z);
                if (overlap) return;
                const slotOverlap = this.slots.find(s => s.x === x && s.z === z);
                if (slotOverlap) {
                    if (!node.slots.includes(slotOverlap)) node.slots.push(slotOverlap);
                    return slotOverlap;
                }

                const slotMesh = this.createToonBox(1.6, 0.4, 1.6, 0xdfe4ea);
                slotMesh.userData.baseY = 0.05;
                slotMesh.position.set(x, -8, z);
                this.scene.add(slotMesh);

                const slot = {
                    node: node, x: x, z: z, mesh: slotMesh,
                    type: 'EMPTY', // EMPTY, TRAP, GUARD, INCOME, HEAL, TRAINING
                    level: 0,
                    maxLevel: this.maxFacilityLevel,
                    owner: null,
                    facilityMesh: null,
                    defense: 0,
                    guardSlots: 0,
                    guards: [],
                    monster: null
                };
                node.slots.push(slot);
                this.slots.push(slot);
                if (node.id % 5 === 2) this.spawnMonsterOnSlot(slot);
                return slot;
            },

            spawnMonsterOnSlot(slot) {
                const group = new THREE.Group();
                const bodyGeom = new THREE.SphereGeometry(0.36, 16, 16);
                const body = new THREE.Mesh(bodyGeom, new THREE.MeshToonMaterial({ color: 0x20bf6b }));
                body.scale.set(1.15, 0.72, 1.15);
                body.position.y = 0.42;
                body.castShadow = true;

                const hornGeom = new THREE.ConeGeometry(0.16, 0.32, 8);
                const horn = new THREE.Mesh(hornGeom, new THREE.MeshToonMaterial({ color: 0xf7f1e3 }));
                horn.position.set(0.18, 0.78, 0.06);
                horn.rotation.z = -0.35;
                horn.castShadow = true;

                group.add(body);
                group.add(horn);
                group.userData.baseY = 0.18;
                group.position.set(slot.x, -8, slot.z);
                this.scene.add(group);

                const monster = {
                    name: '野生黏黏怪',
                    hp: 28,
                    maxHp: 28,
                    atk: 6,
                    exp: 20,
                    gold: 25,
                    slot,
                    meshGroup: group,
                    bodyMesh: body
                };
                slot.monster = monster;
                this.monsters.push(monster);

                group.userData.startFloatAfterIntro = () => {
                    if (monster.floatTween) return;
                    monster.floatTween = new TWEEN.Tween(group.position)
                        .to({ y: 0.34 }, 700)
                        .yoyo(true)
                        .repeat(Infinity)
                        .easing(TWEEN.Easing.Sinusoidal.InOut)
                        .start();
                };
            },

            clearMonster(slot) {
                if (!slot || !slot.monster) return;
                const monster = slot.monster;
                if (monster.floatTween) monster.floatTween.stop();
                if (monster.meshGroup) this.scene.remove(monster.meshGroup);
                this.monsters = this.monsters.filter(m => m !== monster);
                slot.monster = null;
            },

            initPlayers() {
                const colors = [0x70a1ff, 0xff4757, 0xeccc68, 0xa55eea]; // 蓝(玩家), 红, 黄, 紫
                const names = ["人类勇者", "兽人AI", "精灵AI", "亡灵AI"];

                for (let i = 0; i < 4; i++) {
                    // 角色模型：球体 + 挤压变形组
                    const group = new THREE.Group();
                    const geom = new THREE.SphereGeometry(0.38, 16, 16);
                    const mat = new THREE.MeshToonMaterial({ color: colors[i] });
                    const mesh = new THREE.Mesh(geom, mat);
                    mesh.position.y = 0.45;
                    mesh.castShadow = true;

                    // 背面膨胀描边法 (BackSide Outline)
                    const outlineMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.BackSide });
                    const outlineMesh = new THREE.Mesh(geom, outlineMat);
                    outlineMesh.scale.set(1.12, 1.12, 1.12);
                    mesh.add(outlineMesh);

                    group.add(mesh);
                    group.position.set(this.nodes[0].x, 0.25, this.nodes[0].z);
                    this.scene.add(group);

                    this.players.push({
                        id: i, isPlayer: i === 0, name: names[i], color: colors[i],
                        meshGroup: group, bodyMesh: mesh,
                        nodeIndex: 0,
                        hp: 50, maxHp: 50, atk: 10, gold: 200, exp: 0, level: 1,
                        deck: ['STRIKE', 'STRIKE', 'STRIKE', 'GUARD_UP', 'GUARD_UP', 'FIREBALL'],
                        drawPile: [],
                        discardPile: []
                    });
                }
                this.reflowAllCharacterStances(false);
            },

            getPlayersOnNode(nodeIndex) {
                return this.players
                    .filter(player => player.nodeIndex === nodeIndex)
                    .sort((a, b) => a.id - b.id);
            },

            getNodeStandPosition(nodeIndex, player, occupants = null) {
                const node = this.nodes[nodeIndex];
                const group = occupants || this.getPlayersOnNode(nodeIndex);
                const count = Math.max(1, group.length);
                const index = Math.max(0, group.findIndex(p => p.id === player.id));

                if (count === 1) {
                    return new THREE.Vector3(node.x, 0.25, node.z);
                }

                const radius = Math.min(0.62, 0.34 + count * 0.08);
                const angle = -Math.PI / 2 + (Math.PI * 2 * index / count);
                return new THREE.Vector3(
                    node.x + Math.cos(angle) * radius,
                    0.25,
                    node.z + Math.sin(angle) * radius
                );
            },

            reflowNodeOccupants(nodeIndex, animated = true, excludePlayer = null) {
                const occupants = this.getPlayersOnNode(nodeIndex);
                occupants.forEach(player => {
                    if (excludePlayer && player.id === excludePlayer.id) return;
                    const target = this.getNodeStandPosition(nodeIndex, player, occupants);
                    if (animated) {
                        new TWEEN.Tween(player.meshGroup.position)
                            .to({ x: target.x, y: target.y, z: target.z }, 360)
                            .easing(TWEEN.Easing.Back.Out)
                            .start();
                    } else {
                        player.meshGroup.position.copy(target);
                    }
                });
            },

            reflowAllCharacterStances(animated = true) {
                this.nodes.forEach(node => this.reflowNodeOccupants(node.id, animated));
            },

            bounceNode(node) {
                if (!node || !node.mesh) return;
                new TWEEN.Tween(node.mesh.position)
                    .to({ y: -0.18 }, 90)
                    .easing(TWEEN.Easing.Quadratic.In)
                    .onComplete(() => {
                        new TWEEN.Tween(node.mesh.position)
                            .to({ y: 0 }, 420)
                            .easing(TWEEN.Easing.Elastic.Out)
                            .start();
                    })
                    .start();
            },

            async chooseNextNodeIndex(node, player) {
                const options = node.nextOptions || [{ target: node.next, weight: 1 }];
                if (options.length === 1) return options[0].target;
                if (player.isPlayer) return await this.waitForBranchChoice(node, options);

                const choice = options[Math.floor(Math.random() * options.length)];
                if (choice.target !== node.next) {
                    this.log(`${player.name} 发现岔路，走向了另一条浮空小径。`);
                }
                return choice.target;
            },

            waitForBranchChoice(node, options) {
                const menu = document.getElementById('branch-menu');
                const optionBox = document.getElementById('branch-options');
                optionBox.innerHTML = '';
                menu.style.display = 'block';

                return new Promise(resolve => {
                    options.forEach(option => {
                        const target = this.nodes[option.target];
                        const btn = document.createElement('button');
                        btn.className = 'branch-btn';
                        btn.innerText = this.getBranchDirectionLabel(node, target, option.label);
                        btn.onclick = () => {
                            menu.style.display = 'none';
                            optionBox.innerHTML = '';
                            if (option.target !== node.next) {
                                this.log(`${this.players[this.currentPlayerIndex].name} 选择了岔路。`);
                            }
                            resolve(option.target);
                        };
                        optionBox.appendChild(btn);
                    });
                });
            },

            getBranchDirectionLabel(fromNode, targetNode, fallback = '道路') {
                const dx = targetNode.x - fromNode.x;
                const dz = targetNode.z - fromNode.z;
                if (Math.abs(dx) > Math.abs(dz)) return dx > 0 ? `${fallback} 向右` : `${fallback} 向左`;
                if (dz !== 0) return dz > 0 ? `${fallback} 向后` : `${fallback} 向前`;
                return fallback;
            },

            getOrderedLandingEventSlots(slots, player) {
                const priority = (slot) => {
                    if (slot.owner === player) return 0;
                    if (slot.owner && slot.owner !== player) return 1;
                    return 2;
                };
                return [...slots].sort((a, b) => priority(a) - priority(b));
            },

            setNodeFacilityOpacity(node, opacity) {
                if (!node) return;
                node.slots.forEach(slot => {
                    if (!slot.facilityMesh) return;
                    slot.facilityMesh.traverse(child => {
                        if (!child.material) return;
                        child.material.transparent = opacity < 1;
                        child.material.opacity = opacity;
                    });
                });
            },

            getFacilityConfig(type) {
                return this.facilityConfigs[type] || this.facilityConfigs.TRAP;
            },

            getFacilityName(slotOrType) {
                const type = typeof slotOrType === 'string' ? slotOrType : slotOrType.type;
                return this.getFacilityConfig(type).name;
            },

            getUpgradeCost(slot) {
                return 50 + slot.level * 35;
            },

            getUpgradeDefenseGain(slot) {
                return this.canFacilityHostGuards(slot)
                    ? 12 + slot.level * 4
                    : 20 + slot.level * 9;
            },

            isFacilityMaxLevel(slot) {
                return slot.type !== 'EMPTY' && slot.level >= slot.maxLevel;
            },

            canFacilityHostGuards(slot) {
                return slot.type !== 'EMPTY' && !!this.getFacilityConfig(slot.type).allowsGuards;
            },

            getGuardCapacity(slot) {
                if (!this.canFacilityHostGuards(slot)) return 0;
                const config = this.getFacilityConfig(slot.type);
                return Math.max(config.guardSlots || 1, slot.level);
            },

            getGuardRecruitCost(slot) {
                return this.guardRecruitCost + slot.guards.length * 25 + Math.max(0, slot.level - 1) * 10;
            },

            createGuard(slot) {
                const index = slot.guards.length + 1;
                return {
                    name: `${this.getFacilityName(slot)}守军${index}`,
                    hp: 18 + slot.level * 7,
                    atk: 5 + slot.level * 3
                };
            },

            getGuardPower(slot) {
                return slot.guards.reduce((sum, guard) => sum + guard.hp + guard.atk * 3, 0);
            },

            setActionConsumed(consumed) {
                this.actionConsumedThisTurn = consumed;
            },

            finishAction(consumesTurn = true) {
                if (consumesTurn) {
                    this.setActionConsumed(true);
                    this.endTurn();
                } else {
                    this.setActionConsumed(false);
                    this.closeBuildMenu();
                }
            },

            setBuildMenuButtons(mode) {
                const buildIds = ['btn-build-trap', 'btn-build-guard', 'btn-build-income', 'btn-build-heal', 'btn-build-training'];
                document.querySelector('.build-options').style.display = 'flex';
                const player = this.players[this.currentPlayerIndex];
                buildIds.forEach(id => {
                    const btn = document.getElementById(id);
                    btn.style.display = mode === 'build' ? 'inline-block' : 'none';
                    const type = btn.getAttribute('onclick').match(/'([^']+)'/)?.[1];
                    const cost = this.facilityConfigs[type]?.cost || 0;
                    btn.disabled = mode === 'build' && player.gold < cost;
                });
                const upgradeBtn = document.getElementById('btn-upgrade-facility');
                const recruitBtn = document.getElementById('btn-recruit-guard');
                const demolishBtn = document.getElementById('btn-demolish-facility');
                const monsterBtn = document.getElementById('btn-fight-monster');
                const challengeBtn = document.getElementById('btn-challenge-facility');
                upgradeBtn.style.display = mode === 'owned' ? 'inline-block' : 'none';
                recruitBtn.style.display = mode === 'owned' ? 'inline-block' : 'none';
                demolishBtn.style.display = mode === 'owned' ? 'inline-block' : 'none';
                monsterBtn.style.display = mode === 'monster' ? 'inline-block' : 'none';
                challengeBtn.style.display = mode === 'enemy' ? 'inline-block' : 'none';
                upgradeBtn.disabled = false;
                recruitBtn.disabled = false;
                demolishBtn.disabled = false;
                monsterBtn.disabled = false;
                challengeBtn.disabled = false;
            },

            updateFacilityVisual(slot) {
                if (!slot.facilityMesh) return;
                const scale = 1 + (slot.level - 1) * 0.18;
                slot.facilityMesh.scale.set(scale, scale, scale);
                slot.facilityMesh.position.y = 0.6 + (slot.level - 1) * 0.08;
                this.updateGuardMarkers(slot);
            },

            updateGuardMarkers(slot) {
                if (slot.guardMarkerGroup) {
                    this.scene.remove(slot.guardMarkerGroup);
                    slot.guardMarkerGroup = null;
                }
                if (!slot.guards || slot.guards.length === 0) return;

                const group = new THREE.Group();
                slot.guards.forEach((guard, index) => {
                    const marker = this.createToonBox(0.22, 0.28, 0.22, 0x1e90ff, false);
                    const angle = (Math.PI * 2 * index) / Math.max(1, slot.guards.length);
                    marker.position.set(Math.cos(angle) * 0.55, 0.95, Math.sin(angle) * 0.55);
                    group.add(marker);
                });
                group.position.set(slot.x, 0, slot.z);
                this.scene.add(group);
                slot.guardMarkerGroup = group;
            },

            clearFacility(slot) {
                if (slot.facilityMesh) {
                    this.scene.remove(slot.facilityMesh);
                }
                if (slot.guardMarkerGroup) {
                    this.scene.remove(slot.guardMarkerGroup);
                }
                slot.type = 'EMPTY';
                slot.level = 0;
                slot.maxLevel = this.maxFacilityLevel;
                slot.owner = null;
                slot.facilityMesh = null;
                slot.defense = 0;
                slot.guardSlots = 0;
                slot.guards = [];
                slot.guardMarkerGroup = null;
            },

            initEvents() {
                const canvas = document.getElementById('game-canvas');
                document.getElementById('btn-roll').addEventListener('click', () => this.rollDice());
                document.getElementById('btn-end').addEventListener('click', () => this.endTurn());

                // 触控/鼠标事件用于拖拽相机和点击选择
                canvas.addEventListener('pointerdown', (e) => {
                    this.isDragging = false;
                    if (this.cameraReturnTween) {
                        this.cameraReturnTween.stop();
                        this.cameraReturnTween = null;
                    }
                    this.dragStartPos = { x: e.clientX, y: e.clientY };
                });
                
                canvas.addEventListener('pointermove', (e) => {
                    if (e.buttons === 1) { // 左键或单指按下
                        const dx = e.clientX - this.dragStartPos.x;
                        const dy = e.clientY - this.dragStartPos.y;
                        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
                            this.isDragging = true;
                            this.setCameraMode(CameraMode.DRAGGING);
                        }
                        
                        // 等距视角下拖拽映射（简易版）
                        this.cameraOffset.x -= (dx + dy) * 0.02;
                        this.cameraOffset.z -= (dy - dx) * 0.02;
                        
                        this.dragStartPos = { x: e.clientX, y: e.clientY };
                    }
                });

                canvas.addEventListener('pointerup', (e) => {
                    if (!this.isDragging && this.state === TurnState.ACTION_SELECT) {
                        // 处理点击射线检测
                        this.mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                        this.mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                        this.raycaster.setFromCamera(this.mouse, this.camera);

                        const intersects = this.raycaster.intersectObjects(this.slots.map(s => s.mesh));
                        if (intersects.length > 0) {
                            const clickedMesh = intersects[0].object;
                            const slot = this.slots.find(s => s.mesh === clickedMesh);
                            this.handleSlotClick(slot);
                        }
                    }
                    if (this.isDragging) {
                        this.returnCameraToFollow();
                    }
                    this.isDragging = false;
                });
            },

            log(msg) {
                const logDiv = document.getElementById('msg-log');
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.innerHTML = `> ${msg}`;
                logDiv.appendChild(entry);
                if (logDiv.children.length > 6) logDiv.removeChild(logDiv.firstChild);
            },

            updateUI() {
                const p = this.players[this.currentPlayerIndex];
                document.getElementById('char-name').innerText = p.name + (p.isPlayer ? " (你)" : "");
                document.getElementById('char-name').style.color = '#' + p.color.toString(16).padStart(6, '0');
                document.getElementById('char-lv').innerText = p.level;
                document.getElementById('char-atk').innerText = p.atk;
                document.getElementById('char-gold').innerText = p.gold;
                document.getElementById('char-hp-txt').innerText = `${p.hp}/${p.maxHp}`;
                document.getElementById('char-hp-bar').style.width = `${(p.hp/p.maxHp)*100}%`;
                document.getElementById('char-exp-bar').style.width = `${(p.exp/100)*100}%`;

                document.getElementById('btn-roll').style.display = (p.isPlayer && this.state === TurnState.IDLE) ? 'block' : 'none';
            },

            // 掷骰子动画
            rollDice() {
                if (this.state !== TurnState.IDLE) return;
                this.transitionTo(TurnState.DICE);
                this.setDicePhase(DicePhase.LAUNCH);
                document.getElementById('btn-roll').style.display = 'none';

                const p = this.players[this.currentPlayerIndex];
                const activeDiceNode = this.nodes[p.nodeIndex];
                this.setNodeFacilityOpacity(activeDiceNode, 0.36);
                this.cameraOffset.set(0,0,0); // 视角归位

                // 3D 实体骰子特效
                const materials = [];
                for(let i=1; i<=6; i++) {
                    materials.push(new THREE.MeshBasicMaterial({
                        map: createDiceTexture(i),
                        depthTest: false,
                        depthWrite: false
                    }));
                }
                const diceGeom = new THREE.BoxGeometry(1.5, 1.5, 1.5);
                const dice = new THREE.Mesh(diceGeom, materials);
                
                dice.position.copy(p.meshGroup.position);
                dice.position.y += 0.9;
                dice.scale.set(0.45, 0.45, 0.45);
                dice.renderOrder = 1000;
                this.scene.add(dice);

                const result = Math.floor(Math.random() * 6) + 1;
                this.log(`${p.name} 掷出了 ${result} 点！`);

                // 随机翻滚动画
                new TWEEN.Tween(dice.position)
                    .to({ y: 5.8 }, 430)
                    .easing(TWEEN.Easing.Quadratic.Out)
                    .onComplete(() => {
                        this.setDicePhase(DicePhase.ROLL);
                        new TWEEN.Tween(dice.position)
                            .to({ y: 1.35 }, 520)
                            .easing(TWEEN.Easing.Bounce.Out)
                            .onComplete(() => this.setDicePhase(DicePhase.SETTLE))
                            .start();
                    })
                    .start();

                new TWEEN.Tween(dice.scale)
                    .to({ x: 1.35, y: 1.35, z: 1.35 }, 430)
                    .easing(TWEEN.Easing.Back.Out)
                    .onComplete(() => {
                        new TWEEN.Tween(dice.scale)
                            .to({ x: 1.0, y: 1.0, z: 1.0 }, 520)
                            .easing(TWEEN.Easing.Bounce.Out)
                            .start();
                    })
                    .start();
                
                new TWEEN.Tween(dice.rotation)
                    .to({ x: Math.PI*5, y: Math.PI*6, z: Math.PI*4 }, 950)
                    .easing(TWEEN.Easing.Cubic.Out)
                    .onComplete(() => {
                        // BoxGeometry material index 2 is the top face; repaint it to the final roll.
                        dice.material[2].map = createDiceTexture(result);
                        dice.material[2].map.needsUpdate = true;
                        dice.material[2].needsUpdate = true;
                        dice.rotation.set(0, 0, 0);
                        
                        setTimeout(() => {
                            this.scene.remove(dice);
                            this.setNodeFacilityOpacity(activeDiceNode, 1);
                            this.setDicePhase(DicePhase.DONE);
                            this.transitionTo(TurnState.MOVING);
                            this.moveCharacter(p, result);
                        }, 500);
                    })
                    .start();
            },

            // 角色单步跳跃递归
            async moveCharacter(player, stepsLeft) {
                if (stepsLeft <= 0) {
                    this.reflowNodeOccupants(player.nodeIndex, true);
                    await this.handleLanding(player);
                    return;
                }

                const currNode = this.nodes[player.nodeIndex];
                const oldNodeIndex = player.nodeIndex;
                const nextNodeIndex = await this.chooseNextNodeIndex(currNode, player);
                const nextNode = this.nodes[nextNodeIndex];
                player.nodeIndex = nextNodeIndex;
                const nextOccupants = this.getPlayersOnNode(nextNodeIndex);
                const targetStand = this.getNodeStandPosition(nextNodeIndex, player, nextOccupants);
                this.reflowNodeOccupants(oldNodeIndex, true, player);
                this.reflowNodeOccupants(nextNodeIndex, true, player);

                // 物理挤压/拉伸跳跃 (Squash & Stretch)
                const body = player.bodyMesh;
                
                // 起跳前微微下压
                new TWEEN.Tween(body.scale).to({ x: 1.2, y: 0.8, z: 1.2 }, 100)
                .onComplete(() => {
                    // 空中拉伸
                    new TWEEN.Tween(body.scale).to({ x: 0.9, y: 1.2, z: 0.9 }, 150).yoyo(true).repeat(1).start();
                    
                    // 位置抛物线
                    const jumpTween = new TWEEN.Tween(player.meshGroup.position)
                        .to({ x: targetStand.x, z: targetStand.z }, 300)
                        .easing(TWEEN.Easing.Quadratic.Out)
                        .start();
                    
                    const heightTween = new TWEEN.Tween(player.meshGroup.position)
                        .to({ y: 2.5 }, 150)
                        .yoyo(true).repeat(1).easing(TWEEN.Easing.Quadratic.Out)
                        .onComplete(() => {
                            player.meshGroup.position.x = targetStand.x;
                            player.meshGroup.position.z = targetStand.z;
                            this.bounceNode(nextNode);
                            // 落地挤压恢复
                            new TWEEN.Tween(body.scale).to({ x: 1.2, y: 0.8, z: 1.2 }, 100)
                            .onComplete(() => {
                                new TWEEN.Tween(body.scale).to({ x: 1, y: 1, z: 1 }, 100).start();
                                // 继续下一步
                                setTimeout(() => this.moveCharacter(player, stepsLeft - 1), 50);
                            }).start();
                        })
                        .start();
                }).start();
            },

            // 异步事件队列入口
            async handleLanding(player) {
                this.transitionTo(TurnState.OWNED_EVENTS);
                this.activeNode = this.nodes[player.nodeIndex];
                const slots = this.activeNode.slots;

                if (this.activeNode.npc === 'WIZARD') {
                    await this.triggerWizardNode(player);
                }

                // 索敌转向: 面朝副地块
                if (slots.length > 0) {
                    const targetAngle = Math.atan2(slots[0].x - this.activeNode.x, slots[0].z - this.activeNode.z);
                    new TWEEN.Tween(player.meshGroup.rotation).to({ y: targetAngle }, 300).start();
                }

                // 严格按照：敌方被动陷阱 -> 敌方守卫强制战斗 -> 己方增益 -> 城建互动 的顺序
                for (let slot of this.getOrderedLandingEventSlots(slots, player)) {
                    if (slot.owner === player) this.transitionTo(TurnState.OWNED_EVENTS);
                    if (slot.owner && slot.owner !== player) this.transitionTo(TurnState.ENEMY_EVENTS);
                    if (slot.owner && slot.owner !== player) {
                        await this.triggerEnemyFacility(slot, player);
                        if (player.hp <= 0) break;
                    } else if (slot.owner === player) {
                        await this.triggerOwnedFacility(slot, player);
                    }
                }

                this.updateUI();

                if (player.hp <= 0) {
                    this.log(`${player.name} 阵亡！修养一回合。`);
                    player.hp = player.maxHp; // 简单复活
                    this.endTurn();
                    return;
                }

                // 进入二段式建筑操作阶段
                this.enterBuildPhase(player);
            },

            async triggerOwnedFacility(slot, player) {
                if (slot.type === 'INCOME') {
                    const income = 40 + slot.level * 25 + slot.guards.length * 10;
                    this.log(`路过自己的金矿，收益 +${income}G`);
                    player.gold += income;
                    this.createFloatingText(`+${income}G`, slot.mesh.position, "#eccc68");
                } else if (slot.type === 'HEAL') {
                    const heal = 14 + slot.level * 12 + slot.guards.length * 4;
                    const before = player.hp;
                    player.hp = Math.min(player.maxHp, player.hp + heal);
                    const actual = player.hp - before;
                    this.log(`治疗营地恢复 ${actual} HP。`);
                    this.createFloatingText(`+${actual}HP`, player.meshGroup.position, "#2ed573");
                } else if (slot.type === 'TRAINING') {
                    const atkGain = 1 + Math.floor(slot.level / 2);
                    player.atk += atkGain;
                    this.log(`训练营鼓舞士气，ATK +${atkGain}。`);
                    this.createFloatingText(`ATK +${atkGain}`, player.meshGroup.position, "#ffb142");
                }
                await this.wait(260);
            },

            async triggerWizardNode(player) {
                this.log(`${player.name} 来到岔路尽头的巫师摊位。`);
                if (!player.isPlayer) {
                    if (player.gold >= 60) {
                        player.gold -= 60;
                        this.grantRandomCard(player);
                    } else if (player.hp > 20) {
                        player.hp = Math.max(1, player.hp - 12);
                        this.grantRandomCard(player);
                    }
                    this.updateUI();
                    await this.wait(320);
                    return;
                }

                document.getElementById('wizard-menu').style.display = 'block';
                await new Promise(resolve => {
                    this.wizardTradeResolver = resolve;
                });
                document.getElementById('wizard-menu').style.display = 'none';
                this.wizardTradeResolver = null;
                this.updateUI();
                await this.wait(220);
            },

            resolveWizardTrade(choice) {
                const player = this.players[this.currentPlayerIndex];
                if (!this.wizardTradeResolver || !player) return;

                if (choice === 'gold') {
                    if (player.gold < 60) {
                        this.log("金币不足，巫师摇了摇头。");
                        return;
                    }
                    player.gold -= 60;
                    this.grantRandomCard(player);
                } else if (choice === 'hp') {
                    if (player.hp <= 12) {
                        this.log("生命太低，巫师拒绝收取代价。");
                        return;
                    }
                    player.hp = Math.max(1, player.hp - 12);
                    this.grantRandomCard(player);
                } else {
                    this.log("你离开了巫师摊位。");
                }

                const resolve = this.wizardTradeResolver;
                resolve();
            },

            grantRandomCard(player) {
                const pool = ['FIREBALL', 'RALLY', 'MEND', 'GUARD_UP'];
                const cardId = pool[Math.floor(Math.random() * pool.length)];
                player.deck.push(cardId);
                const card = this.cardLibrary[cardId];
                this.log(`${player.name} 获得卡牌《${card.name}》。`);
                this.createFloatingText(`+${card.name}`, player.meshGroup.position, "#a55eea");
            },

            async triggerEnemyFacility(slot, player) {
                if (slot.type === 'TRAP') {
                    await this.triggerTrap(slot, player);
                    return;
                }

                if (slot.type === 'GUARD' || slot.guards.length > 0) {
                    await this.triggerCombat(slot, player);
                    return;
                }

                if (slot.type === 'INCOME') {
                    const toll = Math.min(player.gold, 16 + slot.level * 12);
                    player.gold -= toll;
                    slot.owner.gold += toll;
                    this.log(`敌方金矿收取过路费 ${toll}G。`);
                    this.createFloatingText(`-${toll}G`, player.meshGroup.position, "#eccc68");
                } else if (slot.type === 'HEAL') {
                    const heal = 10 + slot.level * 10;
                    const before = slot.owner.hp;
                    slot.owner.hp = Math.min(slot.owner.maxHp, slot.owner.hp + heal);
                    const actual = slot.owner.hp - before;
                    this.log(`敌方治疗营地为 ${slot.owner.name} 恢复 ${actual} HP。`);
                    this.createFloatingText(`+${actual}HP`, slot.mesh.position, "#2ed573");
                } else if (slot.type === 'TRAINING') {
                    const atkGain = 1 + Math.floor(slot.level / 2);
                    slot.owner.atk += atkGain;
                    this.log(`敌方训练营强化了 ${slot.owner.name}，ATK +${atkGain}。`);
                    this.createFloatingText(`敌方ATK +${atkGain}`, slot.mesh.position, "#ffb142");
                }

                await this.wait(260);
            },

            async triggerTrap(slot, player) {
                return new Promise(resolve => {
                    const rate = 0.16 + slot.level * 0.06;
                    this.log(`踩中敌方 Lv.${slot.level} 陷阱！扣除 ${Math.round(rate * 100)}% HP`);
                    const dmg = Math.floor(player.maxHp * rate);
                    player.hp = Math.max(1, player.hp - dmg);
                    this.screenFlash();
                    this.createFloatingText(`-${dmg}`, player.meshGroup.position, "#ff0000");
                    setTimeout(resolve, 800);
                });
            },

            async triggerCombat(slot, player) {
                this.log(`遭遇敌方 ${this.getFacilityName(slot)} 的守军，进入战斗！`);
                const enemy = this.createBuildingBattleEnemy(slot);
                const victory = await this.resolveBattleShell({
                    attacker: player,
                    enemy,
                    sourceSlot: slot,
                    kind: 'facility'
                });

                if (victory) {
                    const rewardGold = 70 + slot.level * 35 + slot.guards.length * 25;
                    const rewardExp = 30 + slot.level * 15 + slot.guards.length * 10;
                    const name = this.getFacilityName(slot);
                    player.gold += rewardGold;
                    this.gainExp(player, rewardExp);
                    this.clearFacility(slot);
                    this.createFloatingText("摧毁", slot.mesh.position, "#ff4757");
                    this.log(`击败守军并摧毁敌方 ${name}，获得 ${rewardGold}G 和 ${rewardExp}EXP。`);
                } else {
                    this.log(`未能突破敌方 ${this.getFacilityName(slot)}，守军仍然驻守。`);
                }
                this.updateUI();
            },

            gainExp(player, amount) {
                player.exp += amount;
                if (player.exp >= 100) {
                    player.exp -= 100;
                    player.level++;
                    player.maxHp += 10;
                    player.hp = player.maxHp;
                    player.atk += 3;
                    this.log(`升级了！Lv.${player.level} HP全满，攻击力提升！`);
                    this.createFloatingText("LEVEL UP!", player.meshGroup.position, "#2ed573");
                }
            },

            // 屏幕泛红震动
            screenFlash() {
                const flash = document.getElementById('damage-flash');
                flash.style.opacity = '0.5';
                setTimeout(() => flash.style.opacity = '0', 100);
            },

            createFloatingText(text, pos, color) {
                // 用HTML DOM模拟飘字更简单且永远置顶
                const div = document.createElement('div');
                div.innerText = text;
                div.style.position = 'absolute';
                div.style.color = color;
                div.style.fontWeight = 'bold';
                div.style.fontSize = '24px';
                div.style.textShadow = '2px 2px 0 #000';
                div.style.pointerEvents = 'none';
                document.body.appendChild(div);

                // 将3D坐标转为2D屏幕坐标
                const tempV = new THREE.Vector3(pos.x, pos.y + 1, pos.z);
                tempV.project(this.camera);
                const x = (tempV.x * .5 + .5) * window.innerWidth;
                const y = (tempV.y * -.5 + .5) * window.innerHeight;
                
                div.style.left = x + 'px';
                div.style.top = y + 'px';

                let opacity = 1;
                let offsetY = 0;
                const animateTxt = setInterval(() => {
                    offsetY -= 2;
                    opacity -= 0.02;
                    div.style.transform = `translate(-50%, ${offsetY}px)`;
                    div.style.opacity = opacity;
                    if (opacity <= 0) {
                        clearInterval(animateTxt);
                        document.body.removeChild(div);
                    }
                }, 16);
            },

            enterBuildPhase(player) {
                this.transitionTo(TurnState.ACTION_SELECT);
                this.setActionConsumed(false);
                const slots = this.activeNode.slots;

                // 阶段一：地块高亮跳动
                slots.forEach(s => {
                    const highlightTween = new TWEEN.Tween(s.mesh.position).to({y: 0.2}, 400).yoyo(true).repeat(Infinity).start();
                    this.slotHighlightTweens.push(highlightTween);
                    s.mesh.material.color.setHex(0xffffff); // 高亮
                });

                if (player.isPlayer) {
                    this.log("请点击闪烁的副地块进行互动/建造。");
                    document.getElementById('btn-end').style.display = 'block';
                } else {
                    // AI 自动逻辑：随机选个空地造建筑
                    setTimeout(() => {
                        this.stopSlotHighlightOnly();
                        const emptySlot = slots.find(s => s.type === 'EMPTY' && !s.monster);
                        const types = Object.keys(this.facilityConfigs).filter(type => player.gold >= this.facilityConfigs[type].cost);
                        if (emptySlot && types.length > 0) {
                            this.selectedSlot = emptySlot;
                            this.buildFacility(types[Math.floor(Math.random()*types.length)]);
                        } else {
                            this.endTurn();
                        }
                    }, 1000);
                }
            },

            stopSlotHighlightOnly() {
                this.slotHighlightTweens.forEach(tween => tween.stop());
                this.slotHighlightTweens = [];
                if (!this.activeNode) return;
                this.activeNode.slots.forEach(s => {
                    s.mesh.position.y = 0.05;
                    s.mesh.material.color.setHex(0xdfe4ea);
                });
            },

            handleSlotClick(slot) {
                if (!this.activeNode.slots.includes(slot)) return;
                
                this.stopSlotHighlightOnly();
                this.selectedSlot = slot;

                const player = this.players[this.currentPlayerIndex];
                this.transitionTo(TurnState.ACTION_MENU);
                
                // 阶段二：弹出菜单
                if (slot.type === 'EMPTY' && slot.monster) {
                    this.setBuildMenuButtons('monster');
                    document.getElementById('build-desc').innerText = `${slot.monster.name} 占着这块地。打败它后才能在这里建造。胜利不消耗行动，失败会消耗行动。`;
                } else if (slot.type === 'EMPTY') {
                    this.setBuildMenuButtons('build');
                    document.getElementById('build-desc').innerText = "选择要建造的设施。建造会消耗当前行动。";
                } else if (slot.owner === player) {
                    this.setBuildMenuButtons('owned');
                    const upgradeBtn = document.getElementById('btn-upgrade-facility');
                    const recruitBtn = document.getElementById('btn-recruit-guard');
                    const demolishBtn = document.getElementById('btn-demolish-facility');
                    const maxed = this.isFacilityMaxLevel(slot);
                    const guardCapacity = this.getGuardCapacity(slot);
                    const guardCost = this.getGuardRecruitCost(slot);
                    upgradeBtn.disabled = maxed || player.gold < this.getUpgradeCost(slot);
                    upgradeBtn.innerText = maxed ? "已满级" : `升级 (${this.getUpgradeCost(slot)}G)`;
                    recruitBtn.disabled = !this.canFacilityHostGuards(slot) || slot.guards.length >= guardCapacity || player.gold < guardCost;
                    recruitBtn.innerText = this.canFacilityHostGuards(slot)
                        ? `招募守军 (${guardCost}G)`
                        : "不可驻防";
                    demolishBtn.disabled = false;
                    document.getElementById('build-desc').innerText = `${this.getFacilityName(slot)} Lv.${slot.level}/${slot.maxLevel}，防御 ${slot.defense}，守军 ${slot.guards.length}/${guardCapacity}。升级或招募会消耗行动，拆毁不会消耗行动。`;
                    document.querySelector('.build-options').style.display = 'flex';
                } else {
                    this.setBuildMenuButtons('enemy');
                    document.getElementById('build-desc').innerText = `${this.getFacilityName(slot)} Lv.${slot.level} 是敌方设施。可以挑战守军和城墙，胜利摧毁建筑且不消耗行动，失败会消耗行动。`;
                    document.querySelector('.build-options').style.display = 'flex';
                }
                
                document.getElementById('build-menu').style.display = 'block';
                document.getElementById('btn-end').style.display = 'none';
            },

            closeBuildMenu() {
                document.getElementById('build-menu').style.display = 'none';
                this.enterBuildPhase(this.players[this.currentPlayerIndex]); // 返回阶段一重新选
            },

            async fightSelectedMonster() {
                const player = this.players[this.currentPlayerIndex];
                const slot = this.selectedSlot;
                if (!slot || !slot.monster) {
                    this.log("这里没有可以讨伐的野怪。");
                    return;
                }

                document.getElementById('build-menu').style.display = 'none';
                const victory = await this.resolveBattleShell({
                    attacker: player,
                    enemy: slot.monster,
                    sourceSlot: slot,
                    kind: 'monster'
                });

                if (victory) {
                    player.gold += slot.monster.gold;
                    this.gainExp(player, slot.monster.exp);
                    this.clearMonster(slot);
                    this.log("野怪被赶走了，这块地现在可以建造。");
                    this.updateUI();
                    this.finishAction(false);
                } else {
                    this.log("讨伐失败，本次行动结束。");
                    this.updateUI();
                    this.finishAction(true);
                }
            },

            async challengeSelectedFacility() {
                const player = this.players[this.currentPlayerIndex];
                const slot = this.selectedSlot;
                if (!slot || slot.type === 'EMPTY' || slot.owner === player) {
                    this.log("只能挑战敌方建筑。");
                    return;
                }

                document.getElementById('build-menu').style.display = 'none';
                const enemy = this.createBuildingBattleEnemy(slot);
                const victory = await this.resolveBattleShell({
                    attacker: player,
                    enemy,
                    sourceSlot: slot,
                    kind: 'facility'
                });

                if (victory) {
                    const name = this.getFacilityName(slot);
                    this.clearFacility(slot);
                    this.createFloatingText("摧毁", slot.mesh.position, "#ff4757");
                    this.log(`攻破并摧毁了敌方 ${name}。胜利不消耗行动。`);
                    this.updateUI();
                    this.finishAction(false);
                } else {
                    this.log("挑战失败，本次行动结束。");
                    this.updateUI();
                    this.finishAction(true);
                }
            },

            createBuildingBattleEnemy(slot) {
                const hasGuard = slot.guards.length > 0 || slot.type === 'GUARD';
                const wallHp = Math.max(28, slot.defense * 2);
                const guardHp = slot.guards.reduce((sum, guard) => sum + guard.hp, 0)
                    + (slot.type === 'GUARD' && slot.guards.length === 0 ? 24 + slot.level * 8 : 0);
                const guardAtk = slot.guards.reduce((sum, guard) => sum + guard.atk, 0);
                return {
                    name: hasGuard ? `${this.getFacilityName(slot)}守军与城墙` : `${this.getFacilityName(slot)}城墙`,
                    hp: wallHp + guardHp,
                    maxHp: wallHp + guardHp,
                    atk: hasGuard ? 6 + slot.level * 2 + guardAtk : 3 + slot.level,
                    slot,
                    meshGroup: slot.facilityMesh || slot.mesh
                };
            },

            captureBattleSnapshot(attacker, enemyMesh) {
                const mapObjects = [
                    ...this.nodes.map(n => n.mesh),
                    ...this.slots.map(s => s.mesh),
                    ...this.slots.map(s => s.facilityMesh).filter(Boolean),
                    ...this.monsters.map(m => m.meshGroup).filter(Boolean)
                ].filter(obj => obj !== attacker.meshGroup && obj !== enemyMesh);
                const bystanders = this.players
                    .map(player => player.meshGroup)
                    .filter(mesh => mesh && mesh !== attacker.meshGroup && mesh !== enemyMesh);

                return {
                    camera: {
                        position: this.camera.position.clone(),
                        zoom: this.camera.zoom
                    },
                    attacker: {
                        mesh: attacker.meshGroup,
                        position: attacker.meshGroup.position.clone(),
                        rotation: attacker.meshGroup.rotation.clone(),
                        scale: attacker.meshGroup.scale.clone()
                    },
                    enemy: enemyMesh ? {
                        mesh: enemyMesh,
                        position: enemyMesh.position.clone(),
                        rotation: enemyMesh.rotation.clone(),
                        scale: enemyMesh.scale.clone()
                    } : null,
                    mapObjects: mapObjects.map((mesh, index) => ({
                        mesh,
                        index,
                        position: mesh.position.clone(),
                        visible: mesh.visible
                    })),
                    bystanders: bystanders.map((mesh, index) => ({
                        mesh,
                        index,
                        position: mesh.position.clone(),
                        rotation: mesh.rotation.clone(),
                        scale: mesh.scale.clone(),
                        visible: mesh.visible
                    }))
                };
            },

            createBattleFloor() {
                if (this.battleFloor) this.scene.remove(this.battleFloor);
                const group = new THREE.Group();
                const base = this.createToonBox(10, 0.35, 6, 0x9be7a5);
                base.position.set(0, -0.18, 0);
                const stripe = this.createToonBox(8.4, 0.08, 0.42, 0xf7f1e3, false);
                stripe.position.set(0, 0.06, 0);
                const heroMark = this.createToonBox(2.4, 0.1, 1.4, 0x70a1ff, false);
                heroMark.position.set(-2.8, 0.11, 1.25);
                const enemyMark = this.createToonBox(2.4, 0.1, 1.4, 0xff6b81, false);
                enemyMark.position.set(2.8, 0.11, -1.25);
                group.add(base, stripe, heroMark, enemyMark);
                group.position.set(5, -8, 5);
                this.scene.add(group);
                this.battleFloor = group;
                return group;
            },

            async enterBattleScene(attacker, enemy) {
                const enemyMesh = enemy.meshGroup || null;
                this.battleSnapshot = this.captureBattleSnapshot(attacker, enemyMesh);
                this.battleCameraFocus = attacker.meshGroup.position.clone();
                const floor = this.createBattleFloor();

                this.battleSnapshot.mapObjects.forEach(({ mesh, index, position }) => {
                    new TWEEN.Tween(mesh.position)
                        .to({ y: position.y - 10 }, 420)
                        .delay(index * 14)
                        .easing(TWEEN.Easing.Back.In)
                        .start();
                });
                this.battleSnapshot.bystanders.forEach(({ mesh, index, position }) => {
                    new TWEEN.Tween(mesh.position)
                        .to({ y: position.y - 9 }, 360)
                        .delay(index * 36)
                        .easing(TWEEN.Easing.Back.In)
                        .start();
                });

                new TWEEN.Tween(floor.position)
                    .to({ x: 5, y: 0, z: 5 }, 620)
                    .easing(TWEEN.Easing.Elastic.Out)
                    .start();

                await this.wait(360);
                const heroPos = new THREE.Vector3(2.4, 0.35, 7.0);
                const enemyPos = new THREE.Vector3(7.4, 0.55, 3.0);

                new TWEEN.Tween(attacker.meshGroup.position)
                    .to({ x: heroPos.x, y: heroPos.y, z: heroPos.z }, 620)
                    .easing(TWEEN.Easing.Back.Out)
                    .start();
                new TWEEN.Tween(attacker.meshGroup.rotation)
                    .to({ y: -0.75 }, 420)
                    .start();

                if (enemyMesh) {
                    new TWEEN.Tween(enemyMesh.position)
                        .to({ x: enemyPos.x, y: enemyPos.y, z: enemyPos.z }, 620)
                        .easing(TWEEN.Easing.Back.Out)
                        .start();
                    new TWEEN.Tween(enemyMesh.rotation)
                        .to({ y: 2.35 }, 420)
                        .start();
                }

                this.focusBattleCamera(new THREE.Vector3(4.9, 0.4, 5.0), 1.25, 520);
                await this.wait(700);
            },

            focusBattleCamera(target, zoom = 1.35, duration = 360) {
                const targetPos = target.position ? target.position : target;
                if (!this.battleCameraFocus) {
                    this.battleCameraFocus = new THREE.Vector3(this.camera.position.x - 20, 0, this.camera.position.z - 20);
                }

                new TWEEN.Tween(this.battleCameraFocus)
                    .to({ x: targetPos.x, y: targetPos.y || 0, z: targetPos.z }, duration)
                    .easing(TWEEN.Easing.Cubic.Out)
                    .start();

                new TWEEN.Tween(this.camera)
                    .to({ zoom }, duration)
                    .easing(TWEEN.Easing.Cubic.Out)
                    .onUpdate(() => this.camera.updateProjectionMatrix())
                    .start();

                return this.wait(duration);
            },

            async exitBattleScene() {
                if (!this.battleSnapshot) return;
                const snapshot = this.battleSnapshot;
                snapshot.mapObjects.forEach(({ mesh, position, visible, index }) => {
                    mesh.visible = visible;
                    new TWEEN.Tween(mesh.position)
                        .to({ x: position.x, y: position.y, z: position.z }, 440)
                        .delay(index * 10)
                        .easing(TWEEN.Easing.Back.Out)
                        .start();
                });
                snapshot.bystanders.forEach(({ mesh, position, rotation, scale, visible, index }) => {
                    mesh.visible = visible;
                    new TWEEN.Tween(mesh.position)
                        .to({ x: position.x, y: position.y, z: position.z }, 420)
                        .delay(index * 34)
                        .easing(TWEEN.Easing.Back.Out)
                        .start();
                    mesh.rotation.copy(rotation);
                    mesh.scale.copy(scale);
                });

                new TWEEN.Tween(snapshot.attacker.mesh.position)
